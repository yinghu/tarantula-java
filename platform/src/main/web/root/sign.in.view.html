<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-sign-in-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-sign-in" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">SIGN IN</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-container w3-border-bottom w3-border-orange w3-padding-16">
        <div style="width: 240px; margin: auto"><div id="tx-google-button"></div></div>            
    </div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-sign-in-message"></div> 
    <div class="w3-container w3-border-bottom w3-border-red">
        <div class="w3-panel">
            <input id ="tx-user-name" class="w3-input w3-round w3-border" type="text" placeholder='user name'/>
        </div>
        <div class="w3-panel">    
             <input id ="tx-password" class="w3-input w3-round w3-border" type="password" placeholder='password'/>
        </div>
        <div class="w3-panel">
            <span id="tx-forget-password" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Forget Password ?</span>  
            <span id="tx-sign-in" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Sign In</span>     
        </div>
    </div>
</div>
<script>
    tx_on_google_auth();
    document.querySelector("#tx-sign-in").onclick=()=>{
        let _n = document.querySelector('#tx-user-name').value;
        let _p = document.querySelector('#tx-password').value;
        TARA_API.onLogin({login:_n,password:_p},function(resp){
            if(resp.successful){
                tx_on_login();              
            }
            else{
                document.querySelector("#tx-sign-in-message").innerHTML=resp.message;
            }
        });            
    };
    document.querySelector('#tx-forget-password').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';
        //tx_view({viewId:'password.reset',containerId:'#tx-popup'});
        tx_view({viewId:'pending.request',containerId:'#tx-popup'});
    };
    document.querySelector('#tx-sign-in-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
