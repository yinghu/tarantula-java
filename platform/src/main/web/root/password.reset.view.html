<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-password-reset-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-send" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">PASSWORD RESET</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-password-reset-message"></div> 
    <div class="w3-container w3-border-bottom w3-border-red">
        <div id='tx-send-form'><!-- send form -->
            <div class="w3-panel">
                <input id ="tx-user-name-1" class="w3-input w3-round w3-border" type="text" placeholder='user name'/>
            </div>
            <div class="w3-panel">
                <input id ="tx-email-address" class="w3-input w3-round w3-border" type="email" placeholder='email address'/>
            </div>
            <div class="w3-panel">
                <span id="tx-send-reset-code" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Send</span>     
            </div>
        </div>
        <div id='tx-reset-form'><!-- reset form -->
            <div class="w3-panel">
                <input id ="tx-reset-code" class="w3-input w3-round w3-border" type="text" placeholder='reset code'/>
            </div>
            <div class="w3-panel">
                <input id ="tx-user-name" class="w3-input w3-round w3-border" type="text" placeholder='user name'/>
            </div>
            <div class="w3-panel">    
                <input id ="tx-new-password" class="w3-input w3-round w3-border" type="password" placeholder='new password'/>
            </div>
            <div class="w3-panel">
                <span id="tx-password-reset" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Reset</span>     
            </div>
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-reset-form').style.display='none';
    document.querySelector("#tx-send-reset-code").onclick=()=>{
        let _n = document.querySelector('#tx-user-name-1').value;
        let _m = document.querySelector('#tx-email-address').value;
        
        TARA_API.onResetCode(_n,_m,function(resp){
            if(resp.successful){
                //document.querySelector("#tx-password-reset-message").innerHTML=resp.message;
                document.querySelector('#tx-send-form').style.display='none';
                document.querySelector('#tx-reset-form').style.display='block';
                document.querySelector("#tx-password-reset-message").innerHTML='Input correct reset code and new password';              
            }
            else{
                document.querySelector("#tx-password-reset-message").innerHTML=resp.message;
            }
        });           
    };
    document.querySelector('#tx-password-reset').onclick=()=>{
        let _c = document.querySelector('#tx-reset-code').value;
        let _n = document.querySelector('#tx-user-name').value;
        let _p = document.querySelector('#tx-new-password').value;
        TARA_API.onResetPassword({login:_n,password:_p,accessKey:_c},function(resp){
            if(resp.successful){
                tx_on_login();              
            }
            else{
                document.querySelector("#tx-password-reset-message").innerHTML=resp.message;
            }   
        });       
    };
    document.querySelector('#tx-password-reset-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
