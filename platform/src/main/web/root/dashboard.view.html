<div class="tx-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-100">
        <div class="w3-display-topright w3-padding">
            <span id="tx-menu-close"><i class="fa fa-window-close-o" style="font-size:24px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Cluster Admin</span>
        </div>
        <div class="w3-display-bottomleft w3-padding"><span class='tx-text-16'>Innovative Game Integration Platform</span></div>
    </div>
    <div class="w3-container"><!-- Dash board content-->
        <div class="w3-bar w3-black">
            <button class="w3-bar-item w3-button" onclick="openCity('London')">London</button>
            <button class="w3-bar-item w3-button" onclick="openCity('Paris')">Paris</button>
            <button class="w3-bar-item w3-button" onclick="openCity('Tokyo')">Tokyo</button>
          </div>
          
          <div id="London" class="w3-container city">
            <h2>London</h2>
            <p>London is the capital city of England.</p>
          </div>
          
          <div id="Paris" class="w3-container city" style="display:none">
            <h2>Paris</h2>
            <p>Paris is the capital of France.</p> 
          </div>
          
          <div id="Tokyo" class="w3-container city" style="display:none">
            <h2>Tokyo</h2>
            <p>Tokyo is the capital of Japan.</p>
          </div>
          
    </div>
</div>
<script>
    //load view based role
    //tx_view({viewId:'admin.account',containerId:'#tx-content-ds'});
    document.querySelector('#tx-menu-close').onclick = ()=>{
        document.querySelector("#tx-dash-board").style.display="none";
        document.querySelector("#tx-dash-board").innerHTML="";
    } 
    function openCity(cityName) {
        var i;
        var x = document.getElementsByClassName("city");
        for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";  
        }
        document.getElementById(cityName).style.display = "block";  
    }
</script>
