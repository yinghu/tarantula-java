<div class="tx-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-100">
        <div class="w3-display-topright w3-padding">
            <span id="tx-menu-close"><i class="fa fa-sign-out" style="font-size:24px"></i></span>           
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Cluster</span>
        </div>
        <div class="w3-display-bottomleft w3-padding"><span class='tx-text-16'>Innovative Game Integration Platform</span></div>
    </div>
    <div><!-- Dash board content-->
        <div class="w3-bar w3-green">
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">Account</span>
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">Game</span>
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">API</span>
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">DataStore</span>
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">Cluster</span>
            <span class="w3-bar-item w3-green w3-tag  w3-border-white tx-text-14 tx-opt">Extension</span>
        </div>
        <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
        <div class="w3-display-container w3-white tx-content-8"></div>  
        <div id="Account" class="w3-container tx-pane">
            <h2>Account Pane</h2>
        </div> 
        <div id="Game" class="w3-container tx-pane" style="display:none">
            <h2>Game Pane</h2>
        </div>  
        <div id="API" class="w3-container tx-pane" style="display:none">
            <h2>API Pane</h2>
        </div>
        <div id="DataStore" class="w3-container tx-pane" style="display:none">
            <h2>Data Store Pane</h2>
        </div>
        <div id="Cluster" class="w3-container tx-pane" style="display:none">
            <h2>Cluster Pane</h2>
        </div>
        <div id="Extension" class="w3-container tx-pane" style="display:none">
            <h2>Extension Pane</h2>
        </div>
    </div>
</div>
<script>
    //load view based role
    //tx_view({viewId:'admin.account',containerId:'#tx-content-ds'});
    document.querySelector('#tx-menu-close').onclick = ()=>{
        if(TARA_API.query().systemId){
            tx_oauth_sign_out();
            TARA_API.onLogout((resp)=>{
                document.querySelector("#tx-dash-board").style.display="none";
                document.querySelector("#tx-dash-board").innerHTML="";
            });        
        }
    }; 
    document.querySelectorAll(".tx-opt").forEach((a)=>{
        a.onclick = ()=>{
            document.querySelectorAll('.tx-pane').forEach((a)=>{
                    a.style.display = 'none';
                }
            );
            document.querySelector('#'+a.innerHTML).style.display='block'; 
        }; 
    });
</script>
