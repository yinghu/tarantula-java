<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-sign-on-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-user" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">SIGN ON</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-sign-on-message"></div> 
    <div class="w3-container w3-border-bottom w3-border-red">
       
        <div class="w3-panel">
            <label class="tx-text-12">Login Name</label>  
            <input id ="tx-user-name-r"  class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='user name'/>
        </div>
        <div class="w3-panel"> 
            <label class="tx-text-12">Password</label>     
            <input id ="tx-password-r"  class="w3-input w3-round w3-border tx-text-16" type="password" placeholder='password'/>
        </div>
        <div class="w3-panel"> 
            <label class="tx-text-12">Validation Email</label>     
            <input id ="tx-email-r"  class="w3-input w3-round w3-border tx-text-16" type="email" placeholder='validation email'/>
        </div>
        <div class="w3-panel"> 
            <label class="tx-text-12">Game TypeId</label>     
            <input id ="tx-type-r"  class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='type Id'/>
        </div>
        <div class="w3-panel">
            <span id="tx-sign-on" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Sign On</span>     
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-sign-on").onclick=()=>{
        let _n = document.querySelector('#tx-user-name-r').value;
        let _p = document.querySelector('#tx-password-r').value;
        let _m = document.querySelector('#tx-email-r').value;
        let _t = document.querySelector('#tx-type-r').value;
        TARA_API.onRegister({login:_n,password:_p,emailAddress:_m,typeId:_t},function(resp){
            if(resp.successful){
                tx_on_login();                
            }
            else{
                document.querySelector("#tx-sign-on-message").innerHTML=resp.message;
            }
        });            
    };
    document.querySelector('#tx-sign-on-close').onclick=()=>{
        tx_close_current_page();       
    };
</script>
