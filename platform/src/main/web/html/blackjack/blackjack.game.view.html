    seatList[2].wagerBox.command = function(e){

    BlackJackGame.start(function(){
        _scale();
    },function(jx){
        //server push update on components
        //let jx = JSON.parse(e);
        if(jx.name == 'hand'){
            bj_on_hand(jx);                
        }
        else if(jx.name == 'seat'){
            bj_on_seat(jx);                
        }
        else if(jx.name == 'dealerSeat'){
            bj_on_dealer_seat(jx);                
        }
        else if(jx.name == 'turn'){//update game turn
            bj_on_turn(jx);
        }
        else if(jx.name == 'betline'){//update chips
            bj_on_wager(jx);
        }
        else if(jx.name == 'balance'){//player balance

        }

        }

        }
        else if(jx.name == 'onStatistics'){

        }
        else if(jx.name == 'idle'){

        }

            balanceView.name(gameObject.profile.nickname);
            cashInView.name = gameObject.profile.nickname;
            cashInView.set();
            blackjack_update(g);
        });

    _scale();
    function _scale(){
        let wz = wsize();
        gameObject.w = wz.width;
        gameObject.h = wz.height;
        app.renderer.resize(wz.width,wz.height);
        cm.position(sc,5,5);
        sm.position(sc,wz.width-sm.width*sc-5,5);
        his1.position(sc,cm.width*sc+10,5);
        balanceView.position(sc,wz.width-balanceView.width*sc-5,wz.height-pBoard.height*sc+(pBoard.height-balanceView.height)*sc/2);     
        menuBoard.position(sc,5,5);
        pBoard.position(sc,(wz.width-pBoard.width*sc)/2,(wz.height-pBoard.height*sc));  
        
        seatList[0].position(sc,(wz.width-seatList[0].width*sc)/2,cm.height*sc);
        bj_hand(0);
        bSplit.container.visible = gameObject.splittable;
        gameObject.pz = 1;
        gameObject.py = pBoard.container.y;
        if(wz.portrait){
            commandList.position(sc,(wz.width-commandList.width*sc)/2,wz.height-2*pBoard.height*sc+((pBoard.height-commandList.height)*sc)/2);
            dk.position(sc,wz.width-dk.width*sc-10,seatList[0].container.y+seatList[0].height*sc+dk.overflow*sc+5);
            lmt.position(sc,10,dk.container.y);
            wagerBar.container.scale.set(sc);
            wagerBar.container.x = 5;
            wagerBar.container.y = wz.height-pBoard.height*sc+((pBoard.height-wagerBar.height)*sc)/2;
            let pg = 5+pBoard.height*sc*2;
            let gp = (wz.width-seatList[3].width*sc*3)/4;
            seatList[3].position(sc,(wz.width-seatList[3].width*sc)/2,wz.height-seatList[3].height*sc-pg);
            bj_hand(3);    
            seatList[4].position(sc,seatList[3].container.x-seatList[4].width*sc-gp,seatList[3].container.y-20);
            bj_hand(4);
            seatList[2].position(sc,seatList[3].container.x+seatList[3].width*sc+gp,seatList[3].container.y-20);
            bj_hand(2);
            on_v_view();
        }
        else{//show landscale view 
            commandList.position(sc,10,wz.height-pBoard.height*sc+((pBoard.height-commandList.height)*sc)/2); 
            dk.position(sc,wz.width-dk.width*sc-10,sm.container.y+sm.height*sc+dk.overflow*sc+5);
            lmt.position(sc,10,dk.container.y);
            wagerBar.container.scale.set(sc);
            wagerBar.container.x = balanceView.container.x-wagerBar.width*sc-10;
            wagerBar.container.y = wz.height-pBoard.height*sc+((pBoard.height-wagerBar.height)*sc)/2;
            
            let pg = 5+pBoard.height*sc;
            let gp = (wz.width-seatList[3].width*sc*5)/6;
            seatList[5].position(sc,gp,wz.height-seatList[5].height*sc-pg-10);
            bj_hand(5);
            seatList[4].position(sc,seatList[5].container.x+seatList[5].width*sc+gp,seatList[5].container.y+5);
            bj_hand(4);
            seatList[3].position(sc,(wz.width-seatList[3].width*sc)/2,seatList[4].container.y+5);
            bj_hand(3);    
            seatList[2].position(sc,seatList[3].container.x+seatList[3].width*sc+gp,seatList[3].container.y-5);
            bj_hand(2);
            seatList[1].position(sc,seatList[2].container.x+seatList[2].width*sc+gp,seatList[2].container.y-5);
            bj_hand(1);
            on_h_view();
        }
    
        ty = parseInt((wz.width-cm.width*sc*2-15)/(his1.list[0].width*sc));
        his1.set(ty);
    }
    function blackjack_update(g){
        //g.onTable.forEach(function(t){bj_on_table(t)});
        bj_on_turn(g.turn);
        pTurn.countdown();
        g.seatList.forEach(function(st){
            if(st.index!=0){
                bj_on_seat(st);    
            }else{
                bj_on_dealer_seat(st);
            }
            bj_on_hand(st);
        });
        bj_on_deck(g.deck);
        if(g.betList){
            g.betList.forEach(function(b){
                bj_on_wager(b);
            });
         }
         else{
             seatList[1].betBox.removeChildren();
             seatList[2].betBox.removeChildren();
             seatList[3].betBox.removeChildren();
             seatList[4].betBox.removeChildren();
             seatList[5].betBox.removeChildren();
         }
        if(g.statisticsList){
            g.statisticsList.forEach(function(st){
                bj_on_statistics(st);    
            });
        }
        g.dealerRankList.forEach(function(r,i){his1.post(r);});
    }
    function bj_on_deck(deck){
        dk.sequence(deck.index);    
    }
    function bj_on_balance(cb){
        console.log(cb);
        if(cb.systemId === TARA_API.query().systemId){
           balanceView.update(cb.balance);   
        }
        if(gameObject.asDealer){
            seatList[0].update(cb.balance);
        }
        if(cb.index >= 0){
            
            seatList[cb.index].title(cb.balance);   
        }
    }
    function bj_on_dealer(cb){
        seatList[0].update(cb.balance);
        if(gameObject.asDealer){
           balanceView.update(cb.balance);   
        }
        
    }
    function bj_on_wager(b){
        let chip = CASINO.chip(b.wager);//display only
        chip.container.x = b.x;
        chip.container.y = b.y;
        seatList[b.index].betBox.addChild(chip.container);
        seatList[b.index].wager.text = b.totalWager;
    }
    function bj_on_dealer_seat(st){
        seatList[0].update(st.balance); 
        seatList[0].title.text = st.occupied?'Leave':'Sit Down';
        seatList[0].occupied = st.occupied;
        seatList[0].systemId = st.systemId;
        if(st.occupied&&st.systemId){//player as the dealer
            if(st.systemId === TARA_API.query().systemId){
                //sitting on dealer seat
                balanceView.update(st.balance);
                on_dealer_seat();
            }else{
                TARA_API.onProfile(st.systemId,function(resp){
                    seatList[0].avatar.icon.texture = PIXI.Texture.from(resp.profile.avatar+'?token='+TARA_API.query().token);
                    seatList[0].name(resp.profile.nickname);    
                });
            }
        }
        else{
            seatList[0].avatar.icon.texture = PIXI.Texture.from('assets/player.png'); 
            seatList[0].name('Blackjack Dealer'); 
            off_dealer_seat();
        }    
    }
    function bj_on_seat(st){
        //console.log(st);
        seatList[st.index].occupied = st.occupied;
        if(st.occupied){
            if(st.systemId === TARA_API.query().systemId){
                seatList[st.index].avatar.texture = gameObject.avatar;
                seatList[st.index].title(st.balance);
            }else{
                TARA_API.onProfile(st.systemId,function(resp){
                    seatList[st.index].avatar.texture = PIXI.Texture.from(resp.profile.avatar+'?token='+TARA_API.query().token);
                    seatList[st.index].title(st.balance);
                });
            }
        }
        else{
            seatList[st.index].avatar.texture = PIXI.Texture.from('assets/player.png'); 
            seatList[st.index].title('Sit Down');
        }    
    }
    function bj_on_hand(st){
        //console.log(st);
        if(st.dealing){
            st.handList.forEach(function(hd){ 
                let h = seatList[st.index].handList[hd.subscript];
                hd.cardList.forEach(function(c,i){
                    let cr = 'red';
                    if(c.suit === 'Spades'||c.suit === 'Clubs'){
                        cr = 'black';
                    }
                    h.cardList[i].set({name:c.name,color:cr});
                    h.cardList[i].suit.texture = PIXI.Texture.from('html/blackjack/'+c.suit+'.png');
                });
                h.hand({rank:hd.rank});
                bj_hand(st.index);
                if(hd.standing){
                    if(st.bank){        
                        his1.post(hd.rank);
                    }
                    else{
                        if(hd.rank>21){
                            h.fold();
                            bj_hand(st.index);
                        }
                    }
                }
            });        
        }
        else{
            seatList[st.index].handList.forEach(function(h){
                h.clear();
            });
            if(st.index>0){
                seatList[st.index].betBox.removeChildren();
                seatList[st.index].wager.text = '0';
            }
        }
    }
    function bj_hand(ix){
        if(ix>0){
            let _h = seatList[ix].handList[0];
            let sx = seatList[ix].container.x + seatList[ix].width*sc/2;
            _h.position(sc,sx-_h.width*sc/2,seatList[ix].container.y);
        }
        else{//dealer
            let _h = seatList[ix].handList[0]; 
            _h.position(sc,(gameObject.w-_h.width*sc)/2,seatList[ix].container.y+seatList[ix].height*sc+10);
        }
    }
    function bj_on_turn(turn){
        let _wpz = wsize();
        pTurn.time = turn.remainingTime;
        pTurn.message('OnTurn ['+turn.event+']');
        if(turn.seat===0){
            pTurn.position(sc,(_wpz.width-pTurn.width*sc)/2,seatList[0].container.y+seatList[0].height*sc+10);        
        }else{
            pTurn.position(sc,seatList[turn.seat].container.x-(pTurn.width*sc-seatList[turn.seat].width*sc)/2,seatList[turn.seat].container.y-pTurn.height*sc-15);
        }
    }
    function bj_on_statistics(st){
        //console.log(st);
        //sb.list[st.index].name = st.key;
        //sb.list[st.index].value = st.value;
        //sb.list[st.index].set();
    }

            });  
        }
    }

        });

    function wfaceup(){
        BlackJackGame.faceUp(function(resp){
            waction(resp);
        });
    }
    function wsoft17(){
        BlackJackGame.soft17(function(resp){
            waction(resp);
        });
    }
    function waction(resp){
    }
    function on_v_view(){
        seatList[1].container.visible = false;  
        seatList[5].container.visible = false;
        seatList[1].handList[0].container.visible = false;
        seatList[5].handList[0].container.visible = false;
    }
    function on_h_view(){       
        seatList[1].container.visible = true;
        seatList[5].container.visible = true;
        seatList[1].handList[0].container.visible = true;
        seatList[5].handList[0].container.visible = true;
    }
    function get_more_chips(){
        let wp = wsize();
        cashInView.container.visible = true;
        cashInView.container.scale.set(sc);
        cashInView.container.x = (wp.width-cashInView.width*sc)/2;
        cashInView.container.y = (wp.height-cashInView.height*sc)/2;
        cashInView.avatar.icon.texture = PIXI.Texture.from(gameObject.profile.avatar+'?token='+TARA_API.query().token);
        let _payload = {serviceTag:"presence",command:"onBalance"};
        TARA_API.onService(_payload,function(resp){
            cashInView.balance = resp.presence.balance;
            cashInView.set();
        });   
    }
    function on_dealer_seat(){
        seatList[0].avatar.icon.texture = gameObject.avatar;
        seatList[0].name(gameObject.profile.nickname); 
        bStand.title('Deal');
        bStand.button.command = wdeal;
        bHit.title('FaceUp');
        bHit.button.command = wfaceup;
        bDouble.title('Soft17');
        bDouble.button.command = wsoft17;
        bSplit.title('Payout');
        bSplit.button.command = wpayout;
        bSplit.container.visible = true;
        gameObject.asDealer = true;
    }
    function off_dealer_seat(){
        if(gameObject.asDealer){       
            bStand.title('Stand');
            bStand.button.command = wstand;
            bHit.title('Hit');
            bHit.button.command = whit;
            bDouble.title('Double');
            bDouble.button.command = wdouble;
            bSplit.title('Split');
            bSplit.button.command = wsplit;
            bSplit.container.visible = gameObject.splittable;
            gameObject.asDealer = false;        
        }
    }
</script>
