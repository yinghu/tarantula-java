<script>
    document.querySelector("#tx_close_shopping").onclick = tx_close_shopping;
    //let desc = TARA_API.descriptor(TARA_API.query().applicationId);
    var _mgt ={serviceTag:'marketplace',command:'onList',requestingCredits:5000,packSize:3};  
    TARA_API.onService(_mgt,function(mst){
        mst.packList.forEach(function(pk,i){
            console.log(pk);
            document.querySelector("#tx_shopping_commit_"+i).setAttribute('oid',pk.oid);
            document.querySelector("#tx_shopping_commit_"+i).setAttribute('amount',pk.amount);
            document.querySelector("#tx_shopping_commit_"+i).setAttribute('pname',pk.name);
            document.querySelector("#tx_shopping_commit_"+i).setAttribute('pcredits',pk.credits);
            document.querySelector("#tx_shopping_commit_"+i).setAttribute('pprice',pk.price);
            document.querySelector("#tx_shopping_credits_"+i).innerHTML = pk.credits;
            document.querySelector("#tx_shopping_name_"+i).innerHTML = pk.name;
            document.querySelector("#tx_shopping_price_"+i).innerHTML = '$'+pk.price;
        });
        _tx_load();
    });
    //payment provider stripe integration and check out to commit orderId to server for verification
    var elementStyles = {
            base: {
              color: '#32325D',
              fontFamily: 'Oswald',
              fontSize: '16px',
              fontSmoothing: 'antialiased',
              '::placeholder': {
                color: '#CFD7DF',
              },
              ':-webkit-autofill': {
                color: '#e39f48',
              },
            },
            invalid: {
              color: '#E25950',
              '::placeholder': {
                color: '#FFCCA5',
              },
            },
    };
    function _tx_load(){
        let pix;
        for(pix=0;pix<4;pix++){
            document.querySelector("#tx_shopping_commit_"+pix).onclick = function(e){
                TARA_API.query().packId = this.getAttribute('oid');
                TARA_API.query().amount = parseInt(this.getAttribute('amount'));
                TARA_API.query().name =   this.getAttribute('pname');
                TARA_API.query().credits = this.getAttribute('pcredits'); 
                TARA_API.query().price = this.getAttribute('pprice');
                document.querySelector("#tx_checkout_error").innerHTML = "";
                document.querySelector("#tx_checkout_error").style.display = "none";
                document.querySelector("#tx_checkout_message").innerHTML = "";
                document.querySelector("#tx_checkout_message").style.display = "none";
                _tx_checkout();
            };
        }
        document.querySelector('#tx_checkout_cancel').onclick = function(){document.querySelector('#tx_checkout').style.display='none';};
    }
    function _tx_checkout(){
        document.querySelector("#tx_checkout_name").innerHTML = TARA_API.query().name; 
        document.querySelector("#tx_checkout_price").innerHTML = TARA_API.query().price; 
        document.querySelector("#tx_checkout_message").innerHTML = 'pay via stripe.com'; 
        document.querySelector("#tx_checkout_message").style.display = "block";
        document.querySelector("#tx_checkout").style.display = 'block';    
        try{
        var stripe = Stripe(TARA_API.query().stripe.clientId);
        var elements = stripe.elements();
        var card = elements.create('cardNumber',{style:elementStyles,placeholder:'card number'});
        var expiry = elements.create('cardExpiry',{style:elementStyles,placeholder:'expiry month/year'});
        var cvc = elements.create('cardCvc',{style:elementStyles,placeholder:'verification code'});
        card.mount('#tx_card_number');
        expiry.mount('#tx_card_expiry');
        cvc.mount('#tx_card_cvc');
        document.querySelector('#tx_checkout_pay').onclick = function(){
            stripe.createToken(card).then(function(ret){
                console.log(ret);
                if(ret.token){
                    document.querySelector("#tx_checkout_message").innerHTML = "You card validated via stripe.com"; 
                    document.querySelector("#tx_checkout_message").style.display = "block";
                    document.querySelector("#tx_checkout_error").style.display = "none";
                    tx_shopping_commit(ret.token);
                }
                else if(ret.error){
                    //display error to player
                    document.querySelector("#tx_checkout_error").innerHTML = ret.error.message; 
                    document.querySelector("#tx_checkout_error").style.display = "block";
                    document.querySelector("#tx_checkout_message").style.display = "none";
                }
                else{
                    document.querySelector("#tx_checkout_error").innerHTML = "unknown error, please try later";
                    document.querySelector("#tx_checkout_error").style.display = "block";
                    document.querySelector("#tx_checkout_message").style.display = "none";
                }
            });    
        };
        }catch(err){
           document.querySelector("#tx_checkout_error").innerHTML = err;
           document.querySelector("#tx_checkout_error").style.display = "block"; 
        }   
    }
    function tx_shopping_commit(token){
        let _mcommit ={serviceTag:'marketplace/stripe',command:'onCommit',checkoutId:TARA_API.query().packId,orderId:token.id};  
        TARA_API.onService(_mcommit,function(resp){
            //popup web payment integration page    
            console.log(resp);
            if(resp.successful){
                document.querySelector("#tx_checkout_message").innerHTML = "You purchase item added to your account."; 
                setTimeout(function(){document.querySelector("#tx_checkout").style.display = 'none'},2000);
            }
        });
    }
    
    function tx_close_shopping(){
         this.style.display = 'none';
         let m1 = document.querySelector('#m3');
         m1.innerHTML='';
         m1.style.display = 'none';
    }
    
</script>
