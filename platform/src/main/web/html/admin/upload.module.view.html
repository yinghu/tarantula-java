<div class="w3-modal-content w3-white">
    <div class="w3-card-4 tx-popup">
        <div class="w3-bar w3-teal w3-text-white w3-border-bottom w3-border-orange">
            <div class="w3-bar-item w3-left"><span>Upload Module</span></div>
            <div class="w3-bar-item w3-right w3-button" id='tx-close-upload-module'><i class='fa fa-close'></i></div>
        </div>
            
        <div class="w3-container w3-text-teal w3-border-bottom w3-border-orange">
            <div class="w3-panel">
                <label for="u_file" class="tx-file-upload w3-round">
                    <i class="fa fa-cloud-upload tx-margin-right-8"></i>Module File
                </label>
                <input id ="u_file" type="file"/>
            </div>
            <div class="w3-panel">
                <p id="u_message"></p>
            </div>
            <div class="w3-panel" id="u_upload">  
                <div id="u_command_cancel" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                <div id="u_command" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Upload Module</div>     
            </div>
        </div>            
        
        <div class="w3-display-container w3-border-bottom w3-border-white w3-teal tx-content-36">
            <div class="w3-display-bottomright tx-margin-right-32 tx-margin-bottom-4 tx-text-12">Powered By Game Engine Cluster</div>            
        </div>
    </div>
</div>
<script>
 document.querySelector("#u_upload").style.display = "none";   
 document.querySelector("#u_message").innerHTML= 'Choose file to upload';
 let _data;
 let _fd;    
 document.querySelector("#u_file").onchange = function(e){
     _fd = e.target.files[0];
     document.querySelector("#u_message").innerHTML = _fd.name;
     var reader = new FileReader();
     reader.onload = (fe)=>{
        _data = reader.result; 
     };
     reader.onloadend = (fe)=>{
         console.log(_fd);
         document.querySelector("#u_upload").style.display = "block";
     };
     reader.readAsArrayBuffer(_fd); 
 };    
 document.querySelector("#u_command").onclick = function(){
    TARA_API.onUpload(_data,_fd.name,(resp)=>{
        document.querySelector("#u_message").innerHTML = resp.message;
    });  
 };
 function tx_close_upload_module(){
     this.style.display = 'none';
     let m1 = document.querySelector('#m3');
     m1.innerHTML='';
     m1.style.display = 'none';
 }
 document.querySelector("#tx-close-upload-module").onclick = tx_close_upload_module;
 document.querySelector("#u_command_cancel").onclick = tx_close_upload_module;   
</script>
