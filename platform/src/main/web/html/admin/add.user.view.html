<div class="w3-modal-content w3-white">
    <div class="w3-card-4 tx-popup">
        <div class="w3-bar w3-teal w3-text-white w3-border-bottom w3-border-orange">
            <div class="w3-bar-item w3-left"><span>Add User</span></div>
            <div class="w3-bar-item w3-right w3-button" id='tx-close-add-user'><i class='fa fa-close'></i></div>
        </div>
            
        <div class="w3-container w3-text-teal w3-border-bottom w3-border-orange">
            <div class="w3-panel">
                <input id ="au_login" class="w3-input w3-round w3-border" type="text" placeholder='login'/>
            </div>
            <div class="w3-panel">    
                 <input id ="au_nickname" class="w3-input w3-round w3-border" type="text" placeholder='nickname'/>
            </div>
            <div class="w3-panel">
                 <input id ="au_emailAddress" class="w3-input w3-round w3-border" type="text" placeholder='emailAddress'/>
            </div>
            <div class="w3-panel">    
                 <input id ="au_password" class="w3-input w3-round w3-border" type="password" placeholder='password'/>
            </div>
             <div class="w3-panel">
                <input id ="au_roleName" class="w3-input w3-round w3-border" type="text" placeholder='roleName'/>
            </div>
            <div class="w3-panel">
                <p id="au_message"></p>
            </div>
            <div class="w3-panel">  
                <div id="au_command_cancel" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                <div id="au_command" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Add User</div>     
            </div>
        </div>            
        
        <div class="w3-display-container w3-border-bottom w3-border-white w3-teal tx-content-36">
            <div class="w3-display-bottomright tx-margin-right-32 tx-margin-bottom-4 tx-text-12">Powered By Game Engine Cluster</div>            
        </div>
    </div>
</div>
<script>
 document.querySelector("#au_command").onclick = function(){
    AdminUser.onAction(function(payload){
        payload.command = 'addUser';
        payload.login = document.querySelector('#au_login').value;
        payload.nickname = document.querySelector('#au_nickname').value;
        payload.emailAddress= document.querySelector('#au_emailAddress').value;
        payload.password = document.querySelector('#au_password').value;
        payload.roleName = document.querySelector('#au_roleName').value;
    },function(resp){
        document.querySelector("#au_message").innerHTML = resp.message;
    });    
 };
 function tx_close_add_user(){
     this.style.display = 'none';
     let m1 = document.querySelector('#m3');
     m1.innerHTML='';
     m1.style.display = 'none';
 }
 document.querySelector("#tx-close-add-user").onclick = tx_close_add_user;
 document.querySelector("#au_command_cancel").onclick = tx_close_add_user;   
</script>
