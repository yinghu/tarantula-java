<div class="w3-modal-content w3-white">
    <div class="w3-card-4 tx-popup">
        <div class="w3-bar w3-teal w3-text-white w3-border-bottom w3-border-orange">
            <div class="w3-bar-item w3-left"><span>Add Application</span></div>
            <div class="w3-bar-item w3-right w3-button" id='tx-close-terms'><i class='fa fa-close'></i></div>
        </div>
        <div class="w3-container w3-text-teal w3-border-bottom w3-border-orange">
            <div class="w3-panel">
                <input id ="b_typeId" class="w3-input w3-round w3-border" type="text" placeholder='typeId'/>
            </div>
            <div class="w3-panel">    
                 <input id ="b_subtypeId" class="w3-input w3-round w3-border" type="text" placeholder='subtypeId'/>
            </div>
            <div class="w3-panel">
                 <input id ="b_name" class="w3-input w3-round w3-border" type="text" placeholder='name'/>
            </div>
            <div class="w3-panel">
                <input id ="b_viewId" class="w3-input w3-round w3-border" type="text" placeholder='viewId'/>
            </div>
            <div class="w3-panel">    
                 <input id ="b_description" class="w3-input w3-round w3-border" type="text" placeholder='description'/>
            </div>
            <div class="w3-panel">
                 <input id ="b_codebase" class="w3-input w3-round w3-border" type="text" placeholder='codebase'/>
            </div>
            <div class="w3-panel">
                <input id ="b_moduleArtifact" class="w3-input w3-round w3-border" type="text" placeholder='moduleArtifact'/>
            </div>
            <div class="w3-panel">    
                 <input id ="b_moduleVersion" class="w3-input w3-round w3-border" type="text" placeholder='moduleVersion'/>
            </div>
            <div class="w3-panel">
                 <input id ="b_moduleName" class="w3-input w3-round w3-border" type="text" placeholder='moduleName'/>
            </div>
            <div class="w3-panel">
                <input id ="b_capacity" class="w3-input w3-round w3-border" type="text" placeholder='capacity'/>
            </div>
            <div class="w3-panel">    
                 <input id ="b_entryCost" class="w3-input w3-round w3-border" type="text" placeholder='entryCost'/>
            </div>
             <div class="w3-panel">
                 <input id ="b_timerOnModule" class="w3-input w3-round w3-border" type="text" placeholder='timerOnModule'/>
            </div>
            <div class="w3-panel">
                 <input id ="b_runtimeDuration" class="w3-input w3-round w3-border" type="text" placeholder='runtimeDuration'/>
            </div>
            <div class="w3-panel">
                 <input id ="b_runtimeDurationOnInstance" class="w3-input w3-round w3-border" type="text" placeholder='runtimeDurationOnInstance'/>
            </div>
             <div class="w3-panel">
                <p id="b_message"></p>
            </div>
            <div class="w3-panel">  
                <div id="b_command_cancel" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                <div id="b_command" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Add Application</div>     
            </div>
        </div>  
        <div class="w3-display-container w3-border-bottom w3-border-white w3-teal tx-content-36">
            <div class="w3-display-bottomright tx-margin-right-32 tx-margin-bottom-4 tx-text-12">Powered By Game Engine Cluster</div>            
        </div>
    </div>
</div>
<script>
  document.querySelector("#b_command").onclick = function(){
    AdminSetup.addApplication(function(payload){
        payload.typeId = document.querySelector('#b_typeId').value;//'demo-sync';
        payload.subtypeId= document.querySelector('#b_subtypeId').value;//'demo-sync-a';
        payload.viewId = document.querySelector('#b_viewId').value;//'demo.sync.game';     
        payload.name= document.querySelector('#b_name').value;//'Demo Sync';
        payload.description= document.querySelector('#b_description').value;//'Applicaton Module Game';     
        payload.codebase= document.querySelector('#b_codebase').value;//'file:///development/boost/target';
        payload.moduleArtifact=document.querySelector('#b_moduleArtifact').value;//'tarantula-boost';
        payload.moduleVersion= document.querySelector('#b_moduleVersion').value;//'1.1';
        payload.moduleName=document.querySelector('#b_moduleName').value;//'com.tarantula.boost.Demo';      
        payload.capacity= parseInt(document.querySelector('#b_capacity').value);//10;
        payload.entryCost= parseInt(document.querySelector('#b_entryCost').value);//5000; 
        payload.timerOnModule = parseInt(document.querySelector('#b_timerOnModule').value);//10
        payload.runtimeDuration= parseInt(document.querySelector('#b_runtimeDuration').value);//10;
        payload.runtimeDurationOnInstance= parseInt(document.querySelector('#b_runtimeDurationOnInstance').value);//1;
    },function(resp){
        document.querySelector("#b_message").innerHTML = resp.message;
    });    
 };    
 document.querySelector("#tx-close-terms").onclick = tx_close_add_application;
 document.querySelector("#b_command_cancel").onclick = tx_close_add_application;
 function tx_close_add_application(){
     this.style.display = 'none';
     let m1 = document.querySelector('#m3');
     m1.innerHTML='';
     m1.style.display = 'none';
 }
</script>
