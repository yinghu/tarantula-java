
<div class="tx-modal-content">
    <canvas id="tx-admin-setup-canvas"></canvas>              
</div>
<script>
    let adminObject={index:0,setup:'Lobby',list:[]};
    let wz = wsize();
    let sc = wz.scale;
    app = TGL.start(wz.width,wz.height,document.querySelector("#tx-admin-setup-canvas")); 
    let pView = TGL.container();
    let pConfirmation = UI.confirmation();
    pConfirmation.no.button.command = function(){pConfirmation.close();};
    let menuBoard = UI.menu(1);
    menuBoard.list[0].button.command = function(){
        menuBoard.close();
        return false;    
    };
    menuBoard.list[0].button.icon.texture = PIXI.Texture.from('assets/left_arrow.png');
    menuBoard.list[1].button.icon.texture = PIXI.Texture.from('assets/square.png');
    menuBoard.list[1].button.command = function(){};
    menuBoard.list[2].button.icon.texture = PIXI.Texture.from('assets/gear.png');
    menuBoard.list[2].button.command = function(){};
    menuBoard.list[3].button.icon.texture = PIXI.Texture.from('assets/home.png');
    menuBoard.list[3].button.command = function(){
        let wp = wsize();
        pConfirmation.message('Are you sure to leave admin setup?');
        pConfirmation.yes.button.command = function(){
                AdminSetup.leave((resp)=>{console.log(resp);});
                TGL.shutdown();
                normalscreen();
                document.querySelector("#m2").innerHTML="";
                document.querySelector("#m2").style.display = "none";
                currentModule = null;     
        };
        pConfirmation.position(sc,(wp.width-pConfirmation.width*sc)/2,(wp.height-pConfirmation.height*sc)/2);
        pConfirmation.open();
        menuBoard.close();
    };
    let cm = UI.iconCommand(96,96);
    cm.button.command = function(){
        menuBoard.open(); 
        return false;
    }; 
    cm.button.icon.texture = PIXI.Texture.from('assets/table.png');
    
    let commandList = UI.textCommandList(1,160);
    //commandList.list[0].title('AddLobby');
    //commandList.list[0].button.command = function(){
        //_view({viewId:'admin.add.lobby',containerId:'#m3'});
    //}; 
    commandList.list[0].title('AddModule');
    commandList.list[0].button.command = function(){
        _view({viewId:'admin.add.module',containerId:'#m3'});
    };
    let setupList = UI.textCommandList(3,160);
    setupList.list[0].title('AddApp');
    setupList.list[0].button.command = _on_add_app,
    setupList.list[0].container.visible =false;    
    setupList.list[1].title('Shutdown');
    setupList.list[1].button.command = _on_shutdown;
    setupList.list[2].title('Launch');
    setupList.list[2].button.command = _on_launch,
    pView.container.addChild(setupList.container);
    pView.container.addChild(commandList.container);
    let devTitle = UI.text('Application Admin Tool',{fontWeight: 600,fontFamily:'Oswald, Arial',fontSize:32,fill:'0xD1BC22'});
    let nTitle = UI.text('Notification',{fontWeight: 500,fontFamily:'Oswald, Arial',fontSize:32,fill:'0xffffff'});
    
    let aright = UI.iconCommand(120,120);
    aright.icon.texture = PIXI.Texture.from('assets/right_arrow.png');
    aright.button.command = function(){
        if(adminObject.index<adminObject.list.length-1){
            adminObject.index++;
        }
        else{
            adminObject.index=0;
        }
        _on_admin_stage();
    }
    let aleft = UI.iconCommand(120,120);
    aleft.icon.texture = PIXI.Texture.from('assets/left_arrow.png');
    aleft.button.command = function(){
        if(adminObject.index>0){
            adminObject.index--;
        }
        else{
            adminObject.index=adminObject.list.length-1;
        }
        _on_admin_stage();
    }
    let lbv = UI.lobbySetup();
    lbv.setup.button.command = _admin_setup;
    /**
    function(){
        //_view({viewId:'admin.add.application',containerId:'#m3'});
        if(adminObject.setup == 'Lobby'){
            lbv.setup.title("Application");
            adminObject.setup = 'Application';
            AdminSetup.applicationList(adminObject.list[adminObject.index].applicationId,(resp)=>{
                console.log(resp);
                adminObject.index=0;
                adminObject.list = resp.payload.list;
                setupList.list[0].title('UpdateApp');
                setupList.list[1].title('DisableApp');
                setupList.list[2].title('Reset');
                _on_admin_stage();
            });
        }
        else{
            lbv.setup.title("Lobby");
            adminObject.setup = 'Lobby';
            AdminSetup.lobbyList((resp)=>{
                console.log(resp);
                adminObject.index=0;
                adminObject.list = resp.payload.list;
                setupList.list[0].title('AddApp');
                setupList.list[1].title('Shutdown');
                setupList.list[2].title('Launch');
                _on_admin_stage();
            });
        }
    };**/
    pView.container.addChild(aleft.container);
    pView.container.addChild(aright.container);
    pView.container.addChild(lbv.container);
    pView.container.addChild(devTitle.container);
    pView.container.addChild(nTitle.container);
    pView.container.addChild(cm.container);
    pView.container.addChild(menuBoard.container);
    pView.container.addChild(pConfirmation.container);
    app.stage.addChild(pView.container);
    
    
    //swap, server push callback, game setup
    AdminSetup.start(()=>{
         _admin_setup_scale();
    },(jx)=>{
        console.log(jx);    
    },(g)=>{
       _admin_setup_scale();   
       adminObject.list = g.payload.list;    
       _on_admin_stage();
            
    },(n)=>{ 
        console.log(n);
        nTitle.title(n.message);  
    });
    function _on_add_app(){
        if(adminObject.setup == 'Lobby'){
            TARA_API.query().app = adminObject.list[adminObject.index];
            _view({viewId:'admin.add.application',containerId:'#m3'});
        }else{
            //AdminSetup.enableApplication(adminObject.list[adminObject.index].applicationId,(resp)=>{
                //console.log(resp);
            //});
            TARA_API.query().app = adminObject.list[adminObject.index];
            _view({viewId:'admin.update.application',containerId:'#m3'});
        }
    }
    function _on_shutdown(){
        if(adminObject.setup == 'Lobby'){
            AdminSetup.shutdown(adminObject.list[adminObject.index].typeId,(resp)=>{
                console.log(resp);
            });
        }
        else{
            AdminSetup.disableApplication(adminObject.list[adminObject.index].applicationId,(resp)=>{
                console.log(resp);
            });
        }
    }
    function _on_launch(){
        if(adminObject.setup == 'Lobby'){
            AdminSetup.launch(adminObject.list[adminObject.index].typeId,(resp)=>{
                console.log(resp);
            });
        }
        else{
            //open reset page
            TARA_API.query().app = adminObject.list[adminObject.index];
            _view({viewId:'admin.reset.module',containerId:'#m3'});
        }
    }
    function _admin_setup(){
        if(adminObject.setup == 'Lobby'){
            lbv.setup.title("Application");
            adminObject.setup = 'Application';
            AdminSetup.applicationList(adminObject.list[adminObject.index].applicationId,(resp)=>{
                console.log(resp);
                adminObject.index=0;
                adminObject.list = resp.payload.list;
                setupList.list[0].title('UpdateApp');
                setupList.list[1].title('DisableApp');
                setupList.list[1].container.visible = false;
                setupList.list[2].title('Reset');
                _on_admin_stage();
            });
        }
        else{
            lbv.setup.title("Lobby");
            adminObject.setup = 'Lobby';
            AdminSetup.lobbyList((resp)=>{
                console.log(resp);
                adminObject.index=0;
                adminObject.list = resp.payload.list;
                setupList.list[0].title('AddApp');
                setupList.list[1].title('Shutdown');
                setupList.list[1].container.visible = true;
                setupList.list[2].title('Launch');
                _on_admin_stage();
            });
        }    
    }
    function _on_admin_stage(){
        let lb = adminObject.list[adminObject.index];
        setupList.container.visible = lb.resetEnabled;
        lbv.set('Index->'+adminObject.index+'\nName->'+lb.name+'\nTypeId->'+lb.typeId+'\nType->'+lb.type+'\nCategtory->'+lb.category+'\nSubtypeId->'+lb.subtypeId+'\nTag->'+lb.tag+'\nSingleton->'+lb.singleton+'\nDeployCode->'+lb.deployCode+'\nViewId->'+lb.viewId+'\nDisabled->'+lb.disabled+'\nResetEnabled->'+lb.resetEnabled);
        nTitle.title('Lobby Type ID->'+lb.typeId);
    }
    function _admin_setup_scale(){
        let wz = wsize();
        app.renderer.resize(wz.width,wz.height); 
        menuBoard.position(sc,5,5);
        cm.position(sc,5,5);
        aright.position(sc,(wz.width-aright.width*sc-20),(wz.height-aright.height*sc)/2);
        aleft.position(sc,20,(wz.height-aright.height*sc)/2);
        commandList.position(sc,wz.width-commandList.width*sc-5,5);
        setupList.position(sc,(wz.width-setupList.width*sc)/2,wz.height-setupList.height*sc-5);
        lbv.position(sc,(wz.width-lbv.width*sc)/2,(wz.height-lbv.height*sc)/2);
        nTitle.position(sc,10,wz.height-nTitle.height*sc-10);
        devTitle.position(sc,cm.container.x+cm.width*sc+10,10);
    }
</script>
