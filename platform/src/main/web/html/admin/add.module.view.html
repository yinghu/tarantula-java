<div class="w3-modal-content w3-white">
    <div class="w3-card-4 tx-popup">
        <div class="w3-bar w3-teal w3-text-white w3-border-bottom w3-border-orange">
            <div class="w3-bar-item w3-left"><span>Add Module</span></div>
            <div class="w3-bar-item w3-right w3-button" id='tx-close-add-module'><i class='fa fa-close'></i></div>
        </div>
        <div class="w3-container w3-text-teal w3-border-bottom w3-border-orange">
            <div class="w3-panel">
                 <input id ="m_codebase" class="w3-input w3-round w3-border" type="text" placeholder='codebase'/>
            </div>
            <div class="w3-panel">
                <input id ="m_moduleArtifact" class="w3-input w3-round w3-border" type="text" placeholder='moduleArtifact'/>
            </div>
            <div class="w3-panel">    
                 <input id ="m_moduleVersion" class="w3-input w3-round w3-border" type="text" placeholder='moduleVersion'/>
            </div>
        
             <div class="w3-panel">
                <p id="m_message"></p>
            </div>
            <div class="w3-panel">  
                <div id="m_command_cancel" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                <div id="m_command" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Add Module</div>     
            </div>
        </div>  
        <div class="w3-display-container w3-border-bottom w3-border-white w3-teal tx-content-36">
            <div class="w3-display-bottomright tx-margin-right-32 tx-margin-bottom-4 tx-text-12">Powered By Game Engine Cluster</div>            
        </div>
    </div>
</div>
<script>     
  document.querySelector("#m_message").innerHTML= 'Add Module';
  document.querySelector("#m_command").onclick = function(){
    AdminSetup.onAction(function(payload){    
        payload.command = 'addModule';
        payload.codebase= document.querySelector('#m_codebase').value;
        payload.moduleArtifact=document.querySelector('#m_moduleArtifact').value;
        payload.moduleVersion= document.querySelector('#m_moduleVersion').value;
    },function(resp){
        document.querySelector("#m_message").innerHTML = resp.message;
    });    
 }; 

 document.querySelector("#tx-close-add-module").onclick = tx_close_add_module;
 document.querySelector("#m_command_cancel").onclick = tx_close_add_module;
 function tx_close_add_module(){
     this.style.display = 'none';
     let m1 = document.querySelector('#m3');
     m1.innerHTML='';
     m1.style.display = 'none';
 }
</script>
