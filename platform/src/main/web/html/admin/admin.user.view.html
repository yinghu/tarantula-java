<div class="tx-modal-content">
    <canvas id="tx-admin-user-canvas"></canvas>              
</div>
<script>
    let gameObject ={};
    let wz = wsize();
    let sc = wz.scale;
    app = TGL.start(wz.width,wz.height,document.querySelector("#tx-admin-user-canvas")); 
    let devTitle = UI.text('Under Developing',{fontWeight: 600,fontFamily:'Oswald, Arial',fontSize:32,fill:'0xD1BC22'});
    let pView = TGL.container();
    pView.container.addChild(devTitle.container);
    let pConfirmation = UI.confirmation();
    pConfirmation.no.button.command = function(){pConfirmation.close();};
    let menuBoard = UI.menu(1);
    menuBoard.list[0].button.command = function(){
        menuBoard.close();
        return false;    
    };
    menuBoard.list[0].button.icon.texture = PIXI.Texture.from('assets/left_arrow.png');
    menuBoard.list[1].button.icon.texture = PIXI.Texture.from('assets/square.png');
    menuBoard.list[1].button.command = function(){};
    menuBoard.list[2].button.icon.texture = PIXI.Texture.from('assets/gear.png');
    menuBoard.list[2].button.command = function(){    };
    menuBoard.list[3].button.icon.texture = PIXI.Texture.from('assets/home.png');
    menuBoard.list[3].button.command = function(){
        let wp = wsize();
        pConfirmation.message('Are you sure to leave the game?');
        pConfirmation.yes.button.command = function(){
                AdminUser.leave((resp)=>{console.log(resp);});
                TGL.shutdown();
                normalscreen();
                document.querySelector("#m2").innerHTML="";
                document.querySelector("#m2").style.display = "none";
                currentModule = null;     
        };
        pConfirmation.position(sc,(wp.width-pConfirmation.width*sc)/2,(wp.height-pConfirmation.height*sc)/2);
        pConfirmation.open();
        menuBoard.close();
    };
    let cm = UI.iconCommand(96,96);
    cm.button.command = function(){
        menuBoard.open(); 
        return false;
    }; 
    cm.button.icon.texture = PIXI.Texture.from('assets/table.png');
    
    let commandList = UI.textCommandList(2,160);
    commandList.list[0].title('Add User');
    commandList.list[0].button.command = function(){
        _view({viewId:'admin.add.user',containerId:'#m3'});
    };
    commandList.list[1].title('Update User');
    commandList.list[1].button.command = function(){
        _view({viewId:'admin.update.user',containerId:'#m3'});
    };
    
    
    pView.container.addChild(commandList.container);
    
    let nTitle = UI.text('Notification',{fontWeight: 500,fontFamily:'Oswald, Arial',fontSize:28,fill:'0xffffff'});
    
    pView.container.addChild(nTitle.container);
    pView.container.addChild(cm.container);
    pView.container.addChild(menuBoard.container);
    pView.container.addChild(pConfirmation.container);
    app.stage.addChild(pView.container);
    
    
    //swap, server push callback, game setup
    AdminUser.start(()=>{
         _scb_scale();
    },(jx)=>{
        console.log(jx);
    },(g)=>{
       _scb_scale();       
    },(n)=>{    
      nTitle.title(n.message);  
    });
   
    function _scb_scale(){
        let wz = wsize();
        app.renderer.resize(wz.width,wz.height); 
        menuBoard.position(sc,5,5);
        cm.position(sc,5,5);
        commandList.position(sc,wz.width-commandList.width*sc-5,5); 
        nTitle.position(sc,10,wz.height-nTitle.height*sc-10);
        devTitle.position(sc,cm.container.x+cm.width*sc+10,10);
    }
</script>
