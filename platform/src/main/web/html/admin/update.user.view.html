<div class="w3-modal-content w3-white">
    <div class="w3-card-4 tx-popup">
        <div class="w3-bar w3-teal w3-text-white w3-border-bottom w3-border-orange">
            <div class="w3-bar-item w3-left"><span>Update User</span></div>
            <div class="w3-bar-item w3-right w3-button" id='tx-close-update-user'><i class='fa fa-close'></i></div>
        </div>
            
        <div class="w3-container w3-text-teal w3-border-bottom w3-border-orange">
            <div class="w3-panel">
                <input id ="af_login" class="w3-input w3-round w3-border" type="text" placeholder='input login to find'/>
                <div class="w3-panel">
                    <span class="w3-left" id="af_message"></span>
                    <span id="af_find_key" class="w3-right w3-button w3-round w3-teal">Find</span>
                </div>
            </div>
            <div class="w3-panel" id="af_command_list">
                <span id='af_1' class="w3-button w3-round w3-teal">Reset Password</span>
                <span id='af_2' class="w3-button w3-round w3-teal">Change Role</span>
            </div>
            <div id="af_reset_password">
                <div class="w3-panel">Input new password and confirm</div>
                <div class="w3-panel">    
                     <input id ="af_password1" class="w3-input w3-round w3-border" type="password" placeholder='password'/>
                </div>
                <div class="w3-panel">    
                     <input id ="af_password2" class="w3-input w3-round w3-border" type="password" placeholder='confirm password'/>
                </div>
                <div class="w3-panel">  
                    <div id="af_command_cancel_1" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                    <div id="af_command_1" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Update</div>     
                </div>
            </div>
            <div id="af_change_role">
                <div class="w3-panel">Input new role and confirm</div>
                <div class="w3-panel">    
                     <input id ="af_role1" class="w3-input w3-round w3-border" type="text" placeholder='role'/>
                </div>
                <div class="w3-panel">    
                     <input id ="af_role2" class="w3-input w3-round w3-border" type="text" placeholder='confirm role'/>
                </div>
                <div class="w3-panel">  
                    <div id="af_command_cancel_2" class="w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Cancel</div>
                    <div id="af_command_2" class="w3-right w3-button w3-round w3-teal tx-margin-top-8 tx-margin-bottom-8">Update</div>     
                </div>
            </div>
        </div>            
        
        <div class="w3-display-container w3-border-bottom w3-border-white w3-teal tx-content-36">
            <div class="w3-display-bottomright tx-margin-right-32 tx-margin-bottom-4 tx-text-12">Powered By Game Engine Cluster</div>            
        </div>
    </div>
</div>
<script>
 let auser ={};    
 document.querySelector("#af_command_list").style.display='none';    
 document.querySelector("#af_reset_password").style.display='none';
 document.querySelector("#af_change_role").style.display='none';
 document.querySelector("#af_find_key").onclick = function(){
    let _login = document.querySelector('#af_login').value; 
    AdminUser.onAction((payload)=>{
        payload.login = _login;
        payload.command = 'findKey';
    },function(resp){
        console.log(resp);
        if(resp.successful){
            auser.systemId = resp.payload.systemId;
            document.querySelector("#af_message").innerHTML = resp.payload.systemId;
            document.querySelector("#af_command_list").style.display='block';     
        }
        else{
            document.querySelector("#af_message").innerHTML='['+_login+'] not found';
        }
    });    
 };
 document.querySelector("#af_1").onclick =()=>{
     document.querySelector("#af_reset_password").style.display='block';
     document.querySelector("#af_change_role").style.display='none';
 }; 
 document.querySelector("#af_2").onclick =()=>{
     document.querySelector("#af_reset_password").style.display='none';
     document.querySelector("#af_change_role").style.display='block';
 };   
 document.querySelector("#af_command_1").onclick =()=>{
     AdminUser.onAction((payload)=>{
         payload.command = 'resetPassword';
         payload.systemId = auser.systemId;
         payload.password1 = document.querySelector('#af_password1').value;
         payload.password2 = document.querySelector('#af_password2').value;
     },(resp)=>{
         console.log(resp);
         document.querySelector("#af_message").innerHTML=resp.message;
     });
 };  
 document.querySelector("#af_command_2").onclick =()=>{
     AdminUser.onAction((payload)=>{
         payload.command = 'changeRole';
         payload.systemId = auser.systemId;
         payload.role1 = document.querySelector('#af_role1').value;
         payload.role2 = document.querySelector('#af_role2').value;
     },(resp)=>{
         console.log(resp);
         document.querySelector("#af_message").innerHTML=resp.message;
     });
 };  
 function tx_close_update_user(){
     this.style.display = 'none';
     let m1 = document.querySelector('#m3');
     m1.innerHTML='';
     m1.style.display = 'none';
 }
 document.querySelector("#tx-close-update-user").onclick = tx_close_update_user;
 document.querySelector("#af_command_cancel_1").onclick = ()=>{document.querySelector("#af_reset_password").style.display='none';}; 
 document.querySelector("#af_command_cancel_2").onclick = ()=>{document.querySelector("#af_change_role").style.display='none';}; 
</script>
