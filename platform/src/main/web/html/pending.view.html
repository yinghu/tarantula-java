<div class="tx-modal-content">
    <canvas id="tx-lobby-canvas"></canvas>              
</div>
<script>
    var Pending = (function(){
        var app;
        var _setup = function(){
            let wz = wsize();
            let sc = wz.scale;
            app = TGL.start(wz.width,wz.height,document.querySelector("#tx-lobby-canvas")); 
            let pView = TGL.container();
            let pConfirmation = UI.confirmation();
            pConfirmation.container.visible = false;
            pConfirmation.no.command = function(){pConfirmation.container.visible = false;};
            let menuBoard = UI.menu(1);
            menuBoard.container.x = 5;
            menuBoard.container.y = 5;
            menuBoard.container.scale.set(sc);
            menuBoard.container.visible = false;
            menuBoard.list[0].button.command = function(){
                menuBoard.container.visible = false;
                return false;    
            };
            menuBoard.list[0].button.icon.texture = PIXI.Texture.from('assets/left_arrow.png');
            menuBoard.list[1].button.icon.texture = PIXI.Texture.from('assets/square.png');
            menuBoard.list[2].button.icon.texture = PIXI.Texture.from('assets/gear.png');
            menuBoard.list[3].button.icon.texture = PIXI.Texture.from('assets/home.png');
            menuBoard.list[3].button.command = function(){
                let wp = wsize();
                pConfirmation.message('Comming sonn to play game!');
                pConfirmation.yes.button.command = function(){
                        TGL.shutdown();
                        normalscreen();
                        document.querySelector("#m1").innerHTML="";
                        document.querySelector("#m1").style.display = "none";
                        currentModule = null;     
                };
                pConfirmation.no.button.command = function(){pConfirmation.container.visible = false;};
                pConfirmation.container.visible = true;
                pConfirmation.container.scale.set(sc);
                pConfirmation.container.x = (wp.width-pConfirmation.width*sc)/2;
                pConfirmation.container.y = (wp.height-pConfirmation.height*sc)/2;   
                menuBoard.container.visible = false;
            };

            let cm = UI.iconCommand(96,96);
            cm.button.command = function(){
                menuBoard.container.visible = true; 
                return false;
            }; 
            cm.button.icon.texture = PIXI.Texture.from('assets/table.png');
            cm.container.x = 5;
            cm.container.y = 5;
            cm.container.scale.set(sc);
            let nTitle = UI.text('Notification',{fontWeight: 500,fontFamily:'Oswald, Arial',fontSize:28,fill:'0xffffff'});
            nTitle.title("Game Under Development");
            nTitle.position(sc,10,wz.height-nTitle.height*sc-10);
            pView.container.addChild(nTitle.container);
            pView.container.addChild(cm.container);
            pView.container.addChild(menuBoard.container);
            pView.container.addChild(pConfirmation.container);
            app.stage.addChild(pView.container);
            //_swap();
        };
        var _swap = function(){
            let wz = wsize();
            app.renderer.resize(wz.width,wz.height); 
            nTitle.position(sc,10,wz.height-nTitle.height*sc-10);
        };
        return{
            setup : _setup,
            swap : _swap,       
        };
    })();
    window.Pending = Pending;
    Pending.setup();
    //Pending.swap();
    currentModule = 'Pending';
</script>
