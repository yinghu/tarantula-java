<div class="tx-modal-content">
    <canvas id="tx-game-canvas"></canvas>              
</div>
<script>
    let gameObject ={};
    let wz = wsize();
    let sc = wz.scale;
    gameObject.dealerFee = 2000;
    gameObject.tableScale = sc;
    gameObject.asDealer = false;
    let app = TGL.start(wz.width,wz.height,document.querySelector("#tx-game-canvas"));  
     
    let tableListView = TGL.container(); //table view
    let commandListView = TGL.container(); //command view
    
    let popupListView = TGL.container(); //popup view
    let pBoard = UI.bar(2000,112);
    commandListView.container.addChild(pBoard.container);
    
    let pConfirmation = UI.confirmation();
    pConfirmation.close();
    pConfirmation.no.button.command = function(){pConfirmation.close();};
    
    let cashInView = UI.cashInView();
    cashInView.container.visible = false;
    cashInView.close.button.command = function(){cashInView.container.visible=false;};
    cashInView.close.icon.texture = PIXI.Texture.from('assets/close.png');
    cashInView.cashin.button.command = function(){
        CrapsGame.cashin(function(resp){
            cashInView.balance = resp.presence.balance;
            cashInView.set();
        });
    };
    cashInView.buy.button.command = function(){
        TARA_API.query().applicationId = gameObject.applicationId;
        _open_buy();
    };
    let menuBoard = UI.menu(1);
    menuBoard.container.x = 5;
    menuBoard.container.y = 5;
    menuBoard.container.visible = false;
    menuBoard.list[0].button.command = function(){
        menuBoard.container.visible = false;
        return false;    
    };
    menuBoard.list[0].button.icon.texture = PIXI.Texture.from('assets/left_arrow.png');
    menuBoard.list[1].button.icon.texture = PIXI.Texture.from('assets/square.png');
    menuBoard.list[2].button.icon.texture = PIXI.Texture.from('assets/gear.png');
    menuBoard.list[3].button.icon.texture = PIXI.Texture.from('assets/home.png');
    menuBoard.list[3].button.command = function(){
        let wp = wsize();
        pConfirmation.message('Are you sure to leave game ?');
        pConfirmation.yes.button.command = function(){
            CrapsGame.leave();
            TGL.shutdown();
            normalscreen();
            document.querySelector("#m2").innerHTML="";
            document.querySelector("#m2").style.display = "none";     
        };
        pConfirmation.position(sc,(wp.width-pConfirmation.width*sc)/2,(wp.height-pConfirmation.height*sc)/2);
        pConfirmation.open();
        menuBoard.container.visible = false;     
    };
    let mc = UI.iconCommand(96,96);
    mc.button.command = function(){
        menuBoard.container.visible = true; 
        return false;
    };
    mc.button.icon.texture = PIXI.Texture.from('assets/table.png');
    mc.container.x = 5;
    mc.container.y = 5;
    commandListView.container.addChild(mc.container); 
    popupListView.container.addChild(menuBoard.container);
    
   
    
    let sm = UI.iconCommand(96,96);
    sm.button.command = function(){
        
        return false;
    }; 
    sm.button.icon.texture = PIXI.Texture.from('assets/friend.png');
    sm.container.y = 5;   
    commandListView.container.addChild(sm.container);
    let ix;
    let playerListView = TGL.container();
     
    let dealerHistoryList = [];
    let his1 = UI.labelList(72,20);
    commandListView.container.addChild(his1.container);
     
    let mp = UI.balanceView();
    mp.button.command = function(){get_more_chips();};
    commandListView.container.addChild(mp.container); 
    let md = UI.dealer();
    md.name('Craps Robot Dealer');
    md.avatar.icon.texture = PIXI.Texture.from('assets/player.png');
    commandListView.container.addChild(md.container);
    
    md.occupied = false;
    md.seatBox.command = function(){
        if(!md.occupied){
            let wp = wsize();
            pConfirmation.message('Are you sure to play \nas dealer with seat fee $'+gameObject.dealerFee+' ?');
            pConfirmation.no.command = function(){
                pConfirmation.container.visible = false;        
            };
            pConfirmation.yes.button.command = function(){
                CrapsGame.onDealer(function(resp){
                    pConfirmation.message(resp.message);
                    if(resp.code==0){
                        gameObject.asDealer = true;
                        setTimeout(()=>{pConfirmation.close();},2000);
                    }
                    else if(resp.code==1){
                        
                    }
                    else if(resp.code == 2){
                        get_more_chips();
                    }
                });        
            };
            pConfirmation.position(sc,(wp.width-pConfirmation.width*sc)/2,(wp.height-pConfirmation.height*sc)/2);
            pConfirmation.open();
        }
        else if(md.occupied&&gameObject.asDealer){
            let wp = wsize();
            pConfirmation.message('Are you leaving as the dealer?');
            pConfirmation.yes.button.command = function(){
                 CrapsGame.offDealer(function(resp){
                    pConfirmation.message(resp.message);
                    if(resp.code==0){
                        gameObject.asDealer = false;
                        setTimeout(()=>{pConfirmation.close();},2000);
                    }
                    else if(resp.code==1){
                        
                    }
                 });    
            };
            pConfirmation.position(sc,(wp.width-pConfirmation.width*sc)/2,(wp.height-pConfirmation.height*sc)/2);
            pConfirmation.open();
        }
        
    };
    
    let wagerBar = UI.wagerBar();
    commandListView.container.addChild(wagerBar.container);
    wagerBar.minus.icon.texture = PIXI.Texture.from('assets/minus.png');
    wagerBar.plus.icon.texture = PIXI.Texture.from('assets/plus.png');
    
    let lmt = CASINO.limits();
    tableListView.container.addChild(lmt.container);
    
    let _ctable = CRAPS.table();
    let _cside = _ctable.side;
    let puck = _ctable.puck;
    let diceSet = _ctable.diceSet;
    for(ix=0;ix<13;ix++){
        diceSet.list[ix]=PIXI.Texture.from('html/craps/p'+ix+'.png');
    }
    diceSet.dice1.texture = diceSet.list[3];
    diceSet.dice2.texture = diceSet.list[4];
    puck.status.text = 'OFF';
    tableListView.container.addChild(_ctable.container);
    tableListView.container.addChild(_cside.topset.container);
    tableListView.container.addChild(_cside.lowset.container);
    
    _ctable.lines.forEach(function(b,i){
        b.command = function(e){
            let x = (e.data.global.x - b.container.getGlobalPosition().x)/gameObject.tableScale;
            let y = (e.data.global.y - b.container.getGlobalPosition().y)/gameObject.tableScale;
            craps_wager(b.lineId,x,y,i);
        };        
    });
    let bRoll = UI.diceRoll();
    bRoll.button.command = function(){
        CrapsGame.roll(function(resp){
            console.log(resp);
        });
    };
    bRoll.diceSet[0].texture = PIXI.Texture.from('html/craps/red_dice_3.png');
    bRoll.diceSet[1].texture = PIXI.Texture.from('html/craps/red_dice_4.png');
    commandListView.container.addChild(bRoll.container);
    
    popupListView.container.addChild(pConfirmation.container);
    popupListView.container.addChild(cashInView.container);
    app.stage.addChild(commandListView.container);
    app.stage.addChild(tableListView.container);
    app.stage.addChild(playerListView.container);
    app.stage.addChild(popupListView.container);
    CrapsGame.start(function(){
        _scale();
    },function(jx){
        //let jx = JSON.parse(e);
        if(jx.name == 'stop'){
            cp_on_stop(jx);
        }
        else if(jx.name =='betline'){
            cp_on_wager(jx);    
        }
        else if(jx.name =='balance'){
            cp_on_balance(jx);    
        }
        else if(jx.name =='seat'){
            cp_on_seat(jx);
        }
        else if(jx.name =='dealer'){
            cp_on_dealer(jx);    
        }
        else if(jx.name =='dealerSeat'){
            cp_on_dealer_seat(jx);    
        }
        else if(jx.name == 'payout'){
            cp_on_payout(jx);
        }
        else if(jx.name == 'onStatistics'){
            cp_on_statistics(jx);
        }
        else if(jx.name == 'idle'){
            cp_on_idle(jx);
        }
    },function(g){
        gameObject.entryCost = g.entryCost;
        gameObject.dealerFee = g.dealerSeatFee;
        gameObject.applicationId = g.applicationId;
        gameObject.instanceId = g.instanceId;
        gameObject.tournamentEnabled = g.tournamentEnabled;
        wagerBar.min = g.minWager;
        wagerBar.max = g.maxWager;
        wagerBar.wager = wagerBar.max;
        wagerBar.set();
        lmt.limits(g.minWagerAsString,g.maxWagerAsString);
        TARA_API.onProfile(TARA_API.query().systemId,function(resp){
            gameObject.profile = resp.profile;
            gameObject.avatar = PIXI.Texture.from(gameObject.profile.avatar+'?token='+TARA_API.query().token);
            mp.avatar.icon.texture = gameObject.avatar;
            mp.name(gameObject.profile.nickname);
            cashInView.avatar.icon.texture = gameObject.avatar;
            cashInView.name = gameObject.profile.nickname;
            cashInView.set();
            craps_update(g);
        });
    });
    _scale();
    function _scale(){
        let wz = wsize();
        app.renderer.resize(wz.width,wz.height);
        mp.position(sc,wz.width-mp.width*sc-5,wz.height-pBoard.height*sc+(pBoard.height-mp.height)*sc/2);
        pBoard.position(sc,(wz.width-pBoard.width*sc)/2,wz.height-pBoard.height*sc);
        mc.position(sc,5,5);
        sm.position(sc,wz.width-sm.width*sc-5,5);
        menuBoard.position(sc,5,5);
        wagerBar.position(sc,mp.container.x-wagerBar.width*sc-10,wz.height-pBoard.height*sc+((pBoard.height-wagerBar.height)*sc)/2);
        bRoll.container.scale.set(sc);
        bRoll.container.x = 10;
        bRoll.container.y = wz.height-pBoard.height*sc+((pBoard.height-bRoll.height)*sc)/2; 
        
        if(wz.portrait){
           gameObject.tableScale = (wz.width-md.height*sc-pBoard.height*sc-20)/(_ctable.height); 
           let gp = (wz.height-(_cside.topset.width+_ctable.width)*gameObject.tableScale-10);         
        } 
        else{
           gameObject.tableScale = (wz.height-md.height*sc-pBoard.height*sc-20)/(_ctable.height);
           let gp = (wz.width-(_cside.topset.width+_ctable.width)*gameObject.tableScale-10);
           if(gp<0){
                gameObject.tableScale = (wz.width-20)/(_ctable.width+_cside.topset.width);//desktop        
           }           
        }
        gameObject.pz = 1; //tool bar stack
        gameObject.py = pBoard.container.y; //tool bar y
        if(wz.portrait){
           
            _ctable.container.scale.set(gameObject.tableScale);
            _ctable.container.x = (wz.width-_ctable.width*gameObject.tableScale)/2;
            _ctable.container.y = wz.height-_ctable.height*gameObject.tableScale-2*pBoard.height*sc-5;
            
            _cside.topset.container.scale.set(gameObject.tableScale);
            _cside.topset.container.y = _ctable.container.y-_cside.topset.height*gameObject.tableScale-10;
            _cside.topset.container.x = (wz.width/2)-_cside.topset.width*gameObject.tableScale;
            _cside.lowset.container.scale.set(gameObject.tableScale);
            _cside.lowset.container.x = _ctable.container.x+_ctable.width*gameObject.tableScale-_cside.lowset.width*gameObject.tableScale;
            _cside.lowset.container.y = _cside.topset.container.y;
            
            md.position(sc,(wz.width-md.width*sc)/2,5);
            lmt.position(sc,10,md.container.y+md.height*sc);
            
            his1.position(sc,10,wz.height-2*pBoard.height*sc+(pBoard.height*sc-his1.height*sc)/2);
            let tcc = parseInt((wz.width-15)/(his1.list[0].width*sc));
            his1.set(tcc);
            gameObject.pz=2;
            gameObject.py = his1.container.y;
        }
        else{//show landscale view 
            md.position(sc,(wz.width-md.width*sc)/2,5); 
           
            _ctable.container.scale.set(gameObject.tableScale);
            _ctable.container.x = (wz.width-_ctable.width*gameObject.tableScale-_cside.topset.width*gameObject.tableScale)/2;
            _ctable.container.y = wz.height-_ctable.height*gameObject.tableScale-pBoard.height*sc-5;
            _cside.topset.container.scale.set(gameObject.tableScale);
            _cside.topset.container.y = _ctable.container.y;
            _cside.topset.container.x = _ctable.container.x+_ctable.width*gameObject.tableScale+5;
            _cside.lowset.container.scale.set(gameObject.tableScale);
            _cside.lowset.container.x = _cside.topset.container.x;
            _cside.lowset.container.y = _cside.topset.container.y+_cside.topset.height*gameObject.tableScale;
            
            lmt.position(sc,mc.container.x+mc.width*sc+5,md.container.y+lmt.overflow*sc);
            his1.position(sc,bRoll.width*sc+15,wz.height-pBoard.height*sc+((pBoard.height-his1.height)*sc)/2);
            let tcc = parseInt((wagerBar.container.x-bRoll.container.x-bRoll.width*sc)/(his1.list[0].width*sc));
            //console.log("xl->"+tcc);
            his1.set(tcc-1);
        }
    }
    function craps_update(g){
        //console.log(g);  
        cp_on_dealer_seat(g.dealer);
        g.seatList.forEach(function(t){
            cp_on_seat(t);
        });
        if(g.diceStop){
            cp_on_stop(g.diceStop);
        }
        if(g.betList){
            g.betList.forEach(function(b){
                cp_on_wager(b);
            });
        }
    }
    function cp_on_payout(p){
       //console.log(p);
       _ctable.lines[p.index].betList.removeChildren();
    }
    function cp_on_stop(d){
        //console.log(d);
        diceSet.set(d.dice1,d.dice2,function(){
           cp_on_puck(d.puck);
           bRoll.diceSet[0].texture = PIXI.Texture.from('html/craps/red_dice_'+d.dice1+'.png');
           bRoll.diceSet[1].texture = PIXI.Texture.from('html/craps/red_dice_'+d.dice2+'.png');      
           his1.post(d.stopNumber);       
       });    
       diceSet.update(10,600,500,100);    
        
    }
    function cp_on_wager(b){
        var chip = CASINO.chip(b.wager);
        chip.container.x = b.x;
        chip.container.y = b.y;
        _ctable.lines[b.index].betList.addChild(chip.container);    
    }
    function cp_on_seat(seat){
        console.log(seat);
        if(seat.systemId === TARA_API.query().systemId){
            mp.update(seat.balance);
        }
        if(seat.occupied&&seat.index>=0){
           //plist[seat.index].score = seat.balanceAsString;
           //plist[seat.index].icon.texture = gameObject.avatar;
           //plist[seat.index].set();
        }
        else if(!seat.occupied&&seat.index>=0){
           //plist[seat.index].score =0;
           //plist[seat.index].icon.texture = PIXI.Texture.from('assets/player.png');
           //plist[seat.index].set();
        } 
    }
    function cp_on_balance(s){
        mp.update(s.balance);   
        if(md.occupied&&md.systemId === TARA_API.query().systemId){
            md.update(s.balance);
        }
    }
    function cp_on_dealer(s){
        if(md.occupied&&md.systemId === TARA_API.query().systemId){
            mp.update(s.balance);
        }
        md.update(s.balance);
    }
    function cp_on_dealer_seat(d){
        console.log(d);
        if(d.occupied){
            md.occupied = true;
            md.title.text = 'Leave';
            md.systemId = d.systemId;
            TARA_API.onProfile(d.systemId,function(resp){
                md.avatar.icon.texture = PIXI.Texture.from(resp.profile.avatar+'?token='+TARA_API.query().token);            
                md.name(resp.profile.nickname);
            });
        }
        else{
            md.occupied = false;
            md.title.text = 'Sit Down';
            md.systemId = null;
            md.name('Craps Dealer');
            md.avatar.icon.texture = PIXI.Texture.from('assets/player.png');
        }
        md.update(d.balance);    
    }
    function cp_on_puck(spuck){
        if(spuck.on === true){
            puck.status.text = 'ON';  
            if(spuck.point === 4){
                puck.update(_ctable.place4.container.x);
            }
            else if(spuck.point === 5){
                puck.update(_ctable.place5.container.x);    
            }
            else if(spuck.point === 6){
                puck.update(_ctable.place6.container.x);
            }
            else if(spuck.point === 8){
                puck.update(_ctable.place8.container.x);
            }
            else if(spuck.point === 9){
                puck.update(_ctable.place9.container.x);
            }
            else if(spuck.point === 10){
                puck.update(_ctable.place10.container.x);
            }
        }
        else{
            puck.status.text = 'OFF';
            puck.update(0);
        }    
    }
    function cp_on_statistics(st){
        //console.log(st);
        //sb.list[st.index].name = st.key;
        //sb.list[st.index].value = st.value;
        //sb.list[st.index].set();
    }
    function cp_on_idle(idl){
        console.log(idl);
    }
    function craps_wager(lineId,x,y,ix){
        CrapsGame.wager(lineId,wagerBar.wager,x,y,ix,function(resp){
            if(resp.code == 2){
                get_more_chips();
            }
        });    
    }
    function get_more_chips(){
        //mp.background.background.tint =  Math.random()*0xffffff;
        let wp = wsize();
        cashInView.position(sc,(wp.width-cashInView.width*sc)/2,(wp.height-cashInView.height*sc)/2);
        cashInView.open();
        //cashInView.avatar.texture = PIXI.Texture.from(gameObject.profile.avatar+'?token='+TARA_API.query().token);
        let _payload = {serviceTag:"presence",command:"onBalance"};
        TARA_API.onService(_payload,function(resp){
            cashInView.balance = resp.presence.balance;
            cashInView.set();
        });   
    }
</script>
