    <script>
        var currentModule;
        //var _robotoFamily = "Roboto,Arial";//Arial as backup
        //var _robotoDensFamily = "\'Roboto Condensed\',Arial";//Arial as backup
        //var _oswaldFamily = 'Oswald, Arial';
        //var _felipaFamily = 'Felipa, Arial';
        
        document.querySelectorAll('.tx-lobby').forEach(function(a){
            a.onclick = _open_lobby;     
        });
        function _ready(){
            WebFont.load({
              google: {
                families: ['Felipa','Oswald'],
              },
              fontloading : function(){
                    //console.log("loading");     
              },    
              active: function() {
                    //console.log("loaded");  
              }
            });
            TARA_API.onIndex(function(vb){
                let lb = vb.descriptor;
                let ix = document.querySelector('#'+lb.typeId);
                if(ix){
                    ix.setAttribute('view-id',lb.viewId);
                    ix.querySelector('#'+lb.typeId+'-name').innerHTML = lb.name;
                    ix.querySelector('#'+lb.typeId+'-icon').src = lb.icon;
                    ix.querySelector('#'+lb.typeId+'-desc').src = lb.description;
                }
            }); 
            if(window.orientation){
                window.addEventListener('orientationchange',_resize,false);
                //window.addEventListener('deviceorientation',_resize,false);
            }else{
                window.addEventListener('resize',_resize,false);
            }
        }
        function _view(setup){
            TARA_API.onView(setup.viewId,function(v){
                //load js module if v.moduleFile 
                if(v.moduleFile){
                    TARA_API.onResource({name:v.moduleFile,flag:v.flag,type:'text/javascript'},function(j){
                        if(!window[v.moduleName]){
                            let md = document.createElement('script');
                            md.appendChild(document.createTextNode(j));
                            document.head.appendChild(md);
                        }
                        window[v.moduleName].setup(setup);    
                        currentModule = v.moduleName;
                        _view_load(v,setup.containerId);    
                    });    
                }
                else{
                    _view_load(v,setup.containerId);
                }
            });   
        }
        function _view_load(v,cid){
            TARA_API.onResource({name:v.moduleResourceFile,flag:v.flag,type:'text/html'},function(h){
                let m0 = document.querySelector(cid);
                m0.insertAdjacentHTML("afterbegin",h);   
                _api_script(m0,function(exe){
                    m0.style.display = 'block';
                });
            });
        }
        function _api_script(p,callback) {
            let exe = p.querySelector('script');
            new Function(exe.textContent).call();
            callback(exe);
        }
        function _resize(e){
            try{
                if(currentModule){
                    window[currentModule]['swap']();
                }
            }catch(err){}//ignore errors
        }
        function _open_lobby(){
            let vid = this.getAttribute('view-id');
            let typeId = this.getAttribute('id');
            if(TARA_API.query().systemId){
                fullscreen();
                _view({viewId:vid,containerId:'#m1',typeId:typeId});
            }
            else{
                TARA_API.query().target = {viewId:vid,containerId:'#m1',typeId:typeId};
                _view({viewId:'authentication',containerId:'#m3'});
            }
        }
        function _open_buy(){
            if(TARA_API.query().systemId){
                _view({viewId:'shopping',containerId:'#m3'});
            }
            else{
                TARA_API.query().target = {viewId:'shopping',containerId:'#m3'};
                _view({viewId:'authentication',containerId:'#m3'});
            }
        }
        function fullscreen(){
            if(screenfull.enabled&&(!screenfull.isFullscreen)){
                screenfull.request();
            }
        }
        function normalscreen(){
            if(screenfull.enabled&&(screenfull.isFullscreen)){
                screenfull.exit();
            }     
        }
        function wsize(){
            let _portrait = (window.innerWidth<window.innerHeight); 
            if(window.orientation){
                _portrait = window.orientation == 0 || window.orientation == 180;
            }
            let ws = {portrait:_portrait};
            if( window.navigator.standalone && (!_portrait)){
                ws.height =  screen.width;            
                ws.width = screen.height;
            }
            else{
                ws.width = window.innerWidth;
                ws.height = window.innerHeight;
            }
            ws.scale = screen.width<800?screen.width/800:1;
            return ws;
        }
