<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-sign-in-close" class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-12">CLOSE</span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>

        <div style="width: 240px; margin: auto"><div id="tx-google-button"></div></div>            
    </div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-sign-in-message"></div> 
    <div class="w3-container w3-border-bottom w3-border-red">
        <div class="w3-panel">
            <input id ="tx-user-name" class="w3-input w3-round w3-border" type="text" placeholder='user name'/>
        </div>
        <div class="w3-panel">    
             <input id ="tx-password" class="w3-input w3-round w3-border" type="password" placeholder='password'/>
        </div>
        <div class="w3-panel">
            <span id="tx-forget-password" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-12 tx-margin-top-8 tx-margin-bottom-8">Forget Password</span>  
            <span id="tx-sign-in" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-margin-top-8 tx-margin-bottom-8">Sign In</span>     
        </div>
    </div>
</div>
<script>
    tx_on_google_auth();
    document.querySelector("#tx-sign-in").onclick=()=>{
        let _n = document.querySelector('#tx-user-name').value;
        let _p = document.querySelector('#tx-password').value;
        TARA_API.onLogin({login:_n,password:_p},function(resp){
            if(resp.successful){
                tx_on_login();              
            }
            else{
                document.querySelector("#tx-sign-in-message").innerHTML=resp.message;
            }
        });            
    };
    document.querySelector('#tx-sign-in-close').onclick=()=>{
        if(TARA_API.query().context){
            let mx = document.querySelector(TARA_API.query().context);
            mx.innerHTML="";
            mx.style.display = 'none';    
        }
        let m3 = document.querySelector('#m3');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function tx_on_login(){
        let m3 = document.querySelector('#m3');
        m3.innerHTML="";
        m3.style.display = 'none'; 
        document.querySelector("#tx-sign-up").innerHTML="SIGN OUT";
    }
    function tx_on_google_auth(){
        let m = document.getElementsByTagName('head')[0];
        let m1 = document.createElement('meta');
        m1.name = 'google-signin-scope';
        m1.content = 'profile email';
        m.parentNode.insertBefore(m1,m);
        let m2 = document.createElement('meta');
        m2.name = 'google-signin-client_id';
        m2.content = '325699289998-8nfdbuao6kcn5a0kqtikkelpfu7qnv9n.apps.googleusercontent.com';//TARA_API.query().google.clientId;
        m.parentNode.insertBefore(m2,m);    
        let glib = document.createElement('script');
        glib.type = 'text/javascript';
        glib.async = true;
        glib.defer = true;
        glib.src = 'https://apis.google.com/js/platform.js';
        glib.onload = renderButton;
        let t = document.getElementsByTagName("script")[0];
        t.parentNode.insertBefore(glib,t); 
    }
    function renderButton() {
        gapi.signin2.render('tx-google-button', {
            'width': '240px',
            'height': '48px',
            'longtitle': true,
            'theme': 'dark',
            'onsuccess': onSignIn,
            'onfailure': function(err){console.log(err);},
        });
    }
    function onSignIn(googleUser) {
        let uid = googleUser.getBasicProfile().getEmail();
        console.log(uid);
        console.log(googleUser.getBasicProfile().getId());
        tx_on_login();

            }else{

</script>
