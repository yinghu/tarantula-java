<script>
    TARA_API.onService(true,{serviceTag:'role/account',command:'onUserList'},(resp)=>{
        if(resp.successful){
             console.log(resp);   
             resp.userList.forEach((a,i)=>{
                 document.querySelector('#tx-user-list-'+i).style.display='block';
                 document.querySelector('#tx-list-user-'+i+'-0').innerHTML = a.name;
                 document.querySelector('#tx-list-user-'+i+'-1').innerHTML = a.role;
                 document.querySelector('#tx-list-user-'+i+'-2').setAttribute('tx-user-list-id',a.oid);
             });
        }else{
            document.querySelector('#tx-user-list-message').innerHTML = resp.message;
        }        
    });
    document.querySelectorAll('.tx-user-upgrade').forEach((a,i)=>{
        a.onclick = ()=>{
            let vid = a.getAttribute('view-id');
            tx_view({viewId:vid,containerId:'#tx-popup-api'});    
        };
    });
    document.querySelector('#tx-user-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
