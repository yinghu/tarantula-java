<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-user-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">USER LIST</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-user-list-message"></div>
    <div id='tx-user-access-list-bar' class="w3-container">

    </div>
  
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <div class="w3-card-4 w3-border w3-round w3-white tx-ok-checkout" id="tx-list-user-enable-access">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
            <div class="w3-display-topright w3-padding">
                <!--<span><i class="fa fa-close" style="font-size:12px"></i></span>-->            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:24px"></i></span>
                <span class="tx-margin-left-8 tx-text-18">Confirmation</span>
            </div>
        </div>
        <div id="tx-list-user-enable-access-message" class="w3-panel w3-center w3-border-bottom w3-border-red tx-text-14"></div>
        <div class="w3-panel w3-border-bottom w3-border-red">
            <span id="tx-list-user-enable-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>     
        
            <span id="tx-list-user-enable-ok" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Confirm</span>     
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>
</div>
<script>
    let targetUpdagraded;
  
    _list_user();

    document.querySelector('#tx-list-user-enable-ok').onclick=()=>{
        TARA_API.onService(true,{serviceTag:'role/account',command:'onUpgradeUser',accessId:targetUpdagraded},(resp)=>{
            document.querySelector('#tx-list-user-enable-access-message').innerHTML = resp.message+'/'+resp.successful;  
            document.querySelector('#tx-list-user-enable-access').style.display='none';    
            _list_user();
        });
    };
    document.querySelector('#tx-list-user-enable-cancel').onclick=()=>{
        document.querySelector('#tx-list-user-enable-access').style.display='none';
    };
    document.querySelector('#tx-user-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function _list_user(){
        TARA_API.onService(true,{serviceTag:'role/account',command:'onUserList'},(resp)=>{
            if(resp.successful){
                //console.log(resp);  
                let ubar = document.querySelector('#tx-user-access-list-bar');
                ubar.innerHTML = ''; 
                
                resp.userList.forEach((a,i)=>{
                    let tem = [];
                    tem.push('<div class=\'w3-display-container w3-border w3-border-red tx-content-64\'>');
                    tem.push('<div class=\'w3-display-topleft w3-padding\'>');
                    tem.push('<span><i class=\'fa fa-user-o\' style=\'font-size:18px; color: orange\'></i></span></div>');
                    tem.push('<div class=\'w3-display-topright w3-padding\'><span class=\'tx-text-12\'>');
                    tem.push(a.name);
                    tem.push('</span></div><div class=\'w3-display-bottomleft w3-padding\'><span class=\'tx-text-12\'>');
                    tem.push('Role :'+a.role);
                    tem.push('</span></div><div class=\'w3-display-bottomright w3-padding\'><span tx-user-list-id=\'');
                    tem.push(a.oid+'\' tx-user-access=\'');
                    tem.push(a.role=='player'?'false':'true');    
                    tem.push('\' class=\'w3-tag w3-right w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-user-upgrade\'>');
                    tem.push(a.role=='player'?'Grant':'Revoke');
                    tem.push('</span></div></div>');  
                    tem.push('<div class=\'w3-display-container w3-white tx-content-8\'></div>');          
                  
                    ubar.innerHTML += tem.join('');
                });
                document.querySelectorAll('.tx-user-upgrade').forEach((a,i)=>{
                    a.onclick = ()=>{
                        targetUpdagraded = a.getAttribute('tx-user-list-id');
                        let uac = a.getAttribute('tx-user-access');
                        if(uac == 'true'){
                            document.querySelector('#tx-list-user-enable-access-message').innerHTML='Are you sure to revoke access from the user?';
                        }
                        else{
                            document.querySelector('#tx-list-user-enable-access-message').innerHTML='Are you sure to grant access to the user?';
                        }
                        document.querySelector('#tx-list-user-enable-access').style.display='block';    
                    };
                });
            }else{
                document.querySelector('#tx-user-list-message').innerHTML = resp.message;
            }        
        });    
    }
</script>
