<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-enable-jvm-metrics-close"><i class="fa fa-close" style="font-size:12px"></i></span>
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">SERVICE METRICS VIEW</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-enable-jvm-metrics-message"></div>
    <div class="w3-panel w3-border-bottom w3-border-white">
        <div class="w3-panel">
            <label class="tx-text-12 tx-margin-right-4">Game Service Providers :</label>
            <select id='tx-service-name' class="w3-select w3-border w3-round tx-text-12" name='mode'>
                <option value="" disabled selected>Choose A Service</option>
                <option value="tarantula">Data Store Provider</option>
                <option value="UDPEndpoint">UDP End point</option>
                <option value="MirrorClusterBackup">Mirror Cluster Backup</option>   
            </select>
        </div>
        <div class="w3-panel">
            <span id="tx-enable-jvm-metrics" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">View</span>
        </div>
    </div>
    <div class="w3-panel  tx-text-14">
        <div id="jsoneditor-service-view" style="width: 100%;"></div> 
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
     const options ={
        mode : 'tree',
        onCreateMenu:(items, node)=>{
            return [];
        }
    };
    let _serviceSelected = 'tarantula';
    let editor = new JSONEditor(document.querySelector("#jsoneditor-service-view"),options,{});
    document.querySelector('#tx-service-name').onchange = ()=>{
        _serviceSelected = document.querySelector('#tx-service-name').value;
    };
    document.querySelector('#tx-enable-jvm-metrics').onclick=()=>{
        //let _tc = document.querySelector('#tx-service-name').value;
        TARA_API.onGet('role/sudo','onEnableServiceView',_serviceSelected,(resp)=>{
            editor.set(resp);
        });
    };
    document.querySelector('#tx-enable-jvm-metrics-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';
    };
</script>
