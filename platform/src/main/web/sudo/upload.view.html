<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-upload-view-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cloud-upload" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">UPLOAD FILE</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class='w3-panel'>
        <span class="w3-padding w3-left w3-text-red tx-text-12" id="tx-upload-view-message">
        </span>
        <span class="w3-padding w3-right w3-text-orange tx-margin-right-16" id="tx-upload-view-spin">
            <i class="fa fa-spinner fa-spin" style="font-size:24px"></i>
        </span>
    </div> 
    <div class="w3-panel w3-border-bottom w3-border-white">
        <div class="w3-panel">
            <div class="w3-left">
                <span class="w3-text-green tx-margin-right-8"><i class="fa fa-file" style="font-size:24px"></i></span>
                <label for="tx-view-file" class="tx-file-upload w3-round">
                    <span class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button">Choose File</span>
                </label>
                <input id ="tx-view-file" type="file"/>
            </div>
            <div class="w3-right" id='tx-upload'>
                <span class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button">Upload</span>
            </div>
        </div>
    </div>    
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-upload-view-message").innerHTML= 'Choose file to upload (html,js,json,jar,png,jpeg)';
    document.querySelector("#tx-upload").style.display='none';
    document.querySelector("#tx-upload-view-spin").style.display='none';
    let _fd;  
    let _data;  
    document.querySelector("#tx-view-file").onchange = (e)=>{
        _fd = e.target.files[0];
        document.querySelector("#tx-upload-view-message").innerHTML = _fd.name;
        var reader = new FileReader();
        reader.onloadend = (fe)=>{
            _data = reader.result;
            document.querySelector("#tx-upload").style.display = 'block'; 
        };
        reader.readAsArrayBuffer(_fd); 
    }; 
    document.querySelector("#tx-upload").onclick=()=>{
        let sfx = _fd.name.split('.').pop();
        let ctype = 'text/html';
        if(sfx === 'js'){
            ctype = 'text/javascript';
        }
        else if(sfx === 'jar'){
            ctype = 'application/java-archive';
        }
        else if(sfx ==='json'){
            ctype = 'application/json';
        }
        else if(sfx==='png'){
            ctype = 'image/png';
        }
        else if(sfx==='jpg'||sfx==='jpeg'){
            ctype = 'image/jpeg';
        }
        document.querySelector("#tx-upload-view-spin").style.display='block';
        TARA_API.onUpload(_data,_fd.name,ctype,'root',(resp)=>{
            if(!resp.successful){
                document.querySelector("#tx-upload-view-message").innerHTML = resp.message; 
            }else{   
                console.log("deploy view->"+_fd.name+"//"+ctype);
                document.querySelector("#tx-upload-view-spin").style.display='none';
                document.querySelector("#tx-upload-view-message").innerHTML = resp.message; 
            }
        });
    };
    document.querySelector('#tx-upload-view-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
