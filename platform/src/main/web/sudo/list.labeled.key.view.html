<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-list-labeled-key-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-key" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">LIST ACCESS KEY</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class='w3-panel' id="tx-labeled-key-list">
    </div>     
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let keyBar = document.querySelector('#tx-labeled-key-list');
    TARA_API.onGet('role/sudo','onLabeledKeyList',"",(resp)=>{
        if(resp.successful){
            tx_labeled_key_bar_reset(resp);
        }      
    });
    document.querySelector('#tx-list-labeled-key-close').onclick=()=>{
        tx_close_current_page();       
    };
    function tx_labeled_key_bar_reset(resp){
        keyBar.innerHTML ='';
        resp.accessKeyList.forEach((gi)=>{
            let tem = [];
            tem.push('<div class=\'w3-container\'>');
            tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8\'><i class=\'fa fa-hourglass-1\' style=\'font-size:24px;color:blue\'></i></span>');
            tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16\'>');
            tem.push(gi.label+"#"+gi.accessKey);
            tem.push('</span><span tx-access-key=\''+gi.accessKey+'\'');
            tem.push(' class=\'w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-labeled-access-key-revoke\'>Revoke</span>');
            tem.push('</div>'); 
            keyBar.innerHTML += tem.join('');  
        });
        document.querySelectorAll('.tx-labeled-access-key-revoke').forEach(a=>{
            a.onclick=()=>{
                let itemId = a.getAttribute('tx-access-key');
                TARA_API.onGet('role/sudo','onRevokeLabeledKey',itemId,(resp)=>{
                    if(resp.successful){
                        tx_labeled_key_bar_reset(resp);
                    }        
                });
            };
        });
    }
</script>
