<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-data-count-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Data Store List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-panel  w3-border-bottom w3-border-red">
        <div class="w3-container">
            <span id='tx-data-store-view' class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-bottom-8 tx-margin-left-12">View</span>
        </div>    
    </div> 
    <div class="w3-panel">
        <div id="jsoneditor-data-store-list" style="width: 100%;"></div> 
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    const options ={
        mode : 'tree',
        onCreateMenu : (items, node)=>{
            return [];
        }
    };
    
    let editor = new JSONEditor(document.querySelector("#jsoneditor-data-store-list"),options,{});
    TARA_API.onService(false,{serviceTag:'role/sudo',command:'onListDataStore'},(resp)=>{
        editor.set(resp);                          
    });
    document.querySelector('#tx-data-store-view').onclick =()=>{
        TARA_API.query().popup='#tx-popup-api';
        tx_view({viewId:'data.store.load',containerId:'#tx-popup-api'});  
    };
    document.querySelector('#tx-data-count-list-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function _log(){
        console.log('open update page');
    }
</script>
