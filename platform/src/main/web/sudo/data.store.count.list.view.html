<script>
    TARA_API.onService(false,{serviceTag:'role/sudo',command:'onDataStoreCountList'},(resp)=>{
        if(resp.successful){
            console.log(resp);
            document.querySelector('#tx-AccessIndex-c').innerHTML = resp.AccessIndex; 
            document.querySelector('#tx-User-c').innerHTML = resp.User;
            document.querySelector('#tx-Account-c').innerHTML = resp.Account;
            document.querySelector('#tx-Presence-c').innerHTML = resp.Presence;
            document.querySelector('#tx-Subscription-c').innerHTML = resp.Subscription;
            document.querySelector('#tx-Purchase-c').innerHTML = resp.Purchase; 
            document.querySelector('#tx-System-c').innerHTML = resp.System;                  
        }
        else{
            document.querySelector('#tx-data-count-list-message').innerHTML=resp.message;
        }        
    });
    document.querySelector('#tx-data-count-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
