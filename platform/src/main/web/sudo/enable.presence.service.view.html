<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-enable-presence-service-close"><i class="fa fa-close" style="font-size:12px"></i></span>
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Presence Service Enable</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-enable-presence-service-message"></div>
    <div><!-- send form -->
        <div class="w3-panel">
            <label class="tx-text-12">Remote User</label>
            <input id ="tx-enable-presence-service-codebase" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='User Name'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Remote Password</label>
            <input id ="tx-enable-presence-service-artifact" class="w3-input w3-round w3-border tx-text-16" type="password" placeholder='Password'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Cluster Name Suffix</label>
            <input id ="tx-enable-presence-service-suffix" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='Cluster Name Suffix'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Host</label>
            <input id ="tx-enable-presence-service-version" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='Host'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Local Password</label>
            <input id ="tx-enable-presence-service-password" class="w3-input w3-round w3-border tx-text-16" type="password" placeholder='Password'/>
        </div>
        <div class="w3-panel">
            <span id="tx-enable-presence-service" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Enable</span>
        </div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-enable-presence-service').onclick=()=>{
        let _c = document.querySelector('#tx-enable-presence-service-codebase').value;
        let _a = document.querySelector('#tx-enable-presence-service-artifact').value;
        let _s = document.querySelector('#tx-enable-presence-service-suffix').value;
        let _v = document.querySelector('#tx-enable-presence-service-version').value;
        let _p = document.querySelector('#tx-enable-presence-service-password').value;
        TARA_API.onService(true,{serviceTag:'role/sudo',command:'onEnablePresenceService',user:_c,password:_a,host:_v,suffix:_s,localPassword:_p},(resp)=>{
            document.querySelector('#tx-enable-presence-service-message').innerHTML = resp.message;
        });
    };
    document.querySelector('#tx-enable-presence-service-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
