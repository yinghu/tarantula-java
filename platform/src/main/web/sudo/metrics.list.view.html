<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-metrics-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Metrics List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
    <div class="w3-panel">  
        <div class='w3-bar w3-white'>
            <span tx-metrics-category='access' class='w3-bar-item w3-tag w3-right w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-left-4 tx-metrics-action'>Access</span>   
            <span tx-metrics-category='performance' class='w3-bar-item w3-tag w3-right w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-left-4 tx-metrics-action'>Performance</span>   
            <span tx-metrics-category='payment' class='w3-bar-item w3-tag w3-right w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-left-4 tx-metrics-action'>Payment</span>   
        </div>
    </div>    
    <div class="w3-panel">
        <div id="jsoneditor-metrics-list" style="width: 100%;"></div> 
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    const options ={
        mode : 'tree',
        onCreateMenu : (items, node)=>{
            return [];
        }
    };
    let mname = 'performance';
    let editor = new JSONEditor(document.querySelector("#jsoneditor-metrics-list"),options,{});
    _on_metrics();
    document.querySelector('#tx-metrics-list-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelectorAll('.tx-metrics-action').forEach((a)=>{
        a.onclick =()=>{
            mname = a.getAttribute('tx-metrics-category');
            _on_metrics();
        };
    });
    function _on_metrics(){
        TARA_API.onGet('role/sudo','onMetrics',mname,(resp)=>{
            editor.set(resp);                          
        });
    }
</script>
