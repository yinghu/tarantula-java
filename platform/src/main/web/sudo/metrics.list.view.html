<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-metrics-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Metrics List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
    <div class="w3-display-container w3-white tx-content-16"></div>
    <div class="w3-container">
        <div><span class="tx-text-12">Cluster Node List :</span></div>
        <div class="w3-container w3-padding-small" id="tx-metrics-cluster-node-list">
        </div>
    </div>
    <div class="w3-row">
    <div class="w3-third w3-container">
        <label class="tx-text-12 tx-margin-right-4">Metrics Type :</label>
        <select id='tx-metrics-type' class="w3-select w3-border w3-round tx-text-12" name='metricsType'>
            <option value="performance" selected>Performance</option>
            <option value="access">Access</option>
            <option value="payment">Payment</option>
            <option value="system">System</option>
            <option value="deployment">Deployment</option>  
        </select>
    </div>
    <div class="w3-third w3-container">
        <label class="tx-text-12 tx-margin-right-4">Metrics Category :</label>
        <select id='tx-metrics-category' class="w3-select w3-border w3-round tx-text-12" name='metricsCategory'>
            <option value="hourly" selected>Hourly</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>  
        </select>
    </div>
    <div class="w3-third w3-container">
        <label class="tx-text-12 tx-margin-right-4">Metrics Data :</label>
        <select id='tx-metrics-data' class="w3-select w3-border w3-round tx-text-12" name='metricsData'>
            
        </select>
    </div>
    </div>
    <div class="w3-panel">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Metrics Archive View</legend>
            <div class="w3-container">
                <div class="w3-panel w3-center w3-text-red tx-text-10" id="tx-select-error-message"></div> 
                <div class="w3-panel">
                    <label class="tx-text-12 tx-margin-right-4 w3-text-red">Select end date and mark checkbox</label>
                    <input id='tx-metrics-history-enabled' class="w3-check tx-text-12" type="checkbox">
                </div>
                <div class="w3-panel">
                    <label class="tx-text-12 tx-margin-right-4">End Date :</label></br>
                    <input id='tx-metrics-history-end-date' class="w3-date-local tx-text-12" type="datetime-local">
                </div>
            </div>
        </fieldset>
    </div>
    <div class="w3-panel">
        <canvas id="tchart"></canvas>
    </div>
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-right-4">Chart Type :</label>
        <select id='tx-chart-type' class="w3-select w3-border w3-round tx-text-12" name='chart'>
            <option value="bar" selected>Bar</option>
            <option value="line">Line</option>   
        </select>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
   
    let _metricsBar = document.querySelector('#tx-metrics-data');
    let _nodeBar = document.querySelector('#tx-metrics-cluster-node-list');
    let _metricsLoaded = 'loading';
    let _request = 'runtime';
    let _timer;
    let _nodeSelected ={};
    let _command ={type:'performance',category:'',classifier:'hourly',endDate:''};
    _start_metrics_timer();
    const data = {datasets: []};
    const config = {type: 'bar',data: data,options: {responsive: true,maintainAspectRatio: false,scales: {y: {beginAtZero: true}}}};
    Chart.defaults.font.family = 'Oswald';
    const chart = new Chart(document.querySelector("#tchart"),config);
    

    document.querySelector('#tx-chart-type').onchange = ()=>{
        let chartType = document.querySelector('#tx-chart-type').value;
        config.type = chartType;
        chart.update();
    };
    document.querySelector('#tx-metrics-type').onchange = ()=>{
        if(_metricsLoaded == 'loading') return;
        _metricsLoaded = 'loading';
        _command.type = document.querySelector('#tx-metrics-type').value;
        _load_metrics_categories();
    };

    document.querySelector('#tx-metrics-category').onchange = ()=>{
        if(_metricsLoaded == 'loading') return;
        _metricsLoaded = 'loading';
        _command.classifier= document.querySelector('#tx-metrics-category').value;
        _register_metrics();
    };

    document.querySelector('#tx-metrics-data').onchange = ()=>{
        if(_metricsLoaded == 'loading') return;
        _metricsLoaded = 'loading';
        _command.category = document.querySelector('#tx-metrics-data').value;
        _register_metrics();
    };
    document.querySelector('#tx-metrics-history-enabled').onchange = ()=>{
        if(_metricsLoaded == 'loading') return;
        _metricsLoaded = 'loading';
        let ched = document.querySelector('#tx-metrics-history-enabled').checked;
        if(ched){
            let _endDate = document.querySelector("#tx-metrics-history-end-date").value;
            if(_endDate ==''){
                document.querySelector('#tx-metrics-history-enabled').checked = false;
                document.querySelector('#tx-select-error-message').innerHTML = 'Select end date first';    
                return;
            }
            if(!_tx_at_least_one_day_passed(_endDate)){
                document.querySelector('#tx-metrics-history-enabled').checked = false;
                document.querySelector('#tx-select-error-message').innerHTML = 'Select date passed at least one day';    
                return;
            }
            _command.endDate = _endDate;
            document.querySelector('#tx-select-error-message').innerHTML = '';  
            _request = "archive";
        }
        else{
            delete _command['endDate'];
            _request = "runtime";
        }
        _register_metrics();
    };
    document.querySelector('#tx-metrics-list-close').onclick=()=>{
        clearTimeout(_timer);
        chart.destroy();
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    _load_metrics_categories();
    function _load_metrics_categories(){
        _metricsLoaded = 'loading';
        TARA_API.onGet('role/sudo','onMetricsCategory',_command.type,(resp)=>{
            let tem =[];
            _metricsBar.innerHTML='';
            resp.categories.forEach((category,i) => {
                if(i==0){
                    _command.category = category;
                    tem.push('<option value=\''+category+'\' selected>'+category+'</option>');
                }else{
                    tem.push('<option value=\''+category+'\'>'+category+'</option>');
                }
            });
            _metricsBar.innerHTML = tem.join('');

            let tem1 =[];
            _nodeBar.innerHTML = '';
            resp.cluster.forEach(a=>{
                tem1.push('<label class=\'w3-tag w3-round-large tx-text-10 tx-margin-left-4 tx-margin-right-4\' style=\'background-color: '+a.chart.backgroundColor+ '\'>'+a.nodeName+'</label>');
                tem1.push('<input tx-node-member-id=\''+a.memberId+'\'');
                tem1.push(' class=\'w3-check tx-text-10 tx-metrics-node-picker\' checked type=\'checkbox\'>');   
                _nodeSelected[a.memberId]=a.chart;
                _nodeSelected[a.memberId].selected = true;        
            });
            _nodeBar.innerHTML = tem1.join('');
            document.querySelectorAll('.tx-metrics-node-picker').forEach(a=>{
                a.onchange = ()=>{
                    let memberId = a.getAttribute('tx-node-member-id');
                    _nodeSelected[memberId].selected = a.checked;
                };
            });
            _register_metrics();
        }); 
    }
    function _register_metrics(){
        TARA_API.onSet('role/sudo','onMetricsRegister','',_command,(resp)=>{
            if(resp.successful) {
                _command.queryId = resp.message;
                _tx_empty_arr(data.datasets);
                chart.update();
                _metricsLoaded = '';
            }
        });
    }
    function _load_metrics(){
        if(_request == 'runtime'){
            TARA_API.onSet('role/sudo','onMetrics','',_command,(resp)=>{
                _tx_empty_arr(data.datasets);
                if(resp.successful){
                    resp.metrics.forEach(a=>{
                        let mid = a.memberId;
                        let ct = _nodeSelected[mid];
                        if(ct.selected){
                            a.label = _command.type+"/"+_command.classifier+"/"+_command.category;
                            a.backgroundColor = ct.backgroundColor;
                            a.borderColor = ct.borderColor;
                            a.borderWidth = ct.borderWidth;
                            a.pointBorderWidth = ct.pointBorderWidth;
                            a.pointRadius = ct.pointRadius;
                            a.cubicInterpolationMode = ct.cubicInterpolationMode;
                            data.datasets.push(a);
                        }
                    });
                    chart.update();
                }
            });
        } 
        else if(_request == 'archive'){ //load archive
            _request = '';//one time archive load
            TARA_API.onGet('role/sudo','onMetricsArchive',_command,(resp)=>{
                console.log(resp);
                if(resp.successful){
                    //data.datasets[0].data = resp.metrics;
                    //chart.update();
                }
            });        
        }
    }

    function _start_metrics_timer(){
        _timer = setInterval(()=>{
            if(_metricsLoaded != 'loading'){
                _load_metrics();
            }     
        },10000);
    }
    function _tx_at_least_one_day_passed(dateSelected){
        let td = new Date();
        let sd = new Date(dateSelected);
        return 86400000 < td.getTime()-sd.getTime();
    }
    function _tx_empty_arr(arr){
        while(arr.length>0){
            arr.pop();
        }
    }
</script>
