<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-key-index-data-count-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Index Data Store List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-panel  tx-margin-bottom-8">
        <div class="w3-container">
            <label class="tx-text-14 tx-margin-right-4">Index Store Key Selection :</label>
            <select id='tx-key-index-data-store-key-list' class="w3-select w3-border w3-round tx-text-12" name='dataStoreKey'>
            </select>
        </div>
    </div>
    <div class="w3-panel tx-margin-bottom-8">
        <div class="w3-row">
            <div class="w3-half w3-container">
                <label class="tx-text-12">Index Store Key Start Index :</label>
                <input id ="tx-key-index-data-store-key-index" class="w3-input w3-round w3-border tx-text-16" type="number" value="0"/>
            </div>
            <div class="w3-half w3-container">
                <label class="tx-text-12">Index Store Key List Size :</label>
                <input id ="tx-key-index-data-store-key-list-size" class="w3-input w3-round w3-border tx-text-16" type="number" value="10"/>
            </div>   
        </div>    
    </div>
    <div class="w3-panel">
        <div class="w3-container w3-border-bottom w3-border-red">
            <span id='tx-key-index-data-store-key-reload' class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-bottom-8 tx-margin-left-12">Reload Keys</span>
            <span id='tx-key-index-data-store-view' class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-bottom-8 tx-margin-right-12">Load Value</span>
        </div>    
    </div> 
    <div class="w3-panel">
        <div class="w3-container">
            <div class="w3-panel w3-border-bottom w3-border-red">
                <div class='w3-bar w3-white'>
                    <span id='tx-key-index-data-store-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
                    <span id='tx-key-index-data-store-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
                    <span id='tx-key-index-data-store-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>                
                </div>            
            </div> 
            <div id="jsoneditor-key-index-data-store-list" style="width: 100%;"></div>
        </div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    const options ={
        mode : 'tree',
        onCreateMenu : (items, node)=>{
            return [];
        }
    };
    
    let editor = new JSONEditor(document.querySelector("#jsoneditor-key-index-data-store-list"),options,{});
    let keyPanel = document.querySelector('#tx-key-index-data-store-key-list');
    let keySelected = '';
    keyPanel.onchange = ()=>{
        keySelected = keyPanel.value;
    };
    _tx_load_store_keys();
    document.querySelector('#tx-key-index-data-store-key-reload').onclick =()=>{
        _tx_load_store_keys();
    };
    document.querySelector('#tx-key-index-data-store-view').onclick =()=>{
        //console.log(key-index-dataStoreSelected+'#'+keySelected);
        TARA_API.onGet('role/sudo/datastore','onAccessIndexStoreValue',keySelected,(resp)=>{
            editor.set(resp);                          
        }); 
    };
    document.querySelector('#tx-key-index-data-count-list-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();       
    };
    document.querySelector('#tx-key-index-data-store-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-key-index-data-store-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-key-index-data-store-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function _tx_load_store_keys(){
        keyPanel.innerHTML = '';
        let kindx = document.querySelector('#tx-key-index-data-store-key-index').value;
        let ksize = document.querySelector('#tx-key-index-data-store-key-list-size').value;
        TARA_API.onGet('role/sudo/datastore','onKeyIndexStore',kindx+'#'+ksize,(resp)=>{
            editor.set(resp);
            resp.keys.forEach((k,i)=>{
                if(i==0) keySelected = k.key;
                keyPanel.innerHTML += TARA_HTML.option(k.key,k.key,i==0);
            });                          
        }); 
    }
</script>
