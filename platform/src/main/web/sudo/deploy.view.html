<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-deploy-view-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">DEPLOY VIEW</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-deploy-view-message"></div> 
    <div class="w3-panel w3-border-bottom w3-border-white">
        <div class="w3-panel">
            <label class="tx-text-12">Type Id</label>
            <select class="w3-select tx-text-14" name="option" id='tx-view-type-id'>
                <option value="presence" selected>Presence (view context start with presence)</option>
                <option value="sudo-role">Sudo (view context start with sudo)</option>
                <option value="admin-role">Admin (view context start with admin)</option>
                <option value="account-role">Account (view context start with account)</option>
                <option value="index">Resource (view context start with resource)</option>
                <option value="index">Index (view context start with root)</option>
            </select>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">View Id</label>
            <input id ="tx-view-id" class="w3-input w3-round w3-border tx-text-14" type="text" placeholder='view id'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">View Context (eg : presence/game/tictactoe/v1 )</label>
            <input id ="tx-view-content-url" class="w3-input w3-round w3-border tx-text-14" type="text" placeholder='view context'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Resource Name</label>
            <input id ="tx-view-resource-name" class="w3-input w3-round w3-border tx-text-14" type="text" placeholder='view resource'/>
        </div>
        <div class="w3-panel">
            <span id="tx-deploy-view" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Deploy View</span>     
        </div>   
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-deploy-view-message").innerHTML= 'Create view';
    document.querySelector('#tx-deploy-view').onclick=()=>{
        let _t = document.querySelector('#tx-view-type-id').value;
        let _c = document.querySelector('#tx-view-content-url').value;
        let _i = document.querySelector('#tx-view-id').value;
        let _n = document.querySelector('#tx-view-resource-name').value;
        TARA_API.onService(true,{serviceTag:'role/sudo',command:'onDeployView',typeId:_t,deployUrl:_c,viewId:_i,resourceName:_n},(resp)=>{
            //console.log(resp);
            TARA_API.resetView(_i);
            document.querySelector('#tx-deploy-view-message').innerHTML = resp.message;        
        });        
    };
    document.querySelector('#tx-deploy-view-close').onclick=()=>{
        tx_close_current_page();  
    };
</script>
