<script>
    TARA_API.onService(false,{serviceTag:'role/sudo',command:'onUserList'},(resp)=>{
        if(resp.successful){
            resp.userList.forEach((a,i)=>{
                let line = document.querySelector('#tx-login-list-'+i);
                if(line){ 
                    document.querySelector('#tx-login-list-name-'+i).innerHTML=a.name;
                    document.querySelector('#tx-login-list-role-'+i).innerHTML=a.role;
                    line.style.display='block';
                }
            });                
        }
        else{
            document.querySelector('#tx-login-list-message').innerHTML=resp.message;
        }        
    });
    document.querySelector('#tx-login-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
