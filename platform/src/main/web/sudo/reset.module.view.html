<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-reset-module-close"><i class="fa fa-close" style="font-size:12px"></i></span>
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Reset Module</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-reset-module-message"></div>
    <div><!-- send form -->
        <div class="w3-panel">
            <label class="tx-text-12">TypeId</label>
            <input id ="tx-reset-module-type-id" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='type id'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Codebase</label>
            <input id ="tx-reset-module-codebase" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='Codebase'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Artifact</label>
            <input id ="tx-reset-module-artifact" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='Artifact'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">Version</label>
            <input id ="tx-reset-module-version" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='Version'/>
        </div>
        <div class="w3-panel">
            <span id="tx-reset-module" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Reset</span>
        </div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-reset-module').onclick=()=>{
        let _t = document.querySelector('#tx-reset-module-type-id').value;
        let _c = document.querySelector('#tx-reset-module-codebase').value;
        let _a = document.querySelector('#tx-reset-module-artifact').value;
        let _v = document.querySelector('#tx-reset-module-version').value;
        TARA_API.onService(true,{serviceTag:'role/sudo/module',command:'onResetModule',typeId:_t,codebase:_c,moduleArtifact:_a,moduleVersion:_v},(resp)=>{
            document.querySelector('#tx-reset-module-message').innerHTML = resp.message;
        });
    };
    document.querySelector('#tx-reset-module-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
