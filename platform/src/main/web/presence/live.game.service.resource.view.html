<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-resource-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-resource-item-list-title' class="tx-margin-left-8 tx-text-24">Live Game Resource</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div id='tx-live-resource-item-list' class="w3-panel  w3-border-bottom w3-border-red">
            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-resource-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-resource-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-resource-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-resource" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-resource"),{mode:'tree'},{});
    document.querySelector('#tx-live-resource-item-list-title').innerHTML = TARA_API.query().category;
    let resourceList = document.querySelector('#tx-live-resource-item-list');
    resourceList.innerHTML = '';
    //let actionList = document.querySelector('#tx-live-resource-action-bar');
    tx_live_resource_setup();
    document.querySelector('#tx-resource-live-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-resource-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-resource-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-resource-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    
    function tx_live_resource_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',"Mills",(resp)=>{
            resp._itemList.forEach(item => {
                item._itemPack._skuList.forEach(
                        sku=>{
                            resourceList.innerHTML += TARA_HTML.command(sku.ItemId,item.Name,sku.Name,'resource-grant','Grant');
                        }
                    );    
            });
            document.querySelectorAll('.tx-live-resource-grant').forEach(a=>{
                a.onclick = ()=>{
                    tx_resource_grant(a.getAttribute('tx-item-id'));
                    //console.log(a.getAttribute('tx-item-id'));       
                }
            });
            editor.set(resp);
        });   
    }

    function tx_resource_grant(itemId){
        TARA_API.onGet(TARA_API.query().serviceTag,'onGrant',itemId,(resp)=>{
            //console.log(resp);
            editor.set(resp);
        });
    }
</script>
