<script>
    reset_live_game_inventory_bar();
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-inventory"),{mode:'tree'},{});
    TARA_API.onGet(TARA_API.query().serviceTag,'onCategory','',(resp)=>{
        console.log(resp);
        editor.set(resp);
        if(!resp.successful) return;        
        resp.itemList.forEach((gi,i)=>{
            let cbar = document.querySelector('#live-game-inventory-category-'+i);
            cbar.innerHTML = gi.typeId;
            cbar.setAttribute('tx-inventory-category',gi.category);
            cbar.setAttribute('tx-inventory-type-id',gi.typeId);
            cbar.style.display = 'block';
        });
    });
    document.querySelectorAll('.tx-live-game-inventory-bar').forEach((a)=>{
        a.onclick=()=>{
            reset_live_game_inventory_list();
            let cat = a.getAttribute('tx-inventory-category');
            let tid = a.getAttribute('tx-inventory-type-id');
            TARA_API.onGet(TARA_API.query().serviceTag,'onInventory',cat+'#'+tid,(resp)=>{
            editor.set(resp);
            if(!resp.successful) return;        
                resp.itemList.forEach((gi,i)=>{
                    document.querySelector('#tx-live-game-inventory-list-type-'+i).innerHTML = gi.typeId;
                    document.querySelector('#tx-live-game-inventory-list-name-'+i).innerHTML = gi.name;
                    document.querySelector('#tx-live-game-inventory-list-api-'+i).setAttribute('tx-inventory-id',(resp.type+'#'+gi.inventoryId));
                    document.querySelector('#tx-live-game-inventory-list-'+i).style.display = 'block';    
                });
            });        
        }
    });
    document.querySelectorAll('.tx-live-game-inventory-list-view').forEach(a=>{
        a.onclick=()=>{
            let inventoryId = a.getAttribute('tx-inventory-id');
            console.log(inventoryId);
            TARA_API.onGet(TARA_API.query().serviceTag,'onCommodity',inventoryId,(resp)=>{
                editor.set(resp);        
            });
        };
    });
    document.querySelector('#tx-game-inventory-live-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-inventory-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-inventory-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-inventory-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function reset_live_game_inventory_bar(){
        document.querySelectorAll('.tx-live-game-inventory-bar').forEach((a)=>{a.style.display ='none';});
    }
    function reset_live_game_inventory_list(){
        document.querySelector('#tx-live-game-inventory-list-0').style.display = 'none'; 
        document.querySelector('#tx-live-game-inventory-list-1').style.display = 'none'; 
        document.querySelector('#tx-live-game-inventory-list-2').style.display = 'none'; 
        document.querySelector('#tx-live-game-inventory-list-3').style.display = 'none'; 
        document.querySelector('#tx-live-game-inventory-list-4').style.display = 'none'; 
    }
</script>
