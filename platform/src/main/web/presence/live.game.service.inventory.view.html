<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-inventory-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-inventory-item-list-title' class="tx-margin-left-8 tx-text-24">Live Game Inventory</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel">
        <div id='tx-live-inventory-item-list' class="w3-container  w3-border-bottom w3-border-red">
            
        </div>
    </div>
    <div class="w3-panel">
        <div id='tx-live-inventory-action-bar' class="w3-container  w3-border-bottom w3-border-red">
            
        </div>
    </div>
    <div class="w3-panel">
        <div class='w3-bar w3-white w3-border-bottom w3-border-red'>
            <span id='tx-inventory-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-inventory-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-inventory-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-inventory" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-inventory"),{mode:'tree'},{});
    document.querySelector('#tx-live-inventory-item-list-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let inventoryList = document.querySelector('#tx-live-inventory-item-list');
    inventoryList.innerHTML = '';
    let actionList = document.querySelector('#tx-live-inventory-action-bar');
    actionList.innerHTML = '';
    tx_live_inventory_setup();
    document.querySelector('#tx-inventory-live-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();    
    };
    document.querySelector('#tx-inventory-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-inventory-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-inventory-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    
    function tx_live_inventory_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onCategory',"Mills",(resp)=>{
            editor.set(resp);
            resp.itemList.forEach(item => {
                inventoryList.innerHTML += TARA_HTML.command(item.category+'#'+item.typeId,item.category,item.typeId,'inventory-category','View');    
            });
            document.querySelectorAll('.tx-live-inventory-category').forEach(a=>{
                a.onclick = ()=>{
                    tx_inventory_view(a.getAttribute('tx-item-id'));          
                }
            });
        });   
    }

    function tx_inventory_view(itemId){
        TARA_API.onGet(TARA_API.query().serviceTag,'onInventory',itemId,(resp)=>{
            console.log(itemId);
            editor.set(resp);
            if(resp.Successful){
                actionList.innerHTML = '';
                resp._itemList.forEach(item=>{
                    actionList.innerHTML += TARA_HTML.command(itemId+'#'+item.InventoryId,item.TypeId,item.Name,'inventory-item','View');    
                });
                document.querySelectorAll('.tx-live-inventory-item').forEach(a=>{
                    a.onclick = ()=>{
                        tx_inventory_item_view(a.getAttribute('tx-item-id'));          
                    }
                });
            }
        });
    }
    function tx_inventory_item_view(itemId){
        console.log(itemId);
        TARA_API.onGet(TARA_API.query().serviceTag,'onCommodity',itemId,(resp)=>{
             editor.set(resp);   
        });
    }
</script>
