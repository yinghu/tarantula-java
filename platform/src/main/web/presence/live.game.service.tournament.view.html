        </div>    
    </div>

            <span id='tx-live-tournament-list-type-1' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16'>Type</span>

            <span id='tx-live-tournament-list-type-2' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16'>Type</span>

</div>
<script>
    TARA_API.onGet(TARA_API.query().serviceTag,'onList',"",(resp)=>{
        resp.tournamentList.forEach((t,i) => {
            document.querySelector('#tx-live-tournament-list-type-'+i).innerHTML = t.type;
            document.querySelector('#tx-live-tournament-list-play-'+i).setAttribute('tournament-id',t.tournamentId);  
            document.querySelector("#tx-live-tournament-list-"+i).style.display = 'block';
            document.querySelector('#tx-game-service-tournament-message').innerHTML = 'Play tournament game!';      
        });
    });
    document.querySelectorAll('.tx-live-tournament-action').forEach((a)=>{
        a.onclick=()=>{
            let tid = a.getAttribute('tournament-id');
            let cmd = {serviceTag:'tossup/mmk',tournamentEnabled:true,tournamentId:tid};
            TARA_API.onPlay(cmd,(resp)=>{
                console.log(resp);
                TARA_API.query().gamePopup = '#tx-popup-game';
                tx_view({viewId:'play.game.tossup',containerId:'#tx-popup-game'}); 
            });   
        }
    });
    document.querySelector('#tx-game-service-tournament-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
