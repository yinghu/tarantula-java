<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-proxy-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-proxy-item-list-title' class="tx-margin-left-8 tx-text-24">Live Game proxy</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel" id="tx-live-proxy-operation-form">
        <fieldset class="w3-border-blue tx-text-12">
            <legend class="tx-text-14 w3-text-blue" id='tx-live-proxy-header'>Module Selection</legend>
            <div class="w3-container">
                <label class="tx-text-14 tx-margin-right-4">Module :</label>
                <select id='tx-module-selection-name' class="w3-select w3-border w3-round tx-text-14" name='moduleSelectionName'>
                    
                </select>
            </div>
            <div class="w3-container">
                <label class="tx-text-14 tx-margin-right-4">Operation :</label>
                <input id='tx-module-operation-name' class="w3-input w3-border w3-round tx-text-14 tx-margin-bottom-8" value="onList">
                <label class="tx-text-14 tx-margin-right-4">Key Name :</label>
                <input id='tx-module-operation-key-name' class="w3-input w3-border w3-round tx-text-14 tx-margin-bottom-8" value="name">
            </div>    
            <div class="w3-panel">
                <div class='w3-bar w3-white' id='tx-proxy-opt-bar'></div>    
            </div>
        </fieldset>
    </div> 
    <div id='tx-live-proxy-item-list' class="w3-panel  w3-border-bottom w3-border-red">
            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-proxy-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-proxy-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-proxy-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-proxy" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-proxy"),{mode:'tree'},{});
    document.querySelector('#tx-live-proxy-item-list-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let proxyList = document.querySelector('#tx-module-selection-name');
    proxyList.innerHTML = '';
    let proxyTag='error';
    tx_live_proxy_setup();
    document.querySelector('#tx-proxy-live-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();       
    };
    document.querySelector('#tx-proxy-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-proxy-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-proxy-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    document.querySelector('#tx-proxy-opt-bar').innerHTML += TARA_HTML.BarItem('tx-proxy-live-service-get','Get','w3-right');
    document.querySelector('#tx-proxy-opt-bar').innerHTML += TARA_HTML.BarItem('tx-proxy-live-service-post','Post','w3-right');
    
    document.querySelector('#tx-proxy-live-service-get').onclick=()=>{
        tx_proxy_get_operation();
    };
    document.querySelector('#tx-proxy-live-service-post').onclick=()=>{
        tx_proxy_post_operation();
    };
    document.querySelector('#tx-module-selection-name').onchange = ()=>{
        proxyTag = document.querySelector('#tx-module-selection-name').value;
    }; 
    function tx_live_proxy_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onList#service',"Mills",(resp)=>{
            resp.modules.forEach((item ,i)=> {
                if(i==0) proxyTag = item.tag;
                proxyList.innerHTML += TARA_HTML.option(item.tag,item.name,i==0);
            });
            editor.set(resp);
        });   
    }
    function tx_proxy_get_operation(){
        let opt = document.querySelector('#tx-module-operation-name').value;
        let oname = document.querySelector('#tx-module-operation-key-name').value;  
        TARA_API.onGet(TARA_API.query().serviceTag,'onModule#'+opt+'#'+proxyTag,oname,(resp)=>{
            editor.set(resp);
        });
    }
    function tx_proxy_post_operation(){
        let opt = document.querySelector('#tx-module-operation-name').value;
        let oname = document.querySelector('#tx-module-operation-key-name').value;
        let ovalue = editor.get();  
        TARA_API.onSet(TARA_API.query().serviceTag,'onModule#'+opt+'#'+proxyTag,oname,ovalue,(resp)=>{
            editor.set(resp);
        });        
    }
</script>
