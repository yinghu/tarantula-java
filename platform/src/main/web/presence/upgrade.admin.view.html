<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-upgrade-admin-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-sign-in" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">UPGRADE ROLE</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-upgrade-admin-message"></div> 
    <div class="w3-display-container w3-white w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topleft w3-padding">
            <span class="tx-text-14">Become A Game Developer</span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span id="tx-upgrade-admin" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-upgrade-role-action">Upgrade</span>
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    
    document.querySelector('#tx-upgrade-admin').onclick = ()=>{
        TARA_API.onService(true,{serviceTag:'presence/lobby',command:'onUpgradeRole',name:'admin'},(resp)=>{      
            if(resp.successful){
                TARA_API.query().role = resp.role;
                document.querySelector('#tx-upgrade-admin-message').innerHTML = 'Role upgraded';    
            }else{
                document.querySelector('#tx-upgrade-admin-message').innerHTML = 'Upgrade failed';
            }       
        });        
    };    
    document.querySelector('#tx-upgrade-admin-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
