<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-gamestore"),{mode:'tree'},{});
    document.querySelector('#tx-live-store-game-item-list-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let shoppingList = document.querySelector('#tx-live-store-game-item-list');
    
    tx_live_store_setup();
    
    document.querySelector('#tx-gamestore-live-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();      
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function tx_live_store_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onList','Tami',(resp)=>{
            editor.set(resp);
            if(resp.Successful && resp.hasOwnProperty('_shoppingItemList')){
                shoppingList.innerHTML ='';
                resp._shoppingItemList.forEach((gi,i)=>{
                     
                    shoppingList.innerHTML += TARA_HTML.command(gi.ItemId,gi.Name,gi.SkuName,'store-grant','Grant');//tem.join('');  
                });
                document.querySelectorAll('.tx-live-store-grant').forEach(a=>{
                    a.onclick=()=>{
                        let itemId = a.getAttribute('tx-item-id');
                        //console.log(itemId);
                        let dkey = document.querySelector('#tx-developer-access-key').value;
                        TARA_API.onGet(TARA_API.query().serviceTag,'onTestWithAdmin', dkey+'#'+itemId,(resp)=>{
                            editor.set(resp);        
                        });
                    };
                });           
            }
        });
    }
