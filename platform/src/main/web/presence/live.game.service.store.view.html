<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-gamestore-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-store-game-item-list-title' class="tx-margin-left-8 tx-text-24">Live Game Store</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div id='tx-live-store-game-item-list' class="w3-panel  w3-border-bottom w3-border-red">
            
    </div>
    <div id='tx-live-game-service-action-bar' class="w3-panel  w3-border-bottom w3-border-red">
            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-gamestore-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-gamestore-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-gamestore-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-gamestore" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-gamestore"),{mode:'tree'},{});
    document.querySelector('#tx-live-store-game-item-list-title').innerHTML = TARA_API.query().category;
    let shoppingList = document.querySelector('#tx-live-store-game-item-list');
    let actionList = document.querySelector('#tx-live-game-service-action-bar');
    switch(TARA_API.query().category){
        case 'store':
            tx_live_store_setup();
            break;
        case 'inventory':
            tx_live_inventory_setup();
            break;
        case 'savedgame':
            tx_live_savedgame_setup();
            break;
        case 'achievement':
            tx_live_achievement_setup();
            break;
        case 'giveaway':
            tx_live_giveaway_setup();
            break;
    }
   
    document.querySelector('#tx-gamestore-live-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-gamestore-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function tx_live_store_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onList','',(resp)=>{
            editor.set(resp);
            if(resp.successful){
                shoppingList.innerHTML ='';
                resp.itemList.forEach((gi,i)=>{
                    let tem = [];
                    tem.push('<div class=\'w3-container\'>');
                    tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8\'><i class=\'fa fa-hourglass-1\' style=\'font-size:24px;color:blue\'></i></span>');
                    tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16\'>');
                    tem.push(gi.configurationCategory);
                    tem.push('</span><span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12\'>');
                    tem.push(gi.configurationName);
                    tem.push('</span><span tx-item-id=\''+gi.itemId+'\'');
                    tem.push(' class=\'w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-live-store-game-item-list-buy\'>Buy With Admin</span>');
                    tem.push('</div>'); 
                    shoppingList.innerHTML += tem.join('');  
                });
                document.querySelectorAll('.tx-live-store-game-item-list-buy').forEach(a=>{
                    a.onclick=()=>{
                        let itemId = a.getAttribute('tx-item-id');
                        console.log(itemId);
                        TARA_API.onGet(TARA_API.query().serviceTag,'onTestWithAdmin',itemId,(resp)=>{
                            editor.set(resp);        
                        });
                    };
                });           
            }
        });
    }
    function tx_live_inventory_setup(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onCategory','',(resp)=>{
            editor.set(resp);
            if(resp.successful){
                shoppingList.innerHTML ='';
                resp.itemList.forEach((gi,i)=>{
                    let tem = [];
                    tem.push('<div class=\'w3-container\'>');
                    tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8\'><i class=\'fa fa-hourglass-1\' style=\'font-size:24px;color:blue\'></i></span>');
                    tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16\'>');
                    tem.push(gi.typeId);
                    tem.push('</span><span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12\'>');
                    tem.push(gi.name);
                    tem.push('</span><span tx-type-id=\''+gi.typeId+'\' tx-category=\''+gi.category);
                    tem.push('\' class=\'w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-live-store-game-item-list-buy\'>View</span>');
                    tem.push('</div>'); 
                    shoppingList.innerHTML += tem.join('');  
                });
                document.querySelectorAll('.tx-live-store-game-item-list-buy').forEach(a=>{
                    a.onclick=()=>{
                        let tid = a.getAttribute('tx-type-id');
                        let cat = a.getAttribute('tx-category');
                        console.log(cat+'#'+tid);
                        TARA_API.onGet(TARA_API.query().serviceTag,'onInventory',cat+'#'+tid,(resp)=>{
                            editor.set(resp);
                        });   
                    };
                });             
            }
        });
    }
    function tx_live_savedgame_setup(){
        shoppingList.innerHTML ='';
        let itemList = [{name:'Device1',deviceId:'device1'},{name:'Device2',deviceId:'device2'},{name:'Device3',deviceId:'device3'},{name:'Device4',deviceId:'device4'}];
        itemList.forEach((gi,i)=>{
            let tem = [];
            tem.push('<div class=\'w3-container\'>');
            tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8\'><i class=\'fa fa-hourglass-1\' style=\'font-size:24px;color:blue\'></i></span>');
            tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16\'>');
            tem.push(gi.name);
            tem.push('</span><span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12\'>');
            tem.push('');
            tem.push('</span><span tx-type-id=\''+gi.deviceId+'\' tx-category=\''+gi.name);
            tem.push('\' class=\'w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-live-store-game-item-list-buy\'>View</span>');
            tem.push('</div>'); 
            shoppingList.innerHTML += tem.join('');  
        });
        document.querySelectorAll('.tx-live-store-game-item-list-buy').forEach(a=>{
            a.onclick=()=>{
                actionList.innerHTML = '';
                let deviceId = a.getAttribute('tx-type-id');
                TARA_API.onGet(TARA_API.query().serviceTag,'onList',deviceId,(resp)=>{
                    editor.set(resp);
                    if(resp.currentSavedGame.hasOwnProperty('dailyLogin')){
                        console.log(resp.currentSavedGame.gameId);
                        let dailyLogin = resp.currentSavedGame.dailyLogin;
                        let tem = [];
                        tem.push('<div class=\'w3-container\'>');
                        tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8\'><i class=\'fa fa-hourglass-1\' style=\'font-size:24px;color:blue\'></i></span>');
                        tem.push('<span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16\'>');
                        tem.push('DailyLogin');
                        tem.push('</span><span class=\'w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12\'>');
                        tem.push('');
                        tem.push('</span><span tx-game-id=\''+resp.currentSavedGame.gameId+'\' tx-reward-id=\''+dailyLogin.rewardKey);
                        tem.push('\' class=\'w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-live-service-daily-reward-claim\'>Claim</span>');
                        tem.push('</div>'); 
                        actionList.innerHTML += tem.join('');
                        document.querySelectorAll('.tx-live-service-daily-reward-claim').forEach(a=>{
                            a.onclick =()=>{
                                let gameId = a.getAttribute('tx-game-id'); 
                                TARA_API.onGet(TARA_API.query().serviceTag,'onDailyRewardClaim',gameId,(resp1)=>{
                                    editor.set(resp1);        
                                });
                            }
                        }); 
                    }
                });   
            };
        });             
    }
    function tx_live_achievement_setup(){
        console.log(TARA_API.query()); 
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',"",(resp)=>{
            editor.set(resp);
        });   
    }
    function tx_live_giveaway_setup(){
        console.log(TARA_API.query()); 
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',"",(resp)=>{
            editor.set(resp);
        });   
    }
</script>
