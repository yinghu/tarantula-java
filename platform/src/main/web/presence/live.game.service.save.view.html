<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-save-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-save-item-list-title' class="tx-margin-left-8 tx-text-24">Live Game Save</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel  tx-margin-bottom-8">
        <fieldset class="w3-border-blue tx-text-12">
            <legend class="tx-text-14 w3-text-blue">Save Selection</legend>
            <div class="w3-container">
                <label class="tx-text-14 tx-margin-right-4">Device :</label>
                <select id='tx-save-device-selection-name' class="w3-select w3-border w3-round tx-text-14" name='deviceIdSelectionName'>
                    <option value="HandSet1" selected>HandSet1</option>
                    <option value="HandSet2">HandSet2</option>
                    <option value="HandSet3">HandSet3</option>
                    <option value="HandSet4">HandSet4</option>
                    <option value="HandSet5">HandSet5</option>
                </select>
            </div>
            <div class="w3-panel">
                <div id='tx-live-save-item-list' class="w3-container">
                    
                </div>
            </div>
        </fieldset>
    </div> 
    <div class="w3-panel" id="tx-live-save-operation-form">
        <fieldset class="w3-border-blue tx-text-12">
            <legend class="tx-text-14 w3-text-blue" id='tx-live-save-header'>System</legend>
                <div class="w3-container">
                    <label class="tx-text-14 tx-margin-right-4">Save Key :</label>
                    <input id='tx-item-save-key' class="w3-input w3-border w3-round tx-text-14 tx-margin-bottom-8" value="Level">
                </div>
                <div class="w3-panel">
                    <div class='w3-bar w3-white' id='tx-save-opt-bar'></div>    
                </div>
        </fieldset>
    </div> 
    <div class="w3-panel">
        <div class='w3-bar w3-white w3-border-bottom w3-border-red'>
            <span id='tx-save-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-save-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-save-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-save" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-save"),{mode:'tree'},{});
    document.querySelector('#tx-live-save-item-list-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let saveList = document.querySelector('#tx-live-save-item-list');
    saveList.innerHTML = '';
    let deviceId = "HandSet1";
    document.querySelector('#tx-save-opt-bar').innerHTML += TARA_HTML.BarItem('tx-save-live-service-save','Save','w3-right');
    document.querySelector('#tx-save-opt-bar').innerHTML += TARA_HTML.BarItem('tx-save-live-service-load','Load','w3-right');
    document.querySelector('#tx-save-opt-bar').innerHTML += TARA_HTML.BarItem('tx-save-live-service-reset','Reset','w3-left');
   
    document.querySelector('#tx-save-live-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();      
    };
    document.querySelector('#tx-save-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-save-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-save-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    document.querySelector('#tx-save-device-selection-name').onchange = ()=>{
        deviceId = document.querySelector('#tx-save-device-selection-name').value;
        tx_live_save_setup();
    }; 
    document.querySelector('#tx-save-live-service-save').onclick=()=>{
        tx_save_operation();
    };
    document.querySelector('#tx-save-live-service-load').onclick=()=>{
        tx_load_operation();
    };
    document.querySelector('#tx-save-live-service-reset').onclick=()=>{
        tx_reset_operation();
    };

    tx_live_save_setup();
    
    function tx_live_save_setup(){
        //document.querySelector('#tx-live-save-operation-form').style.display = 'none';
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',deviceId,(resp)=>{    
            if(resp.Successful){
                saveList.innerHTML = '';
                resp._savedGames.forEach(item => {
                    
                    saveList.innerHTML += TARA_HTML.command(item.GameId,item.DeviceId+'>'+item.GameId,item.Version,'save-select','Select');
                        
                });
                document.querySelectorAll('.tx-live-save-select').forEach(a=>{
                    a.onclick = ()=>{
                        tx_save_select(a.getAttribute('tx-item-id'));      
                    }
                });
            }
            editor.set(resp);
        });
    }

    function tx_save_select(itemId){
        let selected = itemId+'#'+deviceId+'#Game Save'
        TARA_API.onGet(TARA_API.query().serviceTag,'onSelect',selected,(resp)=>{
            editor.set(resp);
            document.querySelector('#tx-live-save-header').innerHTML = resp.DeviceId;
        });
    }

    function tx_save_operation(){
        let dkey = document.querySelector('#tx-item-save-key').value;
        TARA_API.onSet(TARA_API.query().serviceTag,'onSet',dkey,editor.get(),(resp)=>{
            editor.set(resp);
        });
    }

    function tx_load_operation(){
        let dkey = document.querySelector('#tx-item-save-key').value;
        TARA_API.onGet(TARA_API.query().serviceTag,'onGet',dkey,(resp)=>{
            editor.set(resp);
        });
    }

    function tx_reset_operation(){
        let dkey = document.querySelector('#tx-item-save-key').value;
        TARA_API.onGet(TARA_API.query().serviceTag,'onReset',dkey,(resp)=>{
            editor.set(resp);
        });
    }
</script>
