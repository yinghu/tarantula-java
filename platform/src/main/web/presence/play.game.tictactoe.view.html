<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-red tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-tictactoe-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-plane" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">TicTacToe</span>
        </div>
    </div>
    <canvas id='tx-game-tictactoe'></canvas>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let _oswaldFamily = 'Oswald, Arial';
    let _felipaFamily = 'Felipa, Arial';
    let _view = document.querySelector('#tx-game-tictactoe');
    let app = TGL.start(600,500,_view);
    let message = new PIXI.Text("Hello Pixi!",{fontFamily:_oswaldFamily,fontSize:40,fill:'yellow'});
    app.stage.addChild(message);
    let rectangle = new PIXI.Graphics();
    rectangle.lineStyle(4, 0xFF3300, 1);
    rectangle.beginFill(0x66CCFF);
    rectangle.drawRect(0, 0, 64, 64);
    rectangle.endFill();
    rectangle.x = 170;
    rectangle.y = 170;
    app.stage.addChild(rectangle);
    let payload ={serviceTag:'TicTacToe/mmk',command:'onPlay'}; 
    let wsWorker;
    TARA_API.onService(false,payload,(resp)=>{
        console.log(resp);
        let conn = resp.connection;
        conn.protocol = conn.secured?'wss':'ws';
        conn.path='tictactoe';
        conn.ticket = resp.ticket;
        let _url = TARA_API.toUrl(resp.connection);
        console.log(_url);
        wsWorker = new Worker('/resource/tarantula.web.socket.source.js');
        wsWorker.onmessage = (e)=>{
            console.log(e.data);        
        };
        wsWorker.postMessage({cmd:'start',url:_url,protocol:'tarantula-service'});
        setInterval(() => {
            wsWorker.postMessage({cmd:'send',data:{message:'hello'}});
        }, 1000);
    });
    document.querySelector('#tx-tictactoe-close').onclick=()=>{
        wsWorker.postMessage({cmd:'close'});
        TGL.shutdown();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };

</script>
