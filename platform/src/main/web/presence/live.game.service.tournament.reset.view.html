<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-tournament-live-reset-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-live-tournament-item-list-reset-title' class="tx-margin-left-8 tx-text-24">Live Game tournament</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel">
        <fieldset class="w3-border-blue tx-text-12">
            <legend class="tx-text-14 w3-text-blue">Tournament Reset</legend>
            <div class="w3-container">
                <label class="tx-text-14 tx-margin-right-4">Use Access Key To Reset</label>
                <input id='tx-tournament-reset-access-key' class="w3-input w3-border w3-round tx-text-14 tx-margin-bottom-8" value="use developer key">
            </div>
        </fieldset>
    </div>
    <div class="w3-panel"><!-- send form -->
        <div class="w3-container">
            <label class="tx-text-12">Tournament Type</label>
            <input id ="tx-tournament-live-service-reset-type" class="w3-input w3-round w3-border tx-text-16" type="text" value="Hero"/>
        </div>
    </div>
    <div class="w3-panel">
        <div id='tx-live-tournament-item-reset-list' class="w3-container  w3-border-bottom w3-border-white">    
        </div>
    </div>
    <div class="w3-panel">
        <div class='w3-bar w3-white  w3-border-bottom w3-border-red'>
            <span id='tx-tournament-live-service-reset-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-tournament-live-service-reset-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-tournament-live-service-reset-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span> 
            <span id='tx-tournament-live-service-reset-reload' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Reload</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-reset-tournament" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-reset-tournament"),{mode:'tree'},{});
    document.querySelector('#tx-live-tournament-item-list-reset-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let tournamentList = document.querySelector('#tx-live-tournament-item-reset-list');
    tournamentList.innerHTML = '';
    //let actionList = document.querySelector('#tx-live-tournament-action-bar');
    tx_live_tournament_reset_setup();
    document.querySelector('#tx-tournament-live-reset-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();       
    };
    document.querySelector('#tx-tournament-live-service-reset-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-tournament-live-service-reset-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-tournament-live-service-reset-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };

    document.querySelector('#tx-tournament-live-service-reset-reload').onclick =()=>{
        tournamentList.innerHTML = '';
        tx_live_tournament_reset_setup();
    };

    function tx_live_tournament_reset_setup(){
        let mtype = document.querySelector('#tx-tournament-live-service-reset-type').value;
        let mkey = document.querySelector('#tx-tournament-reset-access-key').value;
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',mtype,(resp)=>{
            tournamentList.innerHTML ='';
            if(resp.Successful){
                resp._tournamentList.forEach(item => {
                    tournamentList.innerHTML += TARA_HTML.command(item.TournamentId,item.Type+'/'+item.Name+'['+item.StartLevel+'-'+item.EndLevel+']',item.Status+' : End By ['+item.EndTime+']','tournament-delete','Delete');
                });    
                document.querySelectorAll('.tx-live-tournament-delete').forEach(a=>{
                      a.onclick = ()=>{
                        tx_tournament_delete(mkey,mtype,a.getAttribute('tx-item-id'));
                        console.log(a.getAttribute('tx-item-id')+' : '+TARA_API.query().serviceTag);       
                    }
                });
            }
            editor.set(resp);
        });   
    }



    function tx_tournament_delete(key,type,itemId){
        TARA_API.onGet(TARA_API.query().serviceTag,'onDelete',key+'#'+type+'#'+itemId,(resp)=>{
            editor.set(resp);
        });
        console.log(itemId);
    }
</script>
