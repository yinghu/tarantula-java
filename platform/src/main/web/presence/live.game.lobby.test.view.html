<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-lobby-live-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Live Lobby</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-lobby-live-json-tree-clear' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Clear</span>
            <span id='tx-lobby-live-end-game' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>End Game</span>
            <span id='tx-lobby-live-update-game' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Update Game</span>
            <span id='tx-lobby-live-start-game' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Start Game</span>
        </div>            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-lobby-live-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-lobby-live-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-lobby-live-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
            <span id='tx-lobby-live-leave' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Leave</span>
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-lobby" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-lobby"),{mode:'tree'},{});
    let zoneId;
    TARA_API.onGet(TARA_API.query().serviceTag,'onTest',"",(resp)=>{
        if(resp.Successful){
            zoneId = resp._zone.ZoneId;
        }
        editor.set(resp);
    });
    document.querySelector('#tx-lobby-live-leave').onclick=()=>{
        TARA_API.onGet(TARA_API.query().serviceTag,'onLeave',zoneId,(resp)=>{
            editor.set(resp);
            tx_close_current_page();  
        });
    };
    document.querySelector('#tx-lobby-live-start-game').onclick=()=>{
        TARA_API.onSet(TARA_API.query().serviceTag,'onStartGame',zoneId,editor.get(),(resp)=>{
            resp.Win = true;
            resp.Level = 10;
            editor.set(resp);
        });
    };
    document.querySelector('#tx-lobby-live-update-game').onclick=()=>{
        TARA_API.onSet(TARA_API.query().serviceTag,'onUpdateGame',zoneId,editor.get(),(resp)=>{
            editor.set(resp);
        });
    };
    document.querySelector('#tx-lobby-live-end-game').onclick=()=>{
        TARA_API.onSet(TARA_API.query().serviceTag,'onEndGame',zoneId,editor.get(),(resp)=>{
            editor.set(resp);
        });
    };
    document.querySelector('#tx-lobby-live-json-tree-clear').onclick=()=>{
        let game ={};
        game.UpdateId=0;
        game.ChapterId=10;
        game.StageId = 20;
        game.UnitId = 1;
        game.EquipmentId = 2;
        game.SkillId = 5;
        game.OpponentId = 10;
        game.TeamPower = 10;
        game.TEMP_StageName = 'Chapter3_Stage7_HardConfig';
        game.Party =[100,200,300];
        game.Score = 2;
        game.PlayerLevel = 3;
        game.Currencies = {Gem:100,XpPortionA:5,XpPortionB:6}
        game.XpGain=100;
        editor.set(game);
    };
    document.querySelector('#tx-lobby-live-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();     
    };
    document.querySelector('#tx-lobby-live-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-lobby-live-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-lobby-live-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
</script>
