<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-json-datastore-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-json-datastore-list-title' class="tx-margin-left-8 tx-text-24">Json Data Store</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel">
        <div class="w3-container w3-border-bottom w3-border-red">
            <label class="tx-text-14 tx-margin-right-4">Data Store Key :</label>
            <input id='tx-data-store-key' class="w3-input w3-border w3-round tx-text-14 tx-margin-bottom-8" value="ShipInfo">
        </div>
    </div> 
    <div class="w3-panel">
        <div id='tx-json-datastore-list' class="w3-container  w3-border-bottom w3-border-red">
            
        </div>
    </div>
    <div class="w3-panel">
        <div class='w3-bar w3-white w3-border-bottom w3-border-red'>
            <span id='tx-json-datastore-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-json-datastore-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-json-datastore-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-live-service-json-store" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-live-service-json-store"),{mode:'tree'},{});
    document.querySelector('#tx-json-datastore-list-title').innerHTML = TARA_HTML.caption(TARA_API.query().category);
    let inboxList = document.querySelector('#tx-json-datastore-list');
    inboxList.innerHTML = '';
    inboxList.innerHTML += TARA_HTML.command('onSet','DataStore','Set','data-store-set','Save');
    inboxList.innerHTML += TARA_HTML.command('onGet','DataStore','Get','data-store-set','Load');
    inboxList.innerHTML += TARA_HTML.command('onDelete','DataStore','Delete','data-store-set','Delete');
    document.querySelectorAll('.tx-live-data-store-set').forEach(a=>{
        a.onclick=()=>{
            let cmd = a.getAttribute('tx-item-id');
            if(cmd=='onSet'){
                tx_on_set_value();
            }
            else if(cmd=='onGet'){
                tx_on_get_value();
            }
            else if(cmd=='onDelete'){
                tx_on_delete_value();
            }
            else{
                let error ={message:cmd+' not supported'};
                editor.set();    
            }
        };
    });   
    tx_on_get_value();
    document.querySelector('#tx-json-datastore-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-json-datastore-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-json-datastore-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-json-datastore-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    
    function tx_on_get_value(){
        let dkey = document.querySelector('#tx-data-store-key').value;
        TARA_API.onGet(TARA_API.query().serviceTag,'onGet',dkey,(resp)=>{
            editor.set(resp);
        });   
    }
    function tx_on_set_value(){
        let dkey = document.querySelector('#tx-data-store-key').value;
        TARA_API.onSet(TARA_API.query().serviceTag,'onSet',dkey,editor.get(),(resp)=>{
            editor.set(resp);
        });   
    }
    function tx_on_delete_value(){
        let dkey = document.querySelector('#tx-data-store-key').value;
        TARA_API.onGet(TARA_API.query().serviceTag,'onDelete',dkey,(resp)=>{
            editor.set(resp);
        });   
    }
</script>
