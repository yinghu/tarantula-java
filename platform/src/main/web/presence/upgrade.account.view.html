<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-upgrade-account-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-sign-in" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">UPGRADE ROLE</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-upgrade-account-message"></div> 
    <div id='tx-upgrade-account-form' class="w3-container w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-panel">
            <span id="tx-upgrade-account-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>
            <span id="tx-upgrade-account" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Upgrade</span>     
        </div>
    </div>
    <div id='tx-upgrade-account-email-form' class="w3-container w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-panel">
            <span id="tx-upgrade-account-email-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>
            <span id="tx-upgrade-account-email" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Email Update</span>     
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    TARA_API.onService(true,{serviceTag:'presence/lobby',command:'onCheckRole',role:'account'},(resp)=>{      
            if(resp.successful){
                if(resp.access.activated == true){
                    document.querySelector('#tx-upgrade-account-form').style.display='block'; 
                }else{
                    document.querySelector('#tx-upgrade-account-message').innerHTML = "Update email first, then upgrade role";
                    document.querySelector('#tx-upgrade-account-email-form').style.display='block';
                }    
            }
            else{
                document.querySelector('#tx-upgrade-account-message').innerHTML = resp.message;
            }
    });
    document.querySelector('#tx-upgrade-account').onclick = ()=>{
        TARA_API.onService(true,{serviceTag:'presence/lobby',command:'onUpgradeAccountRole',role:'account'},(resp)=>{      
            if(resp.successful){
                TARA_API.query().role = resp.role;
                document.querySelector('#tx-upgrade-account-message').innerHTML = 'Role upgraded';    
            }else{
                document.querySelector('#tx-upgrade-account-message').innerHTML = 'Upgrade failed';
            }       
        });        
    };
    document.querySelector('#tx-upgrade-account-email').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';
        tx_view({viewId:'add.email',containerId:'#tx-popup'});       
    };    
    document.querySelector('#tx-upgrade-account-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-upgrade-account-cancel').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-upgrade-account-email-cancel').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
