        <div class="w3-display-topright w3-padding">
            <span id="tx-gamestore-api-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">GameStore API</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-gamestore-api-service-list' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>List</span>          
        </div>            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>  
            <span id='tx-gamestore-api-service-save' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span> 
        </div>            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>  
            <span id='tx-api-service-new-gamestore-1' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>gamestore-1</span>
            <span id='tx-api-service-new-gamestore-2' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>gamestore-2</span>
        </div>            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-gamestore-api-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-gamestore-api-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-gamestore-api-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-api-service-gamestore" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <div class="w3-card-4 w3-border w3-round w3-white tx-ok-checkout" id="tx-game-service-store-edit-form">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
            <div class="w3-display-topright w3-padding">
                <!--<span><i class="fa fa-close" style="font-size:12px"></i></span>-->            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:24px"></i></span>
                <span class="tx-margin-left-8 tx-text-18">Confirmation</span>
            </div>
        </div>
        <div id="tx-game-service-store-edit-message" class="w3-panel w3-center w3-border-bottom w3-border-red tx-text-14">Are you sure to save changes?</div>
        <div class="w3-panel w3-border-bottom w3-border-red">
            <span id="tx-game-service-store-edit-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>     
        
            <span id="tx-game-service-store-edit-ok" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Confirm</span>     
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-api-service-gamestore"),{mode:'code'},{});
    document.querySelector('#tx-gamestore-api-service-list').onclick=()=>{
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',TARA_API.query().gameClusterId,(resp)=>{
            editor.set(resp);       
        });
    };
    document.querySelector('#tx-api-service-new-gamestore-1').onclick=()=>{
        TARA_API.onGet('role/admin','onLoadTemplate',TARA_API.query().gameClusterId+'#onDemand',(resp)=>{
            editor.set(resp);        
        });
    };
    document.querySelector('#tx-gamestore-api-service-save').onclick=()=>{
        TARA_API.query().command = save_service_store_item;
        document.querySelector('#tx-game-service-store-edit-form').style.display='block';
    };
    document.querySelector('#tx-game-service-store-edit-cancel').onclick=()=>{
        document.querySelector('#tx-game-service-store-edit-form').style.display='none';
    };
    document.querySelector('#tx-game-service-store-edit-ok').onclick=()=>{
        TARA_API.query().command.call();
        document.querySelector('#tx-game-service-store-edit-form').style.display='none';
    };
    document.querySelector('#tx-gamestore-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-gamestore-api-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-gamestore-api-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-gamestore-api-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function save_service_store_item(){
        TARA_API.onSet('role/store','onSave',TARA_API.query().gameClusterId,editor.get(),(resp)=>{
            editor.set(resp);
        });
    }
</script>
