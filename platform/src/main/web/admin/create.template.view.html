<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-configuration-template-api-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Configuration Template</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-configuration-template-load' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Load</span>          
            <span id='tx-configuration-template-save' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span> 
        </div>            
    </div>
    <div class="w3-panel  tx-margin-bottom-8">
        <label class="tx-text-12 tx-margin-left-4">Configuration Template Name:</label>
        <input id='tx-configuration-template-name' class="w3-input tx-text-12" type="text">    
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-template-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-template-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-template-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-configuration-template" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let sample = {type:'T100',description:'desc',icon:'icon',schedule:'onDemand',durationHours:24,maxEntriesPerInstance:100,durationMinutesPerInstance:10}; 
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-template"),{mode:'code'},sample);
    document.querySelector('#tx-configuration-template-load').onclick=()=>{
        let _k = document.querySelector('#tx-configuration-template-name').value;
        TARA_API.onGet('role/admin','onLoadTemplate',TARA_API.query().gameClusterId+'#'+_k,(resp)=>{
            editor.set(resp);       
        });
    };
    document.querySelector('#tx-configuration-template-save').onclick=()=>{
        let _k = document.querySelector('#tx-configuration-template-name').value;
        TARA_API.onSet('role/admin','onSaveTemplate',TARA_API.query().gameClusterId+'#'+_k,editor.get(),(resp)=>{
            editor.set(resp);   
        });
    };
    document.querySelector('#tx-configuration-template-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-template-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-template-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-template-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
</script>
