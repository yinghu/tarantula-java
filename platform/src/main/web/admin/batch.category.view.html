<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-batch-category-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-batch-category-list-title' class="tx-margin-left-8 tx-text-24"></span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-batch-category-message">
        <p>Copy category config jsons onto list section and save.</p>
    </div> 
    <div class="w3-panel">
        <div class='w3-bar w3-white  w3-border-bottom w3-border-red'>
            <span id='tx-batch-category-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-batch-category-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-batch-category-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span> 
            <span id='tx-batch-category-save' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-batch-category-list" style="width: 100%;"></div>
    </div> 
    
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-batch-category-list-title').innerHTML = 'Batch Category : '+TARA_HTML.caption(TARA_API.query().category);
    let editor = new JSONEditor(document.querySelector("#jsoneditor-batch-category-list"),{mode:'tree'},{list:[]});
    
    document.querySelector('#tx-batch-category-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    
    document.querySelector('#tx-batch-category-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    
    document.querySelector('#tx-batch-category-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };

    document.querySelector('#tx-batch-category-save').onclick =()=>{
        tx_category_list_save();            
    };

    document.querySelector('#tx-batch-category-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();      
    };    
    function tx_category_list_save(){
        TARA_API.onSet('role/admin/item','onBatchCreate',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,editor.get(),(resp)=>{
            document.querySelector('#tx-batch-category-message').innerHTML = resp.message;
            editor.set(resp);    
        });   
    }
</script>
