<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-set-elo-close"><i class="fa fa-close" style="font-size:12px"></i></span>
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Set PLayer ELO</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-set-elo-message"></div>
    <div class="w3-panel w3-border-bottom w3-border-white">
        <div class="w3-panel">
            <label class="tx-text-12">PlayerID</label>
            <input id ="tx-player-id" class="w3-input w3-round w3-border" type="number" placeholder='playerID'/>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12">New ELO Value</label>
            <input id ="tx-elo-value" class="w3-input w3-round w3-border" type="number" placeholder='ELO'/>
        </div>
        <div class="w3-panel">
            <span id="tx-set-elo" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Set ELO</span>
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-set-elo').onclick=()=>{
        let _playerID = document.querySelector('#tx-player-id').value;
        let _eloValue = document.querySelector('#tx-elo-value').value;

        if(_playerID==''){
            document.querySelector('#tx-set-elo-message').innerHTML = "PlayerID Field Cannot Be Empty";
            return;
        }

        if(_eloValue==''){
            document.querySelector('#tx-set-elo-message').innerHTML = "ELO Value Field Cannot Be Empty";
            return;
        }

        let payload ={playerID:_playerID,eloValue:_eloValue};

        TARA_API.onSet('role/admin','onSetELO',TARA_API.query().gameClusterId,payload,(resp)=>{
            document.querySelector('#tx-set-elo-message').innerHTML = resp.message;
        });
    };

    document.querySelector('#tx-set-elo-close').onclick=()=>{
        tx_close_current_page();
    };
</script>
