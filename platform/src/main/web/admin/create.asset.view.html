<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-configuration-asset-api-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id="tx-configuration-asset-header" class="tx-margin-left-8 tx-text-24">Create Game Asset</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <span id="tx-configuration-asset-description" class='w3-left tx-text-18 tx-margin-top-8 tx-margin-left-8'></span>
        <span id="tx-configuration-asset-type" class='w3-right tx-text-18 tx-margin-top-8 tx-margin-left-8'>Asset</span>
    </div>
    <div class="w3-container" id="tx-asset-create-section">
        <div class="w3-panel">  
            <fieldset class="w3-border-blue"> 
                <legend class="tx-text-14 w3-text-blue">Configuration</legend>
                <label class="tx-text-12 tx-margin-left-4">Configuration TypeId:</label>
                <input id='tx-configuration-asset-type-id' class="w3-input w3-round w3-border tx-text-12" type="text">  
                <label class="tx-text-12 tx-margin-left-4">Configuration Name:</label>
                <input id='tx-configuration-asset-name' class="w3-input w3-round w3-border tx-text-12" type="text">
                <label class="tx-text-12 tx-margin-left-4">Configuration Version:</label>
                <input id='tx-configuration-asset-version' class="w3-input w3-round w3-border tx-text-12" type="text">
            </fieldset>
        </div>
        <div class="w3-panel"> 
            <fieldset class="w3-border-blue" id="tx-asset-create-form"> 
            </fieldset>
        </div>
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-configuration-asset-cancel' class='w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Cancel</span>             
           
                <span id='tx-configuration-asset-preview' class='w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>             
            </div>            
        </div>    
    </div>

    <div class="w3-container" id="tx-asset-create-json" style="display: none;">
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-asset-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
                <span id='tx-asset-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
                <span id='tx-asset-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>                
            </div>            
        </div>        
        <div class="w3-panel w3-center tx-text-14">
            <div id="jsoneditor-configuration-asset" style="width: 100%;"></div>
        </div> 
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-configuration-asset-back' class='w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Back</span>             
                <span id='tx-configuration-asset-save' class='w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span>             
            </div>            
        </div> 
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-configuration-asset-header').innerHTML = "Create Game ["+TARA_API.query().category+"]";
    let itemTemplate = {header:{},application:{},reference:[]};
    let selectedItem = TARA_API.query().itemList[TARA_API.query().itemIndex];
    document.querySelector('#tx-configuration-asset-description').innerHTML = selectedItem.header.name;
    document.querySelector('#tx-configuration-asset-type').innerHTML = TARA_API.query().category+'/category : '+selectedItem.header.type;
    document.querySelector('#tx-configuration-asset-version').value = selectedItem.header.version;
    let assetForm = document.querySelector('#tx-asset-create-form');
    let props = [];
    props.push('<legend class=\'tx-text-14 w3-text-blue\'>');
    props.push(selectedItem.header.name);
    props.push('</legend>');
    selectedItem.application.properties.forEach(p=> {
        console.log(p);
        props.push(toHtmlInputType(p));
    });
    assetForm.innerHTML = props.join('');  
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-asset"),{mode:'tree'},itemTemplate);
    
    document.querySelectorAll('.tx-list-item-add').forEach(a=>{
        a.onclick = ()=>{
            let list = document.querySelector('#tx-asset-property-Items');
            list.innerHTML += '<li>A</li>';
        };
    });
    document.querySelector('#tx-configuration-asset-back').onclick=()=>{
        document.querySelector('#tx-asset-create-section').style.display ='block';
        document.querySelector('#tx-asset-create-json').style.display ='none';    
    };
    document.querySelector('#tx-configuration-asset-cancel').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';    
    };
    document.querySelector('#tx-configuration-asset-save').onclick=()=>{
        let item = editor.get();   
        let cmd = toCmd(TARA_API.query().category);
        TARA_API.onSet('role/item',cmd,TARA_API.query().gameClusterId,item,(resp)=>{
            editor.set(resp);   
        });
    };
    document.querySelector('#tx-configuration-asset-preview').onclick=()=>{
        let _typeId = document.querySelector('#tx-configuration-asset-type-id').value;
        let _name= document.querySelector('#tx-configuration-asset-name').value;
        let _version = document.querySelector('#tx-configuration-asset-version').value;
        let item = editor.get();
        item.configurationType = TARA_API.query().category;
        item.configurationTypeId = _typeId;
        item.configurationName = _name;
        item.configurationCategory = selectedItem.header.type;
        item.configurationVersion = _version;
        selectedItem.application.properties.forEach(p=> {
            let pv = document.querySelector('#tx-asset-property-'+p.name).value;
            item.header[p.name] = pv;
        });
        editor.set(item);
        document.querySelector('#tx-asset-create-section').style.display ='none';
        document.querySelector('#tx-asset-create-json').style.display ='block';
    };
    document.querySelector('#tx-configuration-asset-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-asset-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-asset-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-asset-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function toHtmlInputType(prop){
        let tem = [];
        if(prop.type == 'list') tem.push('<div>');
        tem.push('<label class=\'tx-text-12 tx-margin-left-4\'>');
        tem.push(prop.name);    
        tem.push('</label>');
        if(prop.type == 'list'){
            tem.push('<span class=\'w3-right tx-margin-right-4 tx-list-item-add\'><i class=\'fa fa-plus\' style=\'font-size:12px\'></i></span></div>');
        }
        if(prop.type=='boolean') tem.push('</br>');
        if(prop.type == 'enum' || prop.type == 'reference'){
            tem.push('<select ');
        }
        else if(prop.type == 'list'){
            tem.push('<ul ');
        }
        else{
            tem.push('<input ');
        }
        tem.push('id=\'');
        tem.push('tx-asset-property-');
        tem.push(prop.name);
        tem.push('\' ');
        if(prop.type=='boolean'){
            tem.push('class=\'w3-round w3-border tx-text-12 w3-check tx-margin-left-4 tx-margin-bottom-4\' type=\'checkbox\'></br>');
            return tem.join('');
        }
        if(prop.type=='number'){
            tem.push('class=\'w3-input w3-round w3-border tx-text-12\' type=\'number\'>');
            return tem.join('');
        }
        if(prop.type=='dateTime'){
            tem.push('class=\'w3-input w3-round w3-border tx-text-12\' type=\'datetime-local\'>');
            return tem.join('');
        }
        if(prop.type == 'enum' || prop.type == 'reference'){
            tem.push('name=\'chs\' class=\'w3-round w3-border tx-text-12 w3-select tx-margin-left-4\'>');
            tem.push('<option value=\'a\'>A</option>');
            tem.push('<option value=\'b\'>B</option>');
            tem.push('<option value=\'c\'>C</option>');
            tem.push('</select>');
            return tem.join('');
        }
        if(prop.type == 'list'){
            tem.push('class=\'w3-card-4 w3-round w3-border tx-text-12 w3-ul tx-margin-left-4\'>');
            //tem.push('<li>A</li>');
            //tem.push('<li>B</li>');
            //tem.push('<li>C</li>');
            tem.push('</ul>');
            return tem.join('');
        }
        tem.push('class=\'w3-input w3-round w3-border tx-text-12\' type=\'text\'>');
        return tem.join(''); 
    }
    function toCmd(category){
        return "onCreate"+category[0].toUpperCase() + category.slice(1).toLowerCase();
    }
</script>
