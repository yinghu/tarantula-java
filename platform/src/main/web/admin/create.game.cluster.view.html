<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-create-game-cluster-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">CREATE GAME CLUSTER</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-create-game-cluster-message"></div>
    <div class="w3-panel w3-border-bottom w3-border-red tx-text-14">
        <div class="w3-container w3-center">
            <p>You are creating a game service cluster to support your new game title</p>
        </div>
    </div>
    <div id='tx-create-game-cluster-form' class="w3-container w3-border-bottom w3-border-red">
        <div class="w3-panel">
            <label class="tx-text-12">Game Title Name :</label>
            <input id ="tx-game-cluster-name" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='game title name'/>
        </div>
        <div class="w3-panel">
            <span><label class="tx-text-12">Game Logo Icon :</label></span>
            <span class="w3-right tx-logo-icon-upload" tx-logo-icon-name='tx-game-cluster-logo'><i class="fa fa-file" style="font-size:24px; color: green"></i></span>
            <input id ="tx-game-cluster-logo" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='game logo icon' disabled/>
        </div> 
        <div class="w3-panel">
            <label class="tx-text-12">Developer Name :</label>
            <input id ="tx-game-cluster-developer" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='developer name'/>
        </div>
        <div class="w3-panel">
            <span><label class="tx-text-12">Developer Logo Icon :</label></span>
            <span class="w3-right tx-logo-icon-upload" tx-logo-icon-name='tx-game-cluster-developer-logo'><i class="fa fa-file" style="font-size:24px; color: green;"></i></span>
            <input id ="tx-game-cluster-developer-logo" class="w3-input w3-round w3-border tx-text-16" type="text" placeholder='game logo icon' disabled/>
        </div> 
        <div class="w3-panel">
            <label class="tx-text-12 tx-margin-right-4">Game Play Mode :</label>
            <select id='tx-play-mode' class="w3-select w3-border w3-round tx-text-12" name='mode'>
                <option value="" disabled selected>Choose Play Mode</option>
                <option value="pve">PVE (Single Player Versus Computer)</option>
                <option value="pvp">PVP (Player Versus Player)</option>
                <option value="tve">TVE (Team Versus Computer)</option>
                <option value="tvt">TVT (Team Versus Team)</option>   
            </select>
        </div>
        <div class="w3-panel">
            <label class="tx-text-12 tx-margin-right-4">Enable Tournament</label>
            <input id='tx-game-cluster-enable-tournament' class="w3-check tx-text-12" type="checkbox">
            <label class="tx-text-12 tx-margin-right-4">Enable Dedicated Server</label>
            <input id='tx-game-cluster-dedicated-server' class="w3-check tx-text-12" type="checkbox">
        </div>
        <div class="w3-panel">
            <span id="tx-create-game-cluster" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Create Game Cluster</span>
        </div>
    </div> 
    <div id='tx-launch-game-cluster-form' class="w3-container w3-border-bottom w3-border-red w3-center">
        <span id="tx-launch-game-cluster" class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Launch Game Cluster</span>   
        <!--
        <span id="tx-edit-game-cluster" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Update Game Cluster</span>
        -->
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <!-- Upload form-->
    <div class="w3-card-4 w3-border w3-round w3-white tx-popup-w300-h200" id="tx-logo-icon-upload-board">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-upload w3-text-yellow tx-margin-top-4" style="font-size:16px;color: green;"></i></span>
                <span class="tx-margin-left-8 tx-text-12">Logo Icon</span>
            </div>
        </div>
        <div class="w3-display-container" style="height: 16px">
            <div class="w3-container tx-margin-top-16">
                <div class="w3-border">
                    <div id="tx-upload-progress" class="w3-green" style="height:16px;width:1%"></div>
                </div>
            </div>
        </div>
        <div class="w3-display-container" style="height: 16px;">
            <div class="w3-container w3-center tx-margin-top-8">
                <span id='tx-logo-icon-file-name' class="tx-text-12">Choose Icon To Upload (PNG ONLY)</span>
            </div>
        </div>
        <div class="w3-display-container" style="height: 32px;">
            <div class="w3-panel">
                <span id='tx-logo-icon-upload-ok' class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-12 tx-padding-button" style="display: block;">Upload</span>
            </div>
        </div>    
        <div class="w3-display-container" style="height: 30px;">    
            <div class="w3-display-bottomleft tx-margin-left-16 tx-margin-bottom-8">
                <span id="tx-logo-icon-upload-cancel" class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-12 tx-padding-button">Cancel</span>     
            </div>
            <div class="w3-display-bottomright tx-margin-right-16">
                <label for="tx-logo-icon-upload-file" class="tx-file-upload w3-round">
                    <span class="w3-tag w3-right w3-green w3-round w3-border w3-border-red tx-text-12 tx-padding-button">Choose File</span>
                </label>
                <input id ="tx-logo-icon-upload-file" type="file"/>
            </div>
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>    
</div>
<script>
    let _mode = "pve";
    let _pendingIcon ={ready:false,progress:1};
    document.querySelector('#tx-launch-game-cluster-form').style.display='none';
    document.querySelector('#tx-create-game-cluster').onclick=()=>{
        let _n = document.querySelector('#tx-game-cluster-name').value;
        let _b = document.querySelector('#tx-game-cluster-enable-tournament').checked;
        let _d = document.querySelector('#tx-game-cluster-dedicated-server').checked;
        let _gicon = document.querySelector('#tx-game-cluster-logo').value;
        let _dicon = document.querySelector('#tx-game-cluster-developer-logo').value;
        let _developer = document.querySelector('#tx-game-cluster-developer').value;
        if(_n ==null | _n == ''){
            document.querySelector('#tx-create-game-cluster-message').innerHTML = 'Game cluster name cannot be null';
            return;
        }
        if(_gicon ==null | _gicon == ''){
            document.querySelector('#tx-create-game-cluster-message').innerHTML = 'Game cluster icon cannot be null';
            return;
        }
        if(_dicon ==null | _dicon == ''){
            document.querySelector('#tx-create-game-cluster-message').innerHTML = 'Game developer icon cannot be null';
            return;
        }
        let cmd = {serviceTag:'role/admin',command:'onCreateGameCluster'};
        cmd.name = _n;
        cmd.playMode = _mode;
        cmd.tournamentEnabled = _b;
        cmd.dedicated = _d;
        cmd.gameIcon = _gicon;
        cmd.developer = _developer;
        cmd.developerIcon = _dicon;
        TARA_API.onService(true,cmd,(resp)=>{
            if(resp.successful){
                //goes to do lobby configurations
                TARA_API.query().gameClusterId = resp.gameClusterId;
                document.querySelector('#tx-create-game-cluster-form').style.display='none';
                document.querySelector('#tx-launch-game-cluster-form').style.display='block';
                TARA_API.query().callback();
            }
            else{
                document.querySelector('#tx-create-game-cluster-message').innerHTML = resp.message;
            }
        });       
    };
    document.querySelector('#tx-play-mode').onchange = ()=>{
        _mode = document.querySelector('#tx-play-mode').value;
    };
    document.querySelectorAll('.tx-logo-icon-upload').forEach(a=>{
        a.onclick=()=>{ 
            let icon = a.getAttribute('tx-logo-icon-name');
            _pendingIcon.icon = icon;
            document.querySelector('#tx-logo-icon-upload-board').style.display = 'block';
        }
    });
    document.querySelector("#tx-logo-icon-upload-file").onchange = (e)=>{
        let _fd = e.target.files[0];
        _pendingIcon.file = _fd;
        document.querySelector('#'+_pendingIcon.icon).value = _fd.name;
        document.querySelector("#tx-logo-icon-file-name").innerHTML = _fd.name; 
        var reader = new FileReader();
        reader.onloadend = (fe)=>{
            _pendingIcon.data = reader.result;
            _pendingIcon.ready = true; 
        };
        reader.readAsArrayBuffer(_fd); 
    }; 
    document.querySelector('#tx-logo-icon-upload-cancel').onclick = ()=>{
        document.querySelector('#'+_pendingIcon.icon).value ='';
        _pendingIcon = {ready:false,progress:1};
        document.querySelector('#tx-upload-progress').style.width = '1%';
        document.querySelector("#tx-logo-icon-file-name").innerHTML = "Choose Icon To Upload (PNG ONLY)";
        document.querySelector('#tx-logo-icon-upload-board').style.display = 'none';
    };
    document.querySelector('#tx-logo-icon-upload-ok').onclick = ()=>{
        if(!_pendingIcon.ready){ 
            document.querySelector("#tx-logo-icon-file-name").innerHTML = 'Select icon file first!'; 
            return;
        }
        let f = _pendingIcon.file;
        let sfx = f.name.split('.').pop();
        if(sfx != 'png'){
            document.querySelector("#tx-logo-icon-file-name").innerHTML = 'Select PNG format file!'; 
            return;
        } 
        TARA_API.onUpload(_pendingIcon.data,f.name,'image/png','createGameCluster',(resp)=>{
            if(resp.successful){
                console.log(_pendingIcon.icon);
                document.querySelector('#'+_pendingIcon.icon).value = resp.message;
                document.querySelector('#tx-upload-progress').style.width = '100%'; 
                document.querySelector('#tx-logo-icon-upload-board').style.display = 'none';
                _pendingIcon = {ready:false,progress:1};   
                document.querySelector('#tx-upload-progress').style.width = '1%'; 
                document.querySelector("#tx-logo-icon-file-name").innerHTML = "Choose Icon To Upload (PNG ONLY)";  
            }
            else{
                console.log(resp);
                if(resp.code == 0 || resp.code == 200){
                    _pendingIcon.progress += 20;
                    document.querySelector('#tx-upload-progress').style.width = _pendingIcon.progress+'%'; 
                }else{
                    document.querySelector("#tx-logo-icon-file-name").innerHTML = "something wrong, try again";  
                    //_pendingIcon = {ready:false,progress:1};
                }
            }  
        });   
    };
 
    document.querySelector('#tx-launch-game-cluster').onclick=()=>{
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onLaunchGameCluster',accessId:TARA_API.query().gameClusterId},(resp)=>{
            document.querySelector('#tx-create-game-cluster-message').innerHTML = resp.message;  
            TARA_API.query().callback(); 
            let m3 = document.querySelector('#tx-popup');
            m3.innerHTML="";
            m3.style.display = 'none';   
        });
    };
    document.querySelector('#tx-create-game-cluster-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
