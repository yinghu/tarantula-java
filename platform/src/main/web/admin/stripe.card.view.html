<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-shopping-card-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-shopping-cart" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">SUBSCRIPTION</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-border-bottom w3-border-red w3-text-yellow tx-text-12" id="tx-shopping-card-message">Processing Via Payment Gateway Stripe</div>
    <div class="w3-display-container w3-white w3-border-bottom w3-border-red tx-content-100">
        <div class="w3-display-bottomleft w3-padding">
            <span class="tx-margin-left-8 tx-text-12">Monthly Subscription Fee</span>          
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes w3-text-green" style="font-size:16px"></i></span>
            <span id='tx-monthly-access-tag' class="tx-margin-left-8 tx-text-14">N/A</span>
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span tx-subscription-type='monthly' class='w3-tag w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-subscription-action'>Pay With Card</span>
        </div>
    </div>
    <div class="w3-display-container w3-white w3-border-bottom w3-border-red tx-content-100">
        <div class="w3-display-bottomleft w3-padding">
            <span class="tx-margin-left-8 tx-text-12">Yearly Subscription Fee</span>          
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes w3-text-green" style="font-size:16px"></i></span>
            <span id='tx-yearly-access-tag' class="tx-margin-left-8 tx-text-14">N/A</span>
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span tx-subscription-type='yearly' class='w3-tag w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-subscription-action'>Pay With Card</span>
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cc-stripe" style="font-size:24px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Payment Proccessed By Stripe</span>
        </div>
    </div>
    <!-- Stripe check out form -->
    <div class="w3-card-4 w3-border w3-round w3-white tx-checkout" id="tx_checkout">
        <div class="w3-display-container w3-padding w3-round w3-light-green tx-content-120">
            <div class="w3-display-topright w3-padding"><span><i id='tx_checkout_cancel' class='w3-text-white fa fa-close' style="font-size:12px"></span></i></div>
            <div class="w3-display-topmiddle"><img style="margin-top: -40px" src='https://stripe.com/img/documentation/checkout/marketplace.png' width="70" height="70"></div>
            <div class="w3-display-middle tx-pay-amount">Amount : $ <span id="tx_checkout_price"></span></div>
            <div class="w3-display-bottomleft w3-padding w3-text-white tx-text-12"><span id="tx_checkout_name"></span></div>
        </div>
        <div class="w3-panel">
            <div class="w3-round w3-border w3-border-green w3-padding" id="tx_card_number"></div>
            <div class="w3-round w3-border w3-border-green w3-padding tx-margin-top-4" id="tx_card_expiry"></div>
            <div class="w3-round w3-border w3-border-green w3-padding tx-margin-top-4" id="tx_card_cvc"></div>
            <div class="w3-round w3-button w3-block w3-green tx-margin-top-16 tx-pay-now" id='tx_checkout_pay'>Pay Now</div>
            <div class="w3-panel w3-round w3-yellow w3-text-red w3-padding tx-text-12" id="tx_checkout_error" style="display: none"></div>
            <div class="w3-panel w3-round w3-yellow w3-text-green w3-padding tx-text-12" id="tx_checkout_message" style="display: none"></div>
        </div>
    </div>
    <!-- END OF stripe checkout form-->
</div>
<script>
    TARA_API.onService(true,{serviceTag:'role/admin',command:'onShoppingList'},(resp)=>{
        if(resp.successful){
            TARA_API.query().monthly = resp.monthlyFee;
            TARA_API.query().yearly = resp.yearlyFee;
            document.querySelector('#tx-monthly-access-tag').innerHTML=resp.monthlyFee.amount+' '+resp.monthlyFee.currency;
            document.querySelector('#tx-yearly-access-tag').innerHTML=resp.yearlyFee.amount+' '+resp.yearlyFee.currency;
            _tx_load();
        }else{
            document.querySelector('#tx-shopping-card-message').innerHTML = resp.message;
        }        
    });
    document.querySelector("#tx-shopping-card-close").onclick = ()=>{
        let m1 = document.querySelector('#tx-popup');
        m1.innerHTML='';
        m1.style.display = 'none';    
    };
 
    //payment provider stripe integration and check out to commit orderId to server for verification
    var elementStyles = {
            base: {
              color: '#32325D',
              fontFamily: 'Oswald',
              fontSize: '16px',
              fontSmoothing: 'antialiased',
              '::placeholder': {
                color: '#CFD7DF',
              },
              ':-webkit-autofill': {
                color: '#e39f48',
              },
            },
            invalid: {
              color: '#E25950',
              '::placeholder': {
                color: '#FFCCA5',
              },
            },
    };
    function _tx_load(){
        document.querySelectorAll('.tx-subscription-action').forEach((a)=>{
            a.onclick = function(e){
                let ft = a.getAttribute('tx-subscription-type');
                document.querySelector("#tx_checkout_error").innerHTML = "";
                document.querySelector("#tx_checkout_error").style.display = "none";
                document.querySelector("#tx_checkout_message").innerHTML = "";
                document.querySelector("#tx_checkout_message").style.display = "none";
                let ptag = ft=='monthly'?TARA_API.query().monthly:TARA_API.query().yearly;
                _tx_checkout(ptag);
            };
        });
        document.querySelector('#tx_checkout_cancel').onclick = ()=>{document.querySelector('#tx_checkout').style.display='none';};
    }
    function _tx_checkout(ptag){
        document.querySelector("#tx_checkout_name").innerHTML = ptag.name; 
        document.querySelector("#tx_checkout_price").innerHTML = ptag.amount; 
        document.querySelector("#tx_checkout_message").innerHTML = 'NOTE: refund is not avilable'; 
        document.querySelector("#tx_checkout_message").style.display = "block";
        document.querySelector("#tx_checkout").style.display = 'block';    
        try{
            var stripe = Stripe(TARA_API.query().stripeClientId);
            var elements = stripe.elements();
            var card = elements.create('cardNumber',{style:elementStyles,placeholder:'card number'});
            var expiry = elements.create('cardExpiry',{style:elementStyles,placeholder:'expiry month/year'});
            var cvc = elements.create('cardCvc',{style:elementStyles,placeholder:'verification code'});
            card.mount('#tx_card_number');
            expiry.mount('#tx_card_expiry');
            cvc.mount('#tx_card_cvc');
            document.querySelector('#tx_checkout_pay').onclick = function(){
                stripe.createToken(card).then((ret)=>{
                    //console.log(ret);
                    if(ret.token){
                        document.querySelector("#tx_checkout_message").innerHTML = "You card validated via stripe.com"; 
                        document.querySelector("#tx_checkout_message").style.display = "block";
                        document.querySelector("#tx_checkout_error").style.display = "none";
                        tx_shopping_commit(ret.token,ptag);
                    }
                    else if(ret.error){
                        //display error to player
                        document.querySelector("#tx_checkout_error").innerHTML = ret.error.message; 
                        document.querySelector("#tx_checkout_error").style.display = "block";
                        document.querySelector("#tx_checkout_message").style.display = "none";
                    }
                    else{
                        document.querySelector("#tx_checkout_error").innerHTML = "unknown error, please try later";
                        document.querySelector("#tx_checkout_error").style.display = "block";
                        document.querySelector("#tx_checkout_message").style.display = "none";
                    }
                });    
            };
        }catch(err){
           document.querySelector("#tx_checkout_error").innerHTML = err;
           document.querySelector("#tx_checkout_error").style.display = "block"; 
        }   
    }
    function tx_shopping_commit(token,ptag){
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onCommitPurchase',checkoutId:ptag.type,orderId:token.id},(resp)=>{
            //popup web payment integration page  
            document.querySelector("#tx_checkout_message").innerHTML = resp.message;   
            if(resp.successful){
                setTimeout(()=>{document.querySelector("#tx_checkout").style.display = 'none'},2000);
            }
        });
    }
    
</script>
