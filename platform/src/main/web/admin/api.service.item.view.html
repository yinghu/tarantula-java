<script>
    list_service_item();       
    document.querySelectorAll('.tx-game-item-api-service-list-register').forEach((a)=>{
        a.onclick=()=>{
            let ix = a.getAttribute('item-index')/1;    
            TARA_API.query().itemId = a.getAttribute('item-id');
            TARA_API.query().item = TARA_API.query().items[ix];
            TARA_API.query().gamePopup = '#tx-popup-game';
            tx_view({viewId:'register.application',containerId:'#tx-popup-game'}); 
        }
    });
    document.querySelector('#tx-game-item-api-close').onclick=()=>{
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function list_service_item(){
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',TARA_API.query().gameClusterId,(resp)=>{
            console.log(resp);
            if(resp.successful){
                document.querySelector('#tx-game-item-api-service-message').innerHTML=resp.message;
                TARA_API.query().items = resp.itemList;
                resp.itemList.forEach((a,i)=>{
                    document.querySelector('#tx-game-item-api-service-list-type-'+i).innerHTML = a.configurationType;
                    document.querySelector('#tx-game-item-api-service-list-name-'+i).innerHTML = a.configurationName;
                    document.querySelector('#tx-game-item-api-service-list-api-'+i).setAttribute('item-id',a.itemId);
                    document.querySelector('#tx-game-item-api-service-list-api-'+i).setAttribute('item-index',i);
                    document.querySelector('#tx-game-item-api-service-list-'+i).style.display = 'block';
                });
            }
            else{
                document.querySelector('#tx-game-item-api-service-message').innerHTML=resp.message;
            }
        });
    }
</script>
