<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-game-asset-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id="tx-game-asset-title" class="tx-margin-left-8 tx-text-24">Game Asset List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-asset-category-create' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>New Type(category)</span>          
            <span id='tx-asset-enum-create' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>New Type(enum)</span> 
        </div>            
    </div>
    <div id='tx-service-template-bar-pane' class="w3-panel">
        <fieldset class="w3-border-blue tx-text-12">
            <legend id="tx-service-template-bar-pane-title">Service.Items</legend>
            <!--<select class="w3-select w3-border tx-margin-bottom-8" name="option">
                <option value="type">ByType</option>
                <option value="category">ByCategory</option>
                <option value="typeId" selected>ByTypeId</option>
                <option value="name">ByName</option>
            </select>-->
            <div id='tx-service-item-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div id='tx-application-template-bar-pane' class="w3-panel" style="display: none;">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Applications</legend>
            <div id='tx-application-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div id='tx-item-template-bar-pane' class="w3-panel" style="display: none;">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Items</legend>
            <div id='tx-item-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div id='tx-commodity-template-bar-pane' class="w3-panel" style="display: none;">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Commodities</legend>
            <div id='tx-commodity-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div id='tx-component-template-bar-pane' class="w3-panel" style="display: none;">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Components</legend>
            <div id='tx-component-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div id='tx-asset-template-bar-pane' class="w3-panel" style="display: none;">
        <fieldset class="w3-border-blue tx-text-12">
            <legend>Assets</legend> 
            <div id='tx-asset-template-bar' class='w3-bar w3-white'>
            </div>
        </fieldset>            
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <!-- application operation selection form -->
    <div class="w3-card-4 w3-border w3-round w3-white tx-popup-w300-h150" id="tx-application-operation-selection-board">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topright w3-padding">
                <span id="tx-application-operation-selection-cancel"><i class="fa fa-close" style="font-size:12px"></i></span>            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:16px"></i></span>
                <span class="tx-margin-left-8 tx-text-14">Operation</span>
            </div>
        </div>
        <div class="w3-display-container" style="height: 78px;">
            <div id="tx-application-operation-selection-message" class="w3-display-topmiddle w3-center tx-margin-top-8 tx-text-14">Edit/Publish</div>
            <div class="w3-display-bottomleft tx-margin-left-16 tx-margin-bottom-8">
                <span id='tx-application-operation-selection-edit' class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button">Edit</span>
            </div>
            <div class="w3-display-bottomright tx-margin-right-16 tx-margin-bottom-8">
                <span id='tx-application-operation-selection-publish' class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button">Publish</span>
            </div>
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>
</div>
<script>
    let applications ={};
    let operationBoard = document.querySelector('#tx-application-operation-selection-board');
    let operationMessage = document.querySelector('#tx-application-operation-selection-message');
    let serviceBar = document.querySelector('#tx-service-item-template-bar');
    let serviceBarTitle = document.querySelector('#tx-service-template-bar-pane-title');
    if(TARA_API.query().category == 'application'){
        document.querySelector('#tx-game-asset-title').innerHTML = tx_first_upcase(TARA_API.query().serviceCategory)+" List";
        TARA_API.onGet(TARA_API.query().serviceTag,'onList',TARA_API.query().gameClusterId,(resp)=>{
            console.log(resp);
            if(resp.successful){
                serviceBar.innerHTML = '';
                resp.itemList.forEach((a,i)=>{
                    serviceBar.innerHTML += toHtmlServiceBarItem(a,i);
                });
            }
            hookEvent();
        });
        serviceBarTitle.innerHTML = tx_first_upcase(TARA_API.query().serviceCategory)+".Items";
        //document.querySelector('#tx-service-template-bar-pane').style.display = 'block';
    }else{
        TARA_API.onGet('role/item',"onStock",TARA_API.query().gameClusterId+'#type/'+TARA_API.query().category,(resp)=>{
            console.log(resp);
            if(resp.successful){
                serviceBar.innerHTML = '';
                resp.itemList.forEach((a,i)=>{
                    serviceBar.innerHTML += toHtmlBarStockItem(a,i);
                });
            }
            hookEvent();
        });  
        serviceBarTitle.innerHTML = tx_first_upcase(TARA_API.query().category)+".Items";
        document.querySelector('#tx-game-asset-title').innerHTML = tx_first_upcase(TARA_API.query().category)+" List";
    }
    let bars = {};
    bars.assetBar = [document.querySelector('#tx-asset-template-bar'),document.querySelector('#tx-asset-template-bar-pane')];
    bars.componentBar = [document.querySelector('#tx-component-template-bar'),document.querySelector('#tx-component-template-bar-pane')];
    bars.commodityBar = [document.querySelector('#tx-commodity-template-bar'),document.querySelector('#tx-commodity-template-bar-pane')];
    bars.itemBar = [document.querySelector('#tx-item-template-bar'),document.querySelector('#tx-item-template-bar-pane')];
    bars.applicationBar = [document.querySelector('#tx-application-template-bar'),document.querySelector('#tx-application-template-bar-pane')];
    TARA_API.onGet('role/item','onCategorySettings',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,(resp)=>{
        console.log(resp);
        TARA_API.query().itemList = resp.itemList;
        TARA_API.query().types = {};
        resp.types.itemList.forEach(t=>{
            TARA_API.query().types[t.name]=t;            
        });
        bars.assetBar[0].innerHTML ='';
        bars.componentBar[0].innerHTML = '';
        bars.commodityBar[0].innerHTML = '';
        bars.itemBar[0].innerHTML = '';
        bars.applicationBar[0].innerHTML = '';
        resp.itemList.forEach((a,i)=>{
            bars[a.header.scope+'Bar'][0].innerHTML += toHtmlBarItem(a,i);
            bars[a.header.scope+'Bar'][1].style.display = 'block';
        });
        hookEvent();
    });
    document.querySelector('#tx-asset-category-create').onclick = ()=>{
        TARA_API.query().popup='#tx-popup-api';
        tx_view({viewId:'create.category',containerId:'#tx-popup-api'});
    };
    document.querySelector('#tx-asset-enum-create').onclick = ()=>{
        TARA_API.query().popup='#tx-popup-api';
        tx_view({viewId:'create.enum',containerId:'#tx-popup-api'});
    };
    document.querySelector('#tx-game-asset-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-application-operation-selection-cancel').onclick =()=>{
        operationBoard.style.display = 'none';
    }
    document.querySelector('#tx-application-operation-selection-edit').onclick =()=>{
        operationBoard.style.display = 'none';
        tx_view({viewId:'create.asset',containerId:'#tx-popup-api'});
    }
    document.querySelector('#tx-application-operation-selection-publish').onclick =()=>{
        operationBoard.style.display = 'none';
        tx_view({viewId:'register.application',containerId:'#tx-popup-api'});
    }
    function hookEvent(){
        document.querySelectorAll('.tx-game-asset-template').forEach(a=>{
            a.onclick=()=>{
                let ix = a.getAttribute('tx-index')/1;
                TARA_API.query().operation = 'Create';
                TARA_API.query().itemIndex = ix;
                TARA_API.query().popup='#tx-popup-api';
                tx_view({viewId:'create.asset',containerId:'#tx-popup-api'});
            };
        });
        document.querySelectorAll('.tx-service-item-action').forEach(e=>{
            e.onclick = ()=>{
                let app = applications[e.getAttribute('tx-application-id')];
                //let cat = TARA_API.query().types[app.configurationCategory];
                TARA_API.query().itemList.forEach((a,i)=>{
                    if(app.configurationCategory == a.header.type){
                        console.log(a);
                        console.log(i);
                        TARA_API.query().itemIndex = i;
                    }
                });
                TARA_API.query().operation = 'Update';
                TARA_API.query().pendingUpdate = app;
                TARA_API.query().popup='#tx-popup-api';
                operationBoard.style.display = 'block';
                operationMessage.innerHTML = app.configurationCategory+':'+app.configurationName;
                //tx_view({viewId:'create.asset',containerId:'#tx-popup-api'});
            }
        });
        document.querySelectorAll('.tx-stock-item-action').forEach(e=>{
            e.onclick = ()=>{
                let app = applications[e.getAttribute('tx-item-id')];
                //let cat = TARA_API.query().types[app.configurationCategory];
                TARA_API.query().itemList.forEach((a,i)=>{
                    if(app.configurationCategory == a.header.type){
                        console.log(a);
                        console.log(i);
                        TARA_API.query().itemIndex = i;
                    }
                });
                TARA_API.query().operation = 'Update';
                TARA_API.query().pendingUpdate = app;
                TARA_API.query().popup='#tx-popup-api';
                tx_view({viewId:'create.asset',containerId:'#tx-popup-api'});
            }
        });
    }
    function toHtmlBarItem(a,i){
        let tem = [];
        tem.push('<span tx-index=\''+i);
        tem.push('\' class=\'w3-bar-item w3-tag w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-game-asset-template\'>');
        tem.push(a.header.scope+'.'+a.header.type);
        tem.push('</span>');
        return tem.join('');    
    }

    function toHtmlServiceBarItem(a,i){
        applications[a.itemId] = a;
        let tem = [];
        tem.push('<span tx-application-id=\''+a.itemId);
        tem.push('\' class=\'w3-bar-item w3-tag w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-service-item-action\'>');
        tem.push(a.configurationCategory+':'+a.configurationName);
        tem.push('</span>');
        return tem.join('');    
    }
    function toHtmlBarStockItem(a,i){
        applications[a.itemId] = a;
        let tem = [];
        tem.push('<span tx-item-id=\''+a.itemId);
        tem.push('\' class=\'w3-bar-item w3-tag w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-stock-item-action\'>');
        tem.push(a.configurationCategory+':'+a.configurationName);
        tem.push('</span>');
        return tem.join('');    
    }
   
</script>
