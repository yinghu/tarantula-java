<script>
    TARA_API.onGet('role/item','onTemplateItemCategory',TARA_API.query().gameClusterId,(resp)=>{
        console.log(resp);
        resp.itemList.forEach((a,i)=>{
            document.querySelector('#tx-item-template-'+i).style.display = 'block';
            document.querySelector('#tx-item-template-'+i).innerHTML = a.header.type;
            document.querySelector('#tx-item-template-'+i).setAttribute('tx-category',a.header.type);
        });
    });
    document.querySelectorAll('.tx-game-item-template').forEach(a=>{
        a.onclick=()=>{
            hide_game_item_list();
            let category = a.getAttribute('tx-category');
            let query = TARA_API.query().gameClusterId+'#'+category;
            TARA_API.onGet('role/item','onTemplateItemList',query,(resp)=>{
                console.log(resp);
                document.querySelector('#tx-game-item-list-description-0').innerHTML = resp.description;
                document.querySelector('#tx-game-item-list-category-0').innerHTML = resp.category; 
                resp.itemList.forEach((gi,i)=>{
                    document.querySelector('#tx-game-item-list-type-'+i).innerHTML = gi.header.type;
                    document.querySelector('#tx-game-item-list-name-'+i).innerHTML = gi.header.name;
                    document.querySelector('#tx-game-item-list-'+i).style.display = 'block';    
                });
                TARA_API.query().itemTemplate = resp;
            });
        };
    });
    document.querySelectorAll('.tx-game-item-register').forEach(a=>{
        a.onclick=()=>{
            let ix = a.getAttribute('tx-index')/1;
            TARA_API.query().gameItemIndex= ix;
            TARA_API.query().popup='#tx-popup-api'; 
            tx_view({viewId:'create.item',containerId:'#tx-popup-api'});
        };
    });
    document.querySelector('#tx-game-item-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function hide_game_item_list(){
        for (let i = 0; i <=10; i++) {
            document.querySelector('#tx-game-item-list-'+i).style.display = 'none';
        }            
    }
</script>
