<script>
    let createGrantPopup = document.querySelector('#tx-global-grant-popup');
    let globalGrant = document.querySelector('#tx-global-grant');
    let listBar = document.querySelector('#tx-global-grant-event-list-list');

    populateGrantEvents();

    document.querySelector('#tx-grant-item-global').onclick=()=> {
        let _itemAmount = document.querySelector('#tx-item-amount').value;
        let _itemID = document.querySelector('#tx-item-type').value;

        let sel = document.querySelector('#tx-item-type');
        let _itemName = sel.options[sel.selectedIndex].text;

        let payload ={itemAmount:_itemAmount,itemID:_itemID,itemName:_itemName};

        TARA_API.onSet('role/admin','onCreateGlobalEvent',TARA_API.query().gameClusterId,payload,(resp)=>{
            document.querySelector('#tx-grant-item-message').innerHTML = resp.message;
        });

        sleep(100).then(() => {populateGrantEvents();})
    };

    function sleep(ms){
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function populateGrantEvents(){
        TARA_API.onGet('role/admin','onGetGlobalGrantEvents',TARA_API.query().gameClusterId,(resp)=>{

            listBar.innerHTML ='';
            resp.globalGrantEvent.forEach((grantEvent)=>{
                let tem = [];
                tem.push('<div class=\'w3-panel w3-padding w3-block w3-green tx-platform-cluster-node\'>');
                tem.push('<span class=\'w3-left tx-text-16 tx-margin-top-12 tx-margin-left-8\'>');
                tem.push("Item Name: " + grantEvent.ItemName + " | Amount: "+ grantEvent.Amount + " | Date Created: " + grantEvent.DateCreated + " | Players Granted: " + grantEvent.GrantAmount );
                tem.push('</span><span tx-grant-event-date=\''+grantEvent.DateCreated+'\'');
                tem.push(' class=\'w3-right w3-tag w3-red w3-round w3-border w3-border-black tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-global-grant-delete\'>Delete</span>');
                tem.push('</div>');
                listBar.innerHTML += tem.join('');
            });
            document.querySelectorAll('.tx-global-grant-delete').forEach(a=>{
                a.onclick=()=>{
                    let _dateCreated = a.getAttribute('tx-grant-event-date');
                    let payload ={dateCreated:_dateCreated};

                    TARA_API.onSet('role/admin','onDeleteGlobalGrantEvent',TARA_API.query().gameClusterId,payload,(resp)=>{
                        sleep(100).then(() => {populateGrantEvents();})
                    });
                };
            });
        });
    }


    document.querySelector('#tx-global-grant-button').onclick=()=> {
    createGrantPopup.style.display = 'block';
    };

    document.querySelector('#tx-global-granter-close').onclick=()=>{
        tx_close_current_page();
    };

    document.querySelector('#tx-global-grant-popup-close').onclick =()=>{
        createGrantPopup.style.display = 'none';
    }

</script>
