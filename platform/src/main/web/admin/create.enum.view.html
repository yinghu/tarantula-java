<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-create-enum-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-create-enum-title' class="tx-margin-left-8 tx-text-24">Item enum</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-container" id="tx-create-enum-form-section">
        <div class="w3-panel"> 
            <fieldset class="w3-border-blue"> 
                <legend class="tx-text-14 w3-text-blue">Properties</legend>
                <label class="tx-text-12 tx-margin-left-4">Name:</label>
                <input id='tx-create-enum-property-name' class="w3-input w3-round w3-border tx-text-12" type="text">
                <label class="tx-text-12 tx-margin-left-4">Entry:</label>
                <input id='tx-create-enum-property-entry' class="w3-input w3-round w3-border tx-text-12" type="text">
                <label class="tx-text-12 tx-margin-left-4">Value:</label>
                <input id='tx-create-enum-property-value' class="w3-input w3-round w3-border tx-text-12" type="number">
                <div class="w3-panel">
                    <span id="tx-create-enum-add" class="w3-right"><i class="fa fa-plus" style="font-size:16px"></i></span>             
                </div>
                <div class="w3-card-4 w3-round w3-border tx-text-12 w3-ul tx-margin-left-4">
                    <ul id='tx-create-enum-properties' class="w3-ul">
                        
                    </ul>
                </div>
            </fieldset>
        </div>
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-create-cateory-cancel' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Cancel</span>
                <span id='tx-create-cateory-preview' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span> 
            </div>            
        </div>
    </div>

    <div class="w3-container" id="tx-create-enum-json-section" style="display: none;">
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-enum-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
                <span id='tx-enum-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
                <span id='tx-enum-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>                
            </div>            
        </div>        
        <div class="w3-panel w3-center tx-text-14">
            <div id="jsoneditor-configuration-create-enum" style="width: 100%;"></div>
        </div> 
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-create-enum-back' class='w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Back</span>             
                <span id='tx-create-enum-save' class='w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span>             
            </div>            
        </div> 
    </div>
  
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>

    <div class="w3-card-4 w3-border w3-round w3-white tx-ok-checkout" id="tx-create-enum-warning-message-board">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
            <div class="w3-display-topright w3-padding">
                <!--<span><i class="fa fa-close" style="font-size:12px"></i></span>-->            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:24px"></i></span>
                <span class="tx-margin-left-8 tx-text-18">Warning</span>
            </div>
        </div>
        <div id="tx-create-enum-warning-message" class="w3-panel w3-center tx-text-14"></div>
        <div class="w3-panel w3-center">
            <span id="tx-create-enum-warning-message-ok" class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">CANCEL</span>     
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>

</div>
<script>
    let payload ={};
    let types = new Map();
    let pendingProps = new Map();
    TARA_API.onGet('role/item','onTypesSettings',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,(resp)=>{
        console.log(resp);
        //payload = resp;
        resp.itemList.forEach(t=>{
            types.set(t.name,t);        
        });   
    });
    let ixc = 0;
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-create-enum"),{mode:'tree'},{});
    document.querySelector('#tx-create-enum-property-value').value = 0;
    document.querySelector('#tx-create-enum-title').innerHTML = TARA_API.query().category+'/enum';
    document.querySelector('#tx-create-enum-add').onclick=()=>{
        let pname = document.querySelector('#tx-create-enum-property-entry').value;
        let pvalue = document.querySelector('#tx-create-enum-property-value').value;
        if(pname==null||pname==''){
            document.querySelector("#tx-create-enum-warning-message").innerHTML = "Property name cannot be null";
            document.querySelector('#tx-create-enum-warning-message-board').style.display = 'block';   
            return; 
        }
        if(pendingProps.has(pname)){ 
            document.querySelector("#tx-create-enum-warning-message").innerHTML = "Property name already existed";
            document.querySelector('#tx-create-enum-warning-message-board').style.display = 'block';   
            return;
        }
        pendingProps.set(pname,pvalue/1);
        let props = document.querySelector('#tx-create-enum-properties');
        ixc++;
        props.innerHTML += '<li id=\'txc-property-'+ixc+'\'><div class=\'w3-container\'><span>'+pname+':'+pvalue+'</span><span tx-property-name=\''+pname+'\' tx-property-index=\''+ixc+'\' class=\'w3-right tx-padding-button w3-tag w3-round w3-red tx-remove-property\'>Remove</span></div></li>';
        removeenumproperty();
    };
    document.querySelector('#tx-create-enum-warning-message-ok').onclick=()=>{
        document.querySelector('#tx-create-enum-warning-message-board').style.display = 'none';
    };
    document.querySelector('#tx-create-cateory-cancel').onclick=()=>{
        close_create_enum_view();
    };
    document.querySelector('#tx-create-enum-back').onclick=()=>{
        document.querySelector('#tx-create-enum-form-section').style.display ='block';
        document.querySelector('#tx-create-enum-json-section').style.display ='none';
    };
    document.querySelector('#tx-create-enum-save').onclick=()=>{    
        document.querySelector('#tx-create-enum-save').style.display ='none';
        let item = editor.get();
        let query = TARA_API.query().gameClusterId+'#'+TARA_API.query().category;
        TARA_API.onSet('role/item','onUpdateTypeSettings',query,item,(resp)=>{
            editor.set(resp);   
        });
    };
    
    document.querySelector('#tx-create-cateory-preview').onclick=()=>{
        let ptype = document.querySelector('#tx-create-enum-property-name').value;
        if(ptype==null||ptype==''){
            document.querySelector("#tx-create-enum-warning-message").innerHTML = "Enum name cannot be null";
            document.querySelector('#tx-create-enum-warning-message-board').style.display = 'block';   
            return;
        }
        if(types.has(ptype)){
            document.querySelector("#tx-create-enum-warning-message").innerHTML = "Enum ["+ptype+"]already existed";
            document.querySelector('#tx-create-enum-warning-message-board').style.display = 'block';   
            return;
        }
        let pendingEnum = {type:'enum',name:ptype}
        let value = []
        pendingProps.forEach((v,k,m)=>{
            value.push({name:k,value:v});
        });
        pendingEnum.value = value;
        payload.type=pendingEnum;
        editor.set(payload);
        document.querySelector('#tx-create-enum-form-section').style.display ='none';
        document.querySelector('#tx-create-enum-json-section').style.display ='block';
        document.querySelector('#tx-create-enum-save').style.display ='block';
    };
   
    document.querySelector('#tx-create-enum-close').onclick=()=>{
        close_create_enum_view();       
    };
    document.querySelector('#tx-enum-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-enum-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-enum-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function removeenumproperty(){
        document.querySelectorAll('.tx-remove-property').forEach(a=>{
            a.onclick = ()=>{
                let pname = a.getAttribute("tx-property-name");
                pendingProps.delete(pname);
                document.querySelector('#txc-property-'+a.getAttribute('tx-property-index')).style.display = 'none';
            };
        });
    }
    function close_create_enum_view(){
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';
    }
</script>
