<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-gamestore-api-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">GameStore API</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-gamestore-api-service-list' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Reload</span>          
        </div>            
    </div>
    <div id='tx-service-item-list-0' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span class='w3-left tx-text-14 tx-margin-top-8'><i class="fa fa-hourglass-1" style="font-size:24px;color:blue"></i></span>
            <span id='tx-service-item-list-type-0' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16'>Type</span>
            <span id='tx-service-item-list-name-0' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>Name</span>
            <span id="tx-service-item-list-api-0" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-item-register">Register</span>
        </div>    
    </div>
    <div id='tx-service-item-list-1' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span class='w3-left tx-text-14 tx-margin-top-8'><i class="fa fa-hourglass-1" style="font-size:24px;color:blue"></i></span>
            <span id='tx-service-item-list-type-1' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-16'>Type</span>
            <span id='tx-service-item-list-name-1' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>Name</span>
            <span id="tx-service-item-list-api-1" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-item-register">Register</span>
        </div>    
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <div class="w3-card-4 w3-border w3-round w3-white tx-item-checkout" id="tx-game-service-store-edit-form">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
            <div class="w3-display-topright w3-padding">
                <!--<span><i class="fa fa-close" style="font-size:12px"></i></span>-->            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:24px"></i></span>
                <span class="tx-margin-left-8 tx-text-18">Confirmation</span>
            </div>
        </div>
        <div class="w3-panel w3-border-bottom w3-border-red"></div>
        <div class="w3-panel  tx-text-14">
            <div id="jsoneditor-api-service-item-data" style="width: 100%;height:420px; overflow-y: scroll"></div> 
        </div>
        <div class="w3-panel w3-border-top w3-border-red tx-margin-top-8">
            <span id="tx-game-service-store-edit-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-16">Cancel</span>     
            <span id="tx-game-service-store-edit-ok" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-16">Confirm</span>     
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-api-service-item-data"),{mode:'preview',search:false,mainMenuBar:false,navigationBar:false},{});
    let items;
    TARA_API.onGet('role/store','onList',TARA_API.query().gameClusterId,(resp)=>{
            items = resp.itemList;
            list_service_item();       
    });
    document.querySelector('#tx-gamestore-api-service-list').onclick=()=>{
        TARA_API.onGet('role/store','onList',TARA_API.query().gameClusterId,(resp)=>{
            items = resp.itemList;
            list_service_item();       
        });
    };
    document.querySelectorAll('.tx-service-item-register').forEach((a)=>{
        a.onclick=()=>{
            document.querySelector('#tx-game-service-store-edit-form').style.display='block';
            let ix = a.getAttribute('item-index')/1;    
            TARA_API.query().itemId = a.getAttribute('item-id');
            editor.set(items[ix]);
            editor.expandAll();
        }
    });
    document.querySelector('#tx-game-service-store-edit-cancel').onclick=()=>{
        document.querySelector('#tx-game-service-store-edit-form').style.display='none';
    };
    document.querySelector('#tx-game-service-store-edit-ok').onclick=()=>{
        let k = TARA_API.query().gameClusterId+'#'+TARA_API.query().itemId;
        TARA_API.onSet('role/store','onRegister',k,editor.get(),(resp)=>{
            editor.set(resp);
        });
        //document.querySelector('#tx-game-service-store-edit-form').style.display='none';
    };
    document.querySelector('#tx-gamestore-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function list_service_item(){
        items.forEach((a,i)=>{
            document.querySelector('#tx-service-item-list-type-'+i).innerHTML = a.header.configurationType;
            document.querySelector('#tx-service-item-list-name-'+i).innerHTML = a.header.configurationName;
            document.querySelector('#tx-service-item-list-api-'+i).setAttribute('item-id',a.itemId);
            document.querySelector('#tx-service-item-list-api-'+i).setAttribute('item-index',i);
            document.querySelector('#tx-service-item-list-'+i).style.display = 'block';
        });
    }
</script>
