<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-create-primitive-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-create-primitive-title' class="tx-margin-left-8 tx-text-24">Item Primitive</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-container" id="tx-create-primitive-form-section">
        <div class="w3-panel"> 
            <fieldset class="w3-border-blue"> 
                <legend class="tx-text-14 w3-text-blue">Properties</legend>
                <label class="tx-text-12 tx-margin-left-4">Name:</label>
                <input id='tx-create-primitive-property-name' class="w3-input w3-round w3-border tx-text-12" type="text">
                <label class="tx-text-12 tx-margin-right-4">Type :</label>
                <select id='tx-create-primitive-property-type' class="w3-select w3-border w3-round tx-text-12" name='type'>
                    <option value="" disabled selected>Choose A Type</option>
                    <option value="string">String</option>
                    <option value="number">Number</option>
                </select>
                <label class="tx-text-12 tx-margin-right-4">Type Reference :</label>
                <select id='tx-create-primitive-property-reference' class="w3-select w3-border w3-round tx-text-12" name='reference'>
                    <option value="" disabled selected>Choose A Type Reference</option>
                    <option value="String">String</option>
                    <option value="short">Short</option>
                    <option value="integer">Integer</option>
                    <option value="long">Long</option>
                    <option value="double">Double</option>
                    <option value="float">Float</option>  
                </select>
                <label class="tx-text-12 tx-margin-right-4">Type Value :</label>
                <select id='tx-create-primitive-property-value' class="w3-select w3-border w3-round tx-text-12" name='value'>
                    <option value="" disabled selected>Choose A Type Value</option>
                    <option value="text">Text</option>
                    <option value="email">Email</option>
                    <option value="password">Password</option>
                    <option value="number">Number</option>  
                </select>
                <label class="tx-text-12 tx-margin-left-4">Regular Expression:</label>
                <input id='tx-create-primitive-property-entry' class="w3-input w3-round w3-border tx-text-12" type="text">
                
                <div class="w3-panel">
                    <span id="tx-create-primitive-add" class="w3-right"><i class="fa fa-plus" style="font-size:16px"></i></span>             
                </div>
                <div class="w3-card-4 w3-round w3-border tx-text-12 w3-ul tx-margin-left-4">
                    <ul id='tx-create-primitive-properties' class="w3-ul">
                        
                    </ul>
                </div>
            </fieldset>
        </div>
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-create-cateory-cancel' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Cancel</span>
                <span id='tx-create-cateory-preview' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span> 
            </div>            
        </div>
    </div>

    <div class="w3-container" id="tx-create-primitive-json-section" style="display: none;">
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-primitive-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
                <span id='tx-primitive-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
                <span id='tx-primitive-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>                
            </div>            
        </div>        
        <div class="w3-panel w3-center tx-text-14">
            <div id="jsoneditor-configuration-create-primitive" style="width: 100%;"></div>
        </div> 
        <div class="w3-panel w3-border-bottom w3-border-red">
            <div class='w3-bar w3-white'>
                <span id='tx-create-primitive-back' class='w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Back</span>             
                <span id='tx-create-primitive-save' class='w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-20 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span>             
            </div>            
        </div> 
    </div>
  
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>

    <div class="w3-card-4 w3-border w3-round w3-white tx-ok-checkout" id="tx-create-primitive-warning-message-board">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
            <div class="w3-display-topright w3-padding">
                <!--<span><i class="fa fa-close" style="font-size:12px"></i></span>-->            
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:24px"></i></span>
                <span class="tx-margin-left-8 tx-text-18">Warning</span>
            </div>
        </div>
        <div id="tx-create-primitive-warning-message" class="w3-panel w3-center tx-text-14"></div>
        <div class="w3-panel w3-center">
            <span id="tx-create-primitive-warning-message-ok" class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">CANCEL</span>     
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div> 
    </div>

</div>
<script>
    let primitive_type = "string";
    let primitive_value = "text";
    let primitive_reference = "String";

    let types = new Map();
    let pendingProps = new Map();
    TARA_API.onGet('role/admin/item','onTypesSettings',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,(resp)=>{
        console.log(resp);
        resp.itemList.forEach(t=>{
            types.set(t.name,t);        
        });   
    });
    let ixc = 0;
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-create-primitive"),{mode:'tree'},{});
    document.querySelector('#tx-create-primitive-property-value').value = 0;
    document.querySelector('#tx-create-primitive-title').innerHTML = TARA_API.query().category+'/primitive';
    document.querySelector('#tx-create-primitive-add').onclick=()=>{
        let pname = document.querySelector('#tx-create-primitive-property-name').value;
        let pvalue = document.querySelector('#tx-create-primitive-property-entry').value;
        if(pname==null||pname==''){
            document.querySelector("#tx-create-primitive-warning-message").innerHTML = "Property name cannot be null";
            document.querySelector('#tx-create-primitive-warning-message-board').style.display = 'block';   
            return; 
        }
        if(pendingProps.has(pname)){ 
            document.querySelector("#tx-create-primitive-warning-message").innerHTML = "Property name already existed";
            document.querySelector('#tx-create-primitive-warning-message-board').style.display = 'block';   
            return;
        }
        let _type ={type:primitive_type,name:pname,value:primitive_value,reference:primitive_reference,entry:pvalue};
        console.log(_type);
        pendingProps.set(pname,_type);
        let props = document.querySelector('#tx-create-primitive-properties');
        ixc++;
        props.innerHTML += '<li id=\'txc-property-'+ixc+'\'><div class=\'w3-container\'><span>'+pname+':'+_type.type+'&lt'+_type.reference+'&gt</span><span tx-property-name=\''+pname+'\' tx-property-index=\''+ixc+'\' class=\'w3-right tx-padding-button w3-tag w3-round w3-red tx-remove-property\'>Remove</span></div></li>';
        removeprimitiveproperty();
    };
    document.querySelector('#tx-create-primitive-warning-message-ok').onclick=()=>{
        document.querySelector('#tx-create-primitive-warning-message-board').style.display = 'none';
    };
    document.querySelector('#tx-create-cateory-cancel').onclick=()=>{
        close_create_primitive_view();
    };
    document.querySelector('#tx-create-primitive-back').onclick=()=>{
        document.querySelector('#tx-create-primitive-form-section').style.display ='block';
        document.querySelector('#tx-create-primitive-json-section').style.display ='none';
    };
    document.querySelector('#tx-create-primitive-save').onclick=()=>{    
        document.querySelector('#tx-create-primitive-save').style.display ='none';
        let item = editor.get();
        let query = TARA_API.query().gameClusterId+'#'+TARA_API.query().category;
        TARA_API.onSet('role/admin/item','onUpdateTypesSettings',query,item,(resp)=>{
            editor.set(resp);   
        });
    };
    
    document.querySelector('#tx-create-cateory-preview').onclick=()=>{
        let pendingprimitive = {type:'primitive',types:[]};
        pendingProps.forEach((v,k,m)=>{
            pendingprimitive.types.push(v);
        });
        editor.set(pendingprimitive);
        document.querySelector('#tx-create-primitive-form-section').style.display ='none';
        document.querySelector('#tx-create-primitive-json-section').style.display ='block';
        document.querySelector('#tx-create-primitive-save').style.display ='block';
    };
   
    document.querySelector('#tx-create-primitive-close').onclick=()=>{
        close_create_primitive_view();       
    };
    document.querySelector('#tx-primitive-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-primitive-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-primitive-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    document.querySelector('#tx-create-primitive-property-type').onchange = ()=>{
        primitive_type = document.querySelector('#tx-create-primitive-property-type').value;
    };
    document.querySelector('#tx-create-primitive-property-reference').onchange = ()=>{
        primitive_reference = document.querySelector('#tx-create-primitive-property-reference').value;
    };
    document.querySelector('#tx-create-primitive-property-value').onchange = ()=>{
        primitive_value = document.querySelector('#tx-create-primitive-property-value').value;
    };
    function removeprimitiveproperty(){
        document.querySelectorAll('.tx-remove-property').forEach(a=>{
            a.onclick = ()=>{
                let pname = a.getAttribute("tx-property-name");
                pendingProps.delete(pname);
                document.querySelector('#txc-property-'+a.getAttribute('tx-property-index')).style.display = 'none';
            };
        });
    }
    function close_create_primitive_view(){
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';
    }
</script>
