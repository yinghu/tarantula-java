<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-create-access-key-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-key" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">CREATE ACCESS KEY</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-create-access-key-message">
        <p>Use this access key on your dedicated game server to communicate with game cluster service.</p>
    </div> 
    <div class="w3-panel w3-center w3-border-bottom w3-border-red">
        <span id='tx-create-access-key-box' class="tx-text-12"></span>
        <span id="tx-create-access-key-copy" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Copy</span> 
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <span id="tx-create-access-key-test" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Test</span>     
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    TARA_API.onGet('role/admin','onCreateAccessKey',TARA_API.query().gameClusterId,(resp)=>{
        if(resp.successful){
            document.querySelector('#tx-create-access-key-box').innerHTML = resp.accessKey;
        }else{
            document.querySelector('#tx-create-access-key-message').innerHTML = resp.message;
        }      
    });
    document.querySelector('#tx-create-access-key-test').onclick=()=>{
        let _key = document.querySelector('#tx-create-access-key-box').innerHTML;
        TARA_API.onGet('role/admin','onTestAccessKey',_key,(resp)=>{
            document.querySelector('#tx-create-access-key-message').innerHTML = resp.message;  
        });    
    };
    document.querySelector('#tx-create-access-key-copy').onclick=()=>{
        let _key = document.querySelector('#tx-create-access-key-box').innerHTML;
        navigator.clipboard.writeText(_key);    
    };
    document.querySelector('#tx-create-access-key-close').onclick=()=>{
        tx_close_current_page();      
    };
</script>
