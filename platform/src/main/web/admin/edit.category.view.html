<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-edit-category-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-edit-category-list-title' class="tx-margin-left-8 tx-text-24"></span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel">
        <div id='tx-edit-category-list' class="w3-container">
            
        </div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-edit-category-list-title').innerHTML = 'Edit Category : '+TARA_HTML.caption(TARA_API.query().category);
    let categoryList = document.querySelector('#tx-edit-category-list');
    categoryList.innerHTML = '';
    tx_category_list_setup();
    document.querySelector('#tx-edit-category-close').onclick=()=>{
        tx_close_current_page();      
    };    
    function tx_category_list_setup(){
        TARA_API.onGet('role/admin/item','onCategorySettings',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,(resp)=>{
            console.log(resp);
            TARA_API.query().typeList = resp.types.itemList;
            TARA_API.query().itemList = resp.itemList;
            resp.itemList.forEach((item,i) => {
                categoryList.innerHTML += TARA_HTML.command(i,'category : '+item.header.type,item.header.version,'edit-category','Edit');    
            });
            resp.types.itemList.forEach((item,i) => {
                if(item.type == 'enum'){
                    categoryList.innerHTML += TARA_HTML.command(i,item.type,item.name,'edit-enum','Edit');
                }    
            });
            document.querySelectorAll('.tx-live-edit-category').forEach(a=>{
                a.onclick = ()=>{
                    TARA_API.query().operation = 'Update';
                    TARA_API.query().itemIndex = a.getAttribute('tx-item-id')/1;
                    tx_view({viewId:'create.category',containerId:'#tx-popup-game'});
                    //console.log(a.getAttribute('tx-item-id'));          
                }
            });
            document.querySelectorAll('.tx-live-edit-enum').forEach(a=>{
                a.onclick = ()=>{
                    TARA_API.query().operation = 'Update';
                    TARA_API.query().itemIndex = a.getAttribute('tx-item-id')/1;
                    tx_view({viewId:'create.enum',containerId:'#tx-popup-game'});
                    //console.log(a.getAttribute('tx-item-id'));          
                }
            });
        });   
    }
</script>
