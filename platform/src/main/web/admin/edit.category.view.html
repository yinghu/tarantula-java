<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-edit-category-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span id='tx-edit-category-list-title' class="tx-margin-left-8 tx-text-24"></span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel">
        <div id='tx-edit-category-list' class="w3-container  w3-border-bottom w3-border-red">
            
        </div>
    </div>
    <div class="w3-panel">
        <div class='w3-bar w3-white w3-border-bottom w3-border-red'>
            <span id='tx-edit-category-service-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-edit-category-service-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-edit-category-service-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-edit-category" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let editor = new JSONEditor(document.querySelector("#jsoneditor-edit-category"),{mode:'tree'},{});
    document.querySelector('#tx-edit-category-list-title').innerHTML = 'Edit Category : '+TARA_HTML.caption(TARA_API.query().category);
    let categoryList = document.querySelector('#tx-edit-category-list');
    categoryList.innerHTML = '';
    //let actionList = document.querySelector('#tx-live-inbox-action-bar');
    tx_category_list_setup();
    document.querySelector('#tx-edit-category-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-edit-category-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-edit-category-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-edit-category-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    
    function tx_category_list_setup(){
        TARA_API.onGet('role/admin/item','onCategorySettings',TARA_API.query().gameClusterId+'#'+TARA_API.query().category,(resp)=>{
            editor.set(resp);
            resp.itemList.forEach(item => {
                categoryList.innerHTML += TARA_HTML.command(item.header.type,item.header.type,item.header.version,'edit-category','View');    
            });
            document.querySelectorAll('.tx-live-edit-category').forEach(a=>{
                a.onclick = ()=>{
                    
                    console.log(a.getAttribute('tx-item-id'));          
                }
            });
        });   
    }
</script>
