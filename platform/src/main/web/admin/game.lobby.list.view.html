<script>
    document.querySelector("#tx-game-lobby-list-message").innerHTML = TARA_API.query().gameClusterId;
    let _page = 0;
    _list_lobby();
    document.querySelector('#tx-lobby-list-next').onclick=()=>{
        _page++;
        _list_lobby();
    };
    document.querySelector('#tx-game-lobby-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    function _list_lobby(){
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onGameLobbyList',accessId:TARA_API.query().gameClusterId,page:_page},(resp)=>{
            if(resp.successful){
                console.log(resp);
                document.querySelector('#tx-lobby-list-1').innerHTML = resp.lobby.name;
                document.querySelector('#tx-lobby-list-2').innerHTML = resp.lobby.rank;
                document.querySelector('#tx-lobby-list-3').innerHTML = resp.lobby.tag; 
                document.querySelector('#tx-lobby-list-4').innerHTML = resp.lobby.capacity; 
                document.querySelector('#tx-lobby-list-5').innerHTML = resp.lobby.duration; 
                document.querySelector('#tx-lobby-list-6').innerHTML = resp.lobby.overtime; 
                document.querySelector('#tx-lobby-list-7').innerHTML = resp.lobby.playMode; 
                _page = resp.index;
                resp.lobby.levels.forEach((a,i)=> {
                    document.querySelector('#tx-lobby-level-'+i).innerHTML = JSON.stringify(a); 
                });                    
            }
            else{
                document.querySelector('#tx-game-lobby-list-message').innerHTML=resp.message;
            }       
        });
    }
</script>
