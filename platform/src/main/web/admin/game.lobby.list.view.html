<script>
    document.querySelector("#tx-game-lobby-list-message").innerHTML = TARA_API.query().gameClusterId;
    TARA_API.onService(true,{serviceTag:'role/admin',command:'onGameLobbyList',accessId:TARA_API.query().gameClusterId,headers:[{name:'score',value:456}]},(resp)=>{
        if(resp.successful){
            console.log(resp);
            resp.lobbyList.forEach((a,i)=> {
                document.querySelector('#tx-lobby-list-name-'+i).innerHTML = a.name;
                document.querySelector('#tx-lobby-list-rank-'+i).innerHTML = a.rank;
                document.querySelector('#tx-lobby-list-tag-'+i).innerHTML = a.tag;
                document.querySelector('#game-lobby-list-'+i).style.display='block';    
            });                   
        }
        else{
            document.querySelector('#tx-game-lobby-list-message').innerHTML=resp.message;
        }       
    });
    document.querySelector('#tx-game-lobby-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
