<script>
    //document.querySelector("#tx-game-cluster-test-message").innerHTML = TARA_API.query().gameClusterId;
    document.querySelectorAll(".tx-test-opt").forEach((a)=>{
        a.onclick = ()=>{
            document.querySelectorAll('.tx-test-pane').forEach((a)=>{
                    a.style.display = 'none';
                }
            );
            document.querySelector('#tx-test-'+a.innerHTML).style.display='block'; 
        }; 
    });
    document.querySelectorAll('.tx-test-try').forEach((a)=>{
        a.onclick=()=>{
            TARA_API.query().gameClusterId=a.getAttribute('tx-game-cluster-id');
            let vid = a.getAttribute('view-id');
            tx_view({viewId:vid,containerId:'#tx-popup-api'});    
        }
    });
    document.querySelector('#tx-game-cluster-test-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
