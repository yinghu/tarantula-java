<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-game-data-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-database" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Data Store Service</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-game-data-list-message"></div>
    <div class="w3-panel  w3-border-bottom w3-border-red">
        <div class="w3-container w3-border-bottom w3-border-red">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Data Service Name</span>
            <span id='tx-data-store-0' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>name</span>
            <span id="tx-data-store-api-0" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">API Test</span>      
        </div>
        <div class="w3-container">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Data Service Tag</span>
            <span id='tx-data-store-1' class='w3-right tx-text-14 tx-margin-top-8'>tag</span>
        </div>    
    </div>
    <div class="w3-panel  w3-border-bottom w3-border-red">
        <div class="w3-container w3-border-bottom w3-border-red">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Data Store Name</span>
            <span id='tx-data-store-2' class='w3-right tx-text-14 tx-margin-top-8'>0</span>
        </div> 
        <div class="w3-container">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Data Store Count</span>
            <span id='tx-data-store-3' class='w3-right tx-text-14 tx-margin-top-8'>0</span>
        </div>    
    </div>
    <div class="w3-panel  w3-border-bottom w3-border-red">
        <div class="w3-container w3-border-bottom w3-border-red">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Service Store Name</span>
            <span id='tx-data-store-4' class='w3-right tx-text-14 tx-margin-top-8'>0</span>
        </div>
        <div class="w3-container">
            <span class='w3-left tx-text-14 tx-margin-top-8'>Service Store Count</span>
            <span id='tx-data-store-5' class='w3-right tx-text-14 tx-margin-top-8'>0</span>
        </div>    
    </div>  
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-game-data-list-message").innerHTML = TARA_API.query().gameClusterId;
    TARA_API.onService(true,{serviceTag:'role/admin',command:'onGameDataList',accessId:TARA_API.query().gameClusterId},(resp)=>{
        if(resp.successful){
            TARA_API.query().serviceTag = resp.tag;
            document.querySelector('#tx-data-store-0').innerHTML = resp.name;
            document.querySelector('#tx-data-store-1').innerHTML = resp.tag;
            document.querySelector('#tx-data-store-2').innerHTML = resp.dataStore;
            document.querySelector('#tx-data-store-3').innerHTML = resp.dataStoreCount;
            document.querySelector('#tx-data-store-4').innerHTML = resp.serviceStore;
            document.querySelector('#tx-data-store-5').innerHTML = resp.serviceStoreCount;               
        }
        else{
            document.querySelector('#tx-game-data-list-message').innerHTML=resp.message;
        }       
    });
    document.querySelector('#tx-data-store-api-0').onclick = ()=>{
        TARA_API.query().popup='#tx-popup-api'; 
        tx_view({viewId:'api.service.data',containerId:'#tx-popup-api'});
    };
    document.querySelector('#tx-game-data-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
