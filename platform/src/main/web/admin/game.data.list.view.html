<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-game-data-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-database" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Data List</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-game-data-list-message"></div>
    <div class="w3-panel  w3-border-bottom w3-border-red">
        <div class="w3-container">
            <span id='tx-data-service-name' class='w3-left tx-text-14 tx-margin-top-8'>Name</span>
        </div>    
    </div>
    <div id='tx-data-service-list-0' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span id='tx-data-service-list-name-0' class='w3-left tx-text-14 tx-margin-top-8'>Name</span>
            <span id='tx-data-service-list-tag-0' class='w3-right tx-text-14 tx-margin-top-8'>tag</span>
        </div>    
    </div>
    <div class="w3-panel w3-center tx-text-12">
        <textarea id="tx-api-set-json-message">RESPONSE OUTPUT</textarea> 
    </div>  
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-game-data-list-message").innerHTML = TARA_API.query().gameClusterId;
    TARA_API.onService(true,{serviceTag:'role/admin',command:'onGameDataList',accessId:TARA_API.query().gameClusterId},(resp)=>{
        if(resp.successful){
            document.querySelector('#tx-data-service-name').innerHTML = resp.name;
            resp.serviceList.forEach((a,i)=>{
                document.querySelector('#tx-data-service-list-name-'+i).innerHTML=a.name;
                document.querySelector('#tx-data-service-list-tag-'+i).innerHTML=a.tag;
                document.querySelector('#tx-data-service-list-'+i).style.display='block';
            });                
        }
        else{
            document.querySelector('#tx-game-data-list-message').innerHTML=resp.message;
        }       
    });
    document.querySelector('#tx-game-data-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
