<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-game-cluster-metrics-list-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-group" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">GameClusterMetrics</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div> 
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-right-4">Metrics Type :</label>
        <select id='tx-gc-metrics-type' class="w3-select w3-border w3-round tx-text-12" name='metricsType'>
            <option value="gameCluster" selected>GameCluster</option>  
        </select>
    </div>  
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-right-4">Metrics Category :</label>
        <select id='tx-gc-metrics-category' class="w3-select w3-border w3-round tx-text-12" name='metricsCategory'>
            <option value="hourly" selected>Hourly</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearyly</option>  
        </select>
    </div>
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-right-4">Metrics Data :</label>
        <select id='tx-gc-metrics-data' class="w3-select w3-border w3-round tx-text-12" name='metricsData'>
            <option value="googleLogin" selected>GoogleLogin</option>
            <option value="facebookLogin">FacebookLogin</option>   
        </select>
    </div>
    <div class="w3-panel">
        <canvas id="gcchart"></canvas>
    </div>
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-right-4">Chart Type :</label>
        <select id='tx-gc-chart-type' class="w3-select w3-border w3-round tx-text-12" name='chart'>
            <option value="line" selected>Line</option>
            <option value="bar">Bar</option>   
        </select>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let _category = 'hourly';
    let _metrics = 'googleLogin';
    let _type = 'gameCluster';
    Chart.defaults.font.family = 'Oswald';
    const labels = [
        '2021 10',
        '2021 11',
        '2021 12',
        '2022 01',
        '2022 02',
        '2022 03',
        '2022 04',
        '2022 05',
        '2022 06',
        '2022 07',
        '2022 08',
        '2022 09'
    ];

    const data = {
        labels: labels,
        datasets: [{
            label: _category+'/'+_metrics,
            backgroundColor: 'rgb(255, 99, 132)',
            borderColor: 'rgb(255, 99, 132)',
            data: [140, 110, 50, 200, 120, 130, 445,860,3000,2990,3100,2900],
        }]
    };

    const config = {
        type: 'line',
        data: data,
        options: {
            scales: {
            y: {
                beginAtZero: true
               }
            }
        }
    };
    
    const chart = new Chart(document.querySelector("#gcchart"),config);
    TARA_API.onGet('role/admin','onGameClusterMetrics',TARA_API.query().gameClusterId,(resp)=>{
        chart.update();                          
    });
    

    document.querySelector('#tx-gc-chart-type').onchange = ()=>{
        let chartType = document.querySelector('#tx-gc-chart-type').value;
        config.type = chartType;
        chart.update();
    };

    document.querySelector('#tx-gc-metrics-type').onchange = ()=>{
        _type = document.querySelector('#tx-gc-metrics-type').value;
        //data.datasets[0].label = _type+'/'+_category+'/'+_metrics;
        //chart.update();
        //_load_metrics();
    };
    document.querySelector('#tx-gc-metrics-category').onchange = ()=>{
        _category = document.querySelector('#tx-gc-metrics-category').value;
        data.datasets[0].label = _category+'/'+_metrics;
        chart.update();
    };

    document.querySelector('#tx-gc-metrics-data').onchange = ()=>{
        _metrics = document.querySelector('#tx-gc-metrics-data').value;
        data.datasets[0].label = _category+'/'+_metrics;
        chart.update();
    };

    document.querySelector('#tx-game-cluster-metrics-list-close').onclick=()=>{
        chart.destroy();
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
