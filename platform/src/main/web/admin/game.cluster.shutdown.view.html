<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <!--<span id="tx-game-cluster-shutdown-close"><i class="fa fa-close" style="font-size:12px"></i></span>-->            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-sign-in" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Cluster Shutdown</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-game-cluster-shutdown-message">
    </div> 
    <div class="w3-panel">
        <span id="tx-game-cluster-shutdown-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>
        <span id="tx-game-cluster-shutdown" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Shutdown</span>     
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>        
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-game-cluster-shutdown-message").innerHTML = TARA_API.query().gameClusterId;
    document.querySelector("#tx-game-cluster-shutdown").onclick=()=>{
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onShutdownGameCluster',accessId:TARA_API.query().gameClusterId},(resp)=>{
            document.querySelector('#tx-game-cluster-shutdown-message').innerHTML=resp.message;       
        });
    };
    document.querySelector('#tx-game-cluster-shutdown-cancel').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
