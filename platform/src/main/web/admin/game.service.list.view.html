    </div>

        </div>    
    </div> 
    <div id='tx-service-list-0' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span id='tx-service-list-name-0' class='w3-left tx-text-14 tx-margin-top-8'>Name</span>
            <span id='tx-service-list-tag-0' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>tag</span>
            <span id="tx-service-list-api-0" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-action">API Test</span>
        </div>    
    </div>
    <div id='tx-service-list-1' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span id='tx-service-list-name-1' class='w3-left tx-text-14 tx-margin-top-8'>Name</span>
            <span id='tx-service-list-tag-1' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>tag</span>
            <span id="tx-service-list-api-1" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-action">API Test</span>
        
        </div>    
    </div>
    <div id='tx-service-list-2' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">
            <span id='tx-service-list-name-2' class='w3-left tx-text-14 tx-margin-top-8'>Name</span>
            <span id='tx-service-list-tag-2' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>tag</span>
            <span id="tx-service-list-api-2" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-action">API Test</span>
        </div>    
    </div>
    <div id='tx-service-list-3' class="w3-panel  w3-border-bottom w3-border-red" style="display: none;">
        <div class="w3-container">

            <span id='tx-service-list-tag-3' class='w3-left tx-text-14 tx-margin-top-8 tx-margin-left-12'>tag</span>
            <span id="tx-service-list-api-3" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-service-action">API Test</span>

    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">

            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>

        <div class="w3-panel w3-border-bottom w3-border-red">
            <span id="tx-service-edit-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>     
            <span id="tx-service-edit-ok" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Confirm</span>     
        </div>
    </div>
</div>
<script>
    document.querySelector("#tx-game-service-list-message").innerHTML = TARA_API.query().gameClusterId;
    TARA_API.onService(true,{serviceTag:'role/admin',command:'onGameServiceList',accessId:TARA_API.query().gameClusterId},(resp)=>{
        if(resp.successful){
            document.querySelector('#tx-service-name').innerHTML = resp.name;
            resp.serviceList.forEach((a,i)=>{
                document.querySelector('#tx-service-list-name-'+i).innerHTML=a.name;
                document.querySelector('#tx-service-list-tag-'+i).innerHTML=a.tag;
                document.querySelector('#tx-service-list-api-'+i).setAttribute('tx-service-api-view-id','api.service.'+a.name.toLowerCase());
                document.querySelector('#tx-service-list-'+i).style.display='block';
            });
        }
        else{
            document.querySelector('#tx-game-service-list-message').innerHTML=resp.message;
        }       
    });
    document.querySelector('#tx-game-service-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-add-service').onclick=()=>{
        document.querySelector('#tx-service-edit').style.display = 'block';  
        TARA_API.onService(true,{serviceTag:'role/admin',command:'availableGameServiceList',accessId:TARA_API.query().gameClusterId},(resp)=>{
            console.log(resp);    
        });   
    };
    document.querySelector('#tx-service-edit-cancel').onclick=()=>{
        document.querySelector('#tx-service-edit').style.display = 'none';    
    };
    document.querySelector('#tx-service-edit-ok').onclick=()=>{
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onAddService',accessId:TARA_API.query().gameClusterId},(resp)=>{
            console.log(resp);    
        });
        //document.querySelector('#tx-service-edit').style.display = 'none';    
    };
    document.querySelectorAll('.tx-service-action').forEach((a)=>{
        a.onclick=()=>{
            //console.log("loading api page->"+a.getAttribute('tx-service-api-view-id'));
            //TARA_API.query().gameClusterId=a.getAttribute('tx-game-cluster-id');
            TARA_API.query().popup='#tx-popup-api';
            let vid = a.getAttribute('tx-service-api-view-id');
            tx_view({viewId:vid,containerId:'#tx-popup-api'});    
        }
    });
</script>
