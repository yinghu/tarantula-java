<script>
    document.querySelector("#tx-game-service-list-message").innerHTML = "Game Cluster ID : "+TARA_API.query().gameClusterId;
    TARA_API.onGet('role/lobby','onGameServiceList',TARA_API.query().gameClusterId,(resp)=>{
        if(resp.successful){
            let i = 0;
            resp.serviceList.forEach((a)=>{
                console.log(a);
                if(a.resetEnabled == true){
                    document.querySelector('#tx-service-list-name-'+i).innerHTML=a.name;
                    document.querySelector('#tx-service-list-tag-'+i).innerHTML='Access Tag : '+a.tag;
                    document.querySelector('#tx-service-list-api-'+i).setAttribute('tx-service-api-view-id','api.service.'+a.category.toLowerCase());
                    document.querySelector('#tx-service-list-api-'+i).setAttribute('tx-service-tag','role/'+a.category.toLowerCase());
                    document.querySelector('#tx-service-list-'+i).style.display='block';
                    i++;
                }
            });
        }
        else{
            document.querySelector('#tx-game-service-list-message').innerHTML=resp.message;
        }       
    });
    document.querySelector('#tx-game-service-list-close').onclick=()=>{
        let m3 = document.querySelector('#tx-popup');
        m3.innerHTML="";
        m3.style.display = 'none';       
    }; 
    document.querySelectorAll('.tx-service-action').forEach((a)=>{
        a.onclick=()=>{
            TARA_API.query().popup='#tx-popup-api';
            TARA_API.query().serviceTag = a.getAttribute('tx-service-tag');
            let vid = a.getAttribute('tx-service-api-view-id');
            tx_view({viewId:vid,containerId:'#tx-popup-api'});    
        }
    });
</script>
