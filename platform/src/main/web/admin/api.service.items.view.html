<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-invalid-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Items API</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-invalid-message">
        <p>Your request might have permission or techinical isssues. Contact our support team if you have questions.</p>
    </div> 
    <div class="w3-panel">
        <span id="tx-service-item-inventory" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Inventory</span>
        <span id="tx-service-redeem-item" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-margin-left-12">Redeem Item</span>
        <span id="tx-service-item-list" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Item List</span>
        <span id="tx-service-add-item" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-bottom-8 tx-margin-right-12">Add Item</span>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
    <div class="w3-card-4 w3-border w3-round w3-white tx-lobby-checkout" id="tx-service-item-edit">
        <div class="w3-panel w3-border-bottom w3-border-red">
            <span id="tx-service-item-edit-cancel" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Cancel</span>     
            <span id="tx-service-item-edit-ok" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Confirm</span>     
        </div>
    </div>
</div>
<script>
    document.querySelector('#tx-service-add-item').onclick=()=>{
        TARA_API.onService(true,{serviceTag:'role/admin',command:'onAddItem',accessId:TARA_API.query().gameClusterId},(resp)=>{
            console.log(resp);    
        });    
    };
    document.querySelector('#tx-service-item-list').onclick=()=>{
        TARA_API.onService(false,{serviceTag:TARA_API.query().serviceTag,command:'onItems'},(resp)=>{
            console.log(resp);    
        });    
    };
    document.querySelector('#tx-service-item-inventory').onclick=()=>{
        TARA_API.onService(false,{serviceTag:TARA_API.query().serviceTag,command:'onInventory'},(resp)=>{
            console.log(resp);    
        });    
    };
    document.querySelector('#tx-service-redeem-item').onclick=()=>{
        TARA_API.onService(true,{serviceTag:TARA_API.query().serviceTag,command:'onRedeem',itemId:'abc'},(resp)=>{
            console.log(resp);    
        });    
    };
    document.querySelector('#tx-invalid-close').onclick=()=>{
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
</script>
