<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-edit-game-cluster-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-hourglass-1" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Update Lobby</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
   
    <div class="w3-panel">
        <fieldset class="w3-border-blue tx-text-12">
            <legend class="tx-text-14 w3-text-blue">Add New Lobby</legend>
            <div class="w3-container">
                <div class='w3-bar w3-white'>
                    <span id='tx-add-game-lobby' class='w3-bar-item w3-tag w3-right w3-round w3-border w3-border-red w3-green tx-text-14 tx-padding-button tx-margin-top-8 tx-margin-left-4'>New Lobby</span>   
                </div>
            </div>  
        </fieldset>
    </div>  
    <div class='w3-panel' id="tx-game-lobby-list">
    </div> 
    <div class="w3-panel">
        <div class='w3-bar w3-white w3-border-bottom w3-border-red'>
            <span id='tx-game-lobby-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-game-lobby-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-game-lobby-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-game-lobby" style="width: 100%;"></div>
    </div>    
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    //document.querySelector("#tx-create-access-key-message").innerHTML = TARA_API.query().gameClusterId;
    let editor = new JSONEditor(document.querySelector("#jsoneditor-game-lobby"),{mode:'tree'},{});
    let keyBar = document.querySelector('#tx-game-lobby-list');
    let lobbyIndex = 0;
    document.querySelector('#tx-edit-game-cluster-close').onclick=()=>{
        editor.destroy();
        tx_close_current_page();    
    };
    document.querySelector('#tx-add-game-lobby').onclick=()=>{
        TARA_API.onGet('role/admin/lobby','onAddLobby',TARA_API.query().gameClusterId+'#'+(lobbyIndex+1),(resp)=>{
            editor.set(resp);
            if(resp.successful){
                tx_list_game_lobby_update();
                TARA_API.query().callback(); 
            }      
        });       
    };
    document.querySelector('#tx-game-lobby-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-game-lobby-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-game-lobby-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    tx_list_game_lobby_update();
    function tx_list_game_lobby_update(){
        TARA_API.onGet('role/admin/lobby','onGameLobbyList',TARA_API.query().gameClusterId,(resp)=>{
            editor.set(resp);
            if(resp.successful){
                tx_access_key_bar_reset(resp);
            }      
        });    
    }
    function tx_access_key_bar_reset(resp){
        keyBar.innerHTML ='';
        resp.gameLobbyList.forEach((gi)=>{
            if(gi.accessRank>lobbyIndex){
                lobbyIndex = gi.accessRank;
            }
            keyBar.innerHTML += TARA_HTML.command(gi.applicationId,gi.name,gi.typeId,'lobby-close-action',gi.disabled?'Open':'Close'); 
        });
        document.querySelectorAll('.tx-live-lobby-close-action').forEach(a=>{
            a.onclick=()=>{
                let applicationId = a.getAttribute('tx-item-id');
                let cmd = a.innerHTML == 'Open'?'onEnableLobby':'onDisableLobby';
                TARA_API.onGet('role/admin/lobby',cmd,TARA_API.query().gameClusterId+'#'+applicationId,(resp)=>{
                    editor.set(resp);
                    TARA_API.query().callback(); 
                    if(resp.successful){
                        tx_list_game_lobby_update();
                    }        
                });
            };
        });
    }
</script>
