<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-ban-player-close"><i class="fa fa-close" style="font-size:12px"></i></span>
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Ban Player Tool</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-center w3-text-red tx-text-12" id="tx-ban-player-message"></div>
    <div class="w3-panel w3-border-bottom w3-border-white">
        <div class="w3-panel">
            <label class="tx-text-12">PlayerID</label>
            <input id ="tx-player-id" class="w3-input w3-round w3-border" type="number" placeholder='playerID'/>
        </div>
        <div class="w3-panel">
            <div class="w3-bar w3-white w3-border-bottom w3-border-red">
                <span id="tx-ban-player" class="w3-right w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Ban Player</span>
                <span id="tx-unban-player" class="w3-left w3-tag w3-green w3-round w3-border w3-border-red tx-text-18 tx-padding-button tx-margin-top-8 tx-margin-bottom-8">Unban Player</span>
            </div>
        </div>
    </div>
    <div class="w3-panel">
        <div class='w3-bar w3-white'>
            <span id='tx-find-user-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-find-user-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-find-user-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>
            <span class="w3-bar-item w3-right tx-text-18 tx-margin-bottom-8 tx-margin-left-4">Banned Players List</span>
        </div>
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-game-service" style="width: 100%;"></div>
    </div>
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>

    <!-- item operation selection form -->
    <div class="w3-card-4 w3-border w3-round w3-white tx-popup-w300-h150" id="tx-confirm-ban-player-popup">
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topright w3-padding">
                <span id="tx-confirm-popup-cancel"><i class="fa fa-close" style="font-size:12px"></i></span>
            </div>
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-exclamation-triangle w3-text-yellow tx-margin-top-4" style="font-size:16px"></i></span>
                <span class="tx-margin-left-8 tx-text-14">Warning!</span>
            </div>
        </div>
        <div class="w3-display-container" style="height: 78px;">
            <div id="tx-confirm-popup-message" class="w3-display-topmiddle w3-center tx-margin-top-8 tx-text-14">Are You Sure You Want to Ban Player</div>
            <div class="w3-display-bottomleft tx-margin-left-16 tx-margin-bottom-8">
                <span id='tx-confirm-popup-confirm-button' class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button">Confirm</span>
            </div>
            <div class="w3-display-bottomright tx-margin-right-16 tx-margin-bottom-8">
                <span id='tx-confirm-popup-cancel-button' class="w3-tag w3-green w3-round w3-border w3-border-red tx-text-16 tx-padding-button">Cancel</span>
            </div>
        </div>
        <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
            <div class="w3-display-topleft w3-padding">
                <span><i class="fa fa-cubes" style="font-size:18px"></i></span>
            </div>
            <div class="w3-display-bottomright w3-padding">
                <span class="tx-text-12">Powered By ICodeSoftware</span>
            </div>
        </div>
    </div>
</div>
<script>
    let confirmPopup = document.querySelector('#tx-confirm-ban-player-popup');
    let editor = new JSONEditor(document.querySelector("#jsoneditor-game-service"),{mode:'tree'},{});

    reloadBannedPlayersList();

    document.querySelector('#tx-ban-player').onclick=()=>{
        let _playerID = document.querySelector('#tx-player-id').value;

        if(_playerID==''){
            document.querySelector('#tx-ban-player-message').innerHTML = "PlayerID Field Cannot Be Empty";
            return;
        }

        document.querySelector('#tx-confirm-popup-message').innerHTML = "Ban Player with ID: " + _playerID + "?";

        document.querySelector('#tx-confirm-popup-confirm-button').onclick =()=>{
            //let _playerID = document.querySelector('#tx-player-id').value;

            let payload ={playerID:_playerID};

            TARA_API.onSet('role/admin','onBanPlayer',TARA_API.query().gameClusterId,payload,(resp)=>{
                document.querySelector('#tx-ban-player-message').innerHTML = resp.message;
            });

            document.querySelector('#tx-player-id').value = '';

            confirmPopup.style.display = 'none';

            sleep(500).then(() => {reloadBannedPlayersList();})

        }

        confirmPopup.style.display = 'block';

    };

    document.querySelector('#tx-unban-player').onclick=()=>{
        let _playerID = document.querySelector('#tx-player-id').value;

        if(_playerID==''){
            document.querySelector('#tx-ban-player-message').innerHTML = "PlayerID Field Cannot Be Empty";
            return;
        }

        document.querySelector('#tx-confirm-popup-message').innerHTML = "Remove Player with ID: " + _playerID + " from the ban list?";

        document.querySelector('#tx-confirm-popup-confirm-button').onclick =()=>{
            //let _playerID = document.querySelector('#tx-player-id').value;

            let payload ={playerID:_playerID};

            TARA_API.onSet('role/admin','onUnbanPlayer',TARA_API.query().gameClusterId,payload,(resp)=>{
                document.querySelector('#tx-ban-player-message').innerHTML = resp.message;
            });

            document.querySelector('#tx-player-id').value = '';

            confirmPopup.style.display = 'none';

            sleep(500).then(() => {reloadBannedPlayersList();})
        }

        confirmPopup.style.display = 'block';

    };

    function reloadBannedPlayersList(){
        //editor.destroy();
        //editor = new JSONEditor(document.querySelector("#jsoneditor-game-service"),{mode:'tree'},{});
        TARA_API.onGet('role/admin',"onLoadBanList",TARA_API.query().gameClusterId,(resp)=>{
            editor.set(resp);
        });
    }

    document.querySelector('#tx-ban-player-close').onclick=()=>{
        tx_close_current_page();
    };

    document.querySelector('#tx-confirm-popup-cancel-button').onclick =()=>{
        tx_close_current_page();
    }

    document.querySelector('#tx-confirm-popup-cancel').onclick =()=>{
        confirmPopup.style.display = 'none';
    }

    document.querySelector('#tx-find-user-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-find-user-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-find-user-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };

    function sleep(ms){
        return new Promise(resolve => setTimeout(resolve, ms));
    }

</script>
