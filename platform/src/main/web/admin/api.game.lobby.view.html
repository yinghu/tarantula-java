<script>
    document.querySelector('#tx-game-lobby-message').innerHTML = TARA_API.query().applicationId;
    
    let editor = new JSONEditor(document.querySelector("#jsoneditor-api-service-game-lobby"),{mode:'tree'},{});

    let cmd ={serviceTag:'role/lobby',command:'onGameLobby',applicationId:TARA_API.query().applicationId,gameClusterId:TARA_API.query().gameClusterId};
    TARA_API.onService(true,cmd,(resp)=>{
        editor.set(resp);        
    });
    document.querySelector('#tx-game-lobby-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-game-lobby-api-service-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-game-lobby-api-service-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-game-lobby-api-service-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
</script>
