<script>
    let itemTemplate = {header:{},application:{},payload:{},reference:{}};
    itemTemplate.configurationType = TARA_API.query().itemTemplate.type;
    itemTemplate.configurationCategory = TARA_API.query().itemTemplate.category;
    itemTemplate.configurationVersion = TARA_API.query().itemTemplate.version;
    itemTemplate.configurationQuantity = TARA_API.query().itemTemplate.quantity;
    let selectedItem = TARA_API.query().itemTemplate.itemList[TARA_API.query().gameItemIndex];
    itemTemplate.application = selectedItem.application;
    itemTemplate.header = selectedItem.header;
    itemTemplate.payload = selectedItem.payload;
    itemTemplate.reference = selectedItem.reference;
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-item"),{mode:'code'},itemTemplate);
    let cmd = 'onCreateItem';
    if(itemTemplate.configurationType == 'commodity'){
        cmd = 'onCreateCommodity';
    }
    else if(itemTemplate.configurationType == 'item'){
        cmd = 'onCreateItem';
    }
    TARA_API.onGet('role/item',"onCategory",TARA_API.query().gameClusterId,(resp)=>{
        console.log(resp);
        resp.onList.forEach((a,i) => {
            if(a !== itemTemplate.configurationCategory){
                document.querySelector('#tx-item-category-'+i).innerHTML = a;
                document.querySelector('#tx-item-category-'+i).setAttribute('tx-category',a);
                document.querySelector('#tx-item-category-'+i).style.display = 'block';
            }
        });   
    });
    document.querySelectorAll('.tx-game-item-category').forEach(a=>{
        a.onclick=()=>{
            hide_game_item_reference_list();
            let category = a.getAttribute('tx-category');
            let query = TARA_API.query().gameClusterId+'#'+category;
            TARA_API.onGet('role/item','onStock',query,(resp)=>{
                console.log(resp);
                //document.querySelector('#tx-game-item-list-description-0').innerHTML = resp.description;
                //document.querySelector('#tx-game-item-list-category-0').innerHTML = resp.category; 
                resp.itemList.forEach((gi,i)=>{
                    document.querySelector('#tx-game-item-reference-list-type-'+i).innerHTML = gi.header.type;
                    document.querySelector('#tx-game-item-reference-list-name-'+i).innerHTML = gi.header.name;
                    document.querySelector('#tx-game-item-reference-list-api-'+i).setAttribute('tx-reference-id',gi.itemId);
                    document.querySelector('#tx-game-item-reference-list-'+i).style.display = 'block';    
                });
                //TARA_API.query().itemTemplate = resp;
            });
        };
    });
    document.querySelectorAll('.tx-game-item-reference-list-add').forEach(a=>{
        a.onclick=()=>{
            let itemId = a.getAttribute('tx-reference-id');
            let item = editor.get();
            item.reference.push(itemId);
            editor.set(item);
            ///TARA_API.query().gameItemIndex= ix;
            //TARA_API.query().popup='#tx-popup-api'; 
            //tx_view({viewId:'create.item',containerId:'#tx-popup-api'});
        };
    });
    document.querySelector('#tx-configuration-item-save').onclick=()=>{
        document.querySelector('#tx-configuration-item-save').style.display = 'none';
        let _k = document.querySelector('#tx-configuration-item-name').value;
        let item = editor.get();
        item.configurationName = _k;
        TARA_API.onSet('role/item',cmd,TARA_API.query().gameClusterId,item,(resp)=>{
            editor.set(resp);   
        });
    };
    document.querySelector('#tx-configuration-item-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-item-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-item-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-item-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
    function hide_game_item_reference_list(){
        for (let i = 0; i <3; i++) {
            document.querySelector('#tx-game-item-reference-list-'+i).style.display = 'none';
        }            
    }
</script>
