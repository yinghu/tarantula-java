<div class="w3-modal-content">
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-48">
        <div class="w3-display-topright w3-padding">
            <span id="tx-configuration-item-api-close"><i class="fa fa-close" style="font-size:12px"></i></span>            
        </div>
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cogs" style="font-size:24px"></i></span>
            <span class="tx-margin-left-8 tx-text-24">Game Item</span>
        </div>
    </div>
    <div class="w3-display-container w3-red w3-border-bottom w3-border-white tx-content-8"></div>   
    <div class="w3-display-container w3-white tx-content-8"></div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-configuration-item-save' class='w3-bar-item w3-right w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Save</span> 
        </div>            
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span tx-category='tournament' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-game-item-template'>Tournament</span>          
            <span tx-category='store' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-12 tx-padding-button tx-margin-bottom-8 tx-margin-left-4 tx-game-item-template'>Store</span> 
        
        </div>            
    </div>
    <div class="w3-panel">
        <label class="tx-text-12 tx-margin-left-4">Configuration item Type:</label>
        <input id='tx-configuration-item-type' class="w3-input w3-round w3-border tx-text-12" type="text">    
        <label class="tx-text-12 tx-margin-left-4">Configuration item Name:</label>
        <input id='tx-configuration-item-name' class="w3-input w3-round w3-border tx-text-12" type="text">    
        <label class="tx-text-12 tx-margin-left-4">Configuration item Category:</label>
        <input id='tx-configuration-item-category' class="w3-input w3-round w3-border tx-text-12" type="text">    
    </div>
    <div class="w3-panel w3-border-bottom w3-border-red">
        <div class='w3-bar w3-white'>
            <span id='tx-item-json-mode-tree' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Tree</span>
            <span id='tx-item-json-mode-code' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Code</span>
            <span id='tx-item-json-mode-preview' class='w3-bar-item w3-left w3-tag w3-round w3-border w3-border-red w3-green tx-text-10 tx-padding-button tx-margin-bottom-8 tx-margin-left-4'>Preview</span>    
        </div>            
    </div>
    <div class="w3-panel w3-center tx-text-14">
        <div id="jsoneditor-configuration-item" style="width: 100%;"></div>
    </div> 
    <div class="w3-display-container w3-green w3-border-bottom w3-border-white tx-content-36">
        <div class="w3-display-topleft w3-padding">
            <span><i class="fa fa-cubes" style="font-size:18px"></i></span>            
        </div>
        <div class="w3-display-bottomright w3-padding">
            <span class="tx-text-12">Powered By ICodeSoftware</span>
        </div>
    </div>
</div>
<script>
    let itemTemplate = {header:{},application:{},payload:{},reference:{}};
    let sample = {type:'T100',name:'fast 100 player',schedule:'onDemand',durationHours:24,maxEntriesPerInstance:100,durationMinutesPerInstance:10}; 
    itemTemplate.application =sample;
    let editor = new JSONEditor(document.querySelector("#jsoneditor-configuration-item"),{mode:'code'},itemTemplate);
    
    document.querySelectorAll('.tx-game-item-template').forEach(a=>{
        a.onclick=()=>{
            let category = a.getAttribute('tx-category');
            TARA_API.onGet('role/item','onList',category,(resp)=>{
                editor.set(resp);       
            });
        };
    });
    document.querySelector('#tx-configuration-item-save').onclick=()=>{
        let _t = document.querySelector('#tx-configuration-item-type').value;
        let _k = document.querySelector('#tx-configuration-item-name').value;
        let _c = document.querySelector('#tx-configuration-item-category').value;
        let item = editor.get();
        item.header.configurationType = _t;
        item.header.configurationName = _k;
        item.header.configurationCategory = _c;
        TARA_API.onSet('role/item','onCreate',TARA_API.query().gameClusterId,item,(resp)=>{
            editor.set(resp);   
        });
    };
    document.querySelector('#tx-configuration-item-api-close').onclick=()=>{
        editor.destroy();
        let m3 = document.querySelector(TARA_API.query().popup);
        m3.innerHTML="";
        m3.style.display = 'none';       
    };
    document.querySelector('#tx-item-json-mode-tree').onclick=()=>{
        editor.setMode('tree');
    };
    document.querySelector('#tx-item-json-mode-code').onclick=()=>{
        editor.setMode('code');
    };
    document.querySelector('#tx-item-json-mode-preview').onclick=()=>{
        editor.setMode('preview');
    };
</script>
